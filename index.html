<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BibleGateway at home</title>
    <link rel="icon" href="/logo_biblegateway.png" type="image/png" sizes="any">
    <link rel="shortcut icon" href="/favicon.ico">
    <link rel="apple-touch-icon" sizes="180x180" href="/logo_biblegateway.png">
    <style>
        :root {
            --bg: #f5f1eb;
            --card-bg: #ffffff;
            --text: #2c2c2c;
            --text-muted: #6b6b6b;
            --accent: #a83232;
            --accent-hover: #8c2828;
            --border: #d4cfc7;
            --error: #9c3030;
            --error-bg: #fdf0f0;
            --verse-num: #a83232;
            --shadow: 0 2px 8px rgba(0,0,0,0.08);
        }

        [data-theme="dark"] {
            --bg: #1a1a1e;
            --card-bg: #26262b;
            --text: #e0e0e0;
            --text-muted: #9a9a9a;
            --accent: #c94444;
            --accent-hover: #b33636;
            --border: #3a3a40;
            --error: #e05555;
            --error-bg: #2e1a1a;
            --verse-num: #c94444;
            --shadow: 0 2px 8px rgba(0,0,0,0.3);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        .app-header {
            background: var(--accent);
            color: white;
            padding: 10px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-radius: 0;
        }
        .header-left {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
        }
        .header-logo {
            height: 36px;
            width: auto;
            display: block;
        }
        .app-header h1 { font-size: 1.2rem; font-weight: 600; letter-spacing: 0.5px; }

        .search-area {
            padding: 0;
        }

        .controls {
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
        }

        .search-box {
            flex: 1;
            min-width: 250px;
        }
        .search-box input {
            width: 100%;
            padding: 12px 16px;
            font-size: 1rem;
            border: 2px solid var(--border);
            border-radius: 8px;
            background: var(--card-bg);
            color: var(--text);
            outline: none;
            transition: border-color 0.2s;
        }
        .search-box input:focus { border-color: var(--accent); }
        .search-box input::placeholder { color: #aaa; }

        .btn {
            padding: 10px 20px;
            font-size: 0.95rem;
            border: none;
            border-radius: 999px;
            cursor: pointer;
            font-weight: 500;
            transition: background 0.2s, transform 0.1s;
        }
        .btn:active { transform: scale(0.97); }
        .btn-primary { background: var(--accent); color: white; }
        .btn-primary:hover { background: var(--accent-hover); }
        .btn-secondary { background: var(--card-bg); color: var(--text); border: 2px solid var(--border); }
        .btn-secondary:hover { background: #f0ede7; }
        [data-theme="dark"] .btn-secondary:hover { background: #32323a; }
        .btn-secondary.active { background: var(--accent); color: white; border-color: var(--accent); }

        select {
            padding: 10px 14px;
            font-size: 0.95rem;
            border: 2px solid var(--border);
            border-radius: 8px;
            background: var(--card-bg);
            color: var(--text);
            cursor: pointer;
            outline: none;
        }
        select:focus { border-color: var(--accent); }
        select option { background: var(--card-bg); color: var(--text); }

        .dark-toggle {
            background: transparent;
            border: 2px solid rgba(255,255,255,0.3);
            color: white;
            width: 38px; height: 38px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1.1rem;
            line-height: 1;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transition: border-color 0.2s;
        }
        .dark-toggle:hover { border-color: rgba(255,255,255,0.6); }

        /* Book browser / sorter — fjernet. Bruk 'Johannes:' prefix eller referanse-søk i stedet. */

        /* Toggles */
        .toggles {
            max-width: 1400px;
            margin: 12px auto 0;
            padding: 0 24px;
            display: flex;
            gap: 20px;
            align-items: center;
            flex-wrap: wrap;
        }
        .toggle-group {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9rem;
            color: var(--text-muted);
        }
        .toggle { position: relative; width: 42px; height: 24px; }
        .toggle input { opacity: 0; width: 0; height: 0; }
        .toggle-slider {
            position: absolute; inset: 0;
            background: var(--border);
            border-radius: 24px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .toggle-slider::before {
            content: '';
            position: absolute;
            width: 18px; height: 18px;
            left: 3px; bottom: 3px;
            background: white;
            border-radius: 50%;
            transition: transform 0.2s;
        }
        .toggle input:checked + .toggle-slider { background: var(--accent); }
        .toggle input:checked + .toggle-slider::before { transform: translateX(18px); }

        /* Results area */
        .results-wrapper {
            max-width: 1400px;
            margin: 8px auto 20px;
            padding: 0 24px 40px;
        }
        .verse-row {
            display: flex;
            gap: 20px;
            margin-bottom: 16px;
            align-items: stretch;
        }
        .verse-row > .verse-card {
            flex: 1;
            min-width: 0;
            margin-bottom: 0;
        }
        .compare-columns-header {
            display: flex;
            gap: 20px;
            margin-bottom: 12px;
        }
        .column-label {
            flex: 1;
            min-width: 0;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-muted);
        }
        .column-label select {
            padding: 5px 8px;
            font-size: 0.85rem;
            text-transform: none;
            letter-spacing: 0;
            font-weight: 400;
        }


        /* Verse card */
        .verse-card {
            background: var(--card-bg);
            border-radius: 24px;
            padding: 20px 24px;
            margin-bottom: 16px;
            box-shadow: var(--shadow);
            position: relative;
            display: flex;
            flex-direction: column;
        }
        .verse-card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--border);
        }
        .verse-card-label { font-weight: 700; font-size: 1rem; color: var(--accent); }
        .copy-btn {
            padding: 5px 14px;
            font-size: 0.8rem;
            background: transparent;
            border: 1px solid var(--border);
            border-radius: 999px;
            cursor: pointer;
            color: var(--text-muted);
            transition: all 0.2s;
            white-space: nowrap;
        }
        .copy-btn:hover { background: var(--accent); color: white; border-color: var(--accent); }

        .verse-text {
            font-family: 'Georgia', 'Times New Roman', 'Palatino Linotype', serif;
            font-size: 1.1rem;
            line-height: 1.8;
            color: var(--text);
            flex: 1;
        }
        .verse-num {
            color: var(--verse-num);
            font-size: 0.75em;
            vertical-align: super;
            font-weight: 700;
            margin-right: 2px;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }
        .chapter-heading {
            font-weight: 700;
            font-size: 0.9rem;
            color: var(--text-muted);
            margin: 12px 0 4px;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }
        .chapter-heading:first-child { margin-top: 0; }
        .section-heading {
            font-weight: 700;
            font-size: 1.05rem;
            color: var(--accent);
            margin: 18px 0 6px;
            font-family: 'Segoe UI', system-ui, sans-serif;
            letter-spacing: 0.2px;
        }
        .section-heading:first-child { margin-top: 0; }

        /* Note markers (footnotes, cross-references) */
        .note-marker {
            display: inline-block;
            margin-left: 3px;
            padding: 2px 7px;
            font-size: 0.75em;
            font-weight: 700;
            cursor: pointer;
            border-radius: 6px;
            vertical-align: super;
            line-height: 1.2;
            transition: background 0.15s, transform 0.1s;
            font-family: 'Segoe UI', system-ui, sans-serif;
            user-select: none;
            min-width: 20px;
            text-align: center;
        }
        .note-marker:active { transform: scale(0.92); }
        @media (max-width: 700px) {
            /* Større touch-område på mobil */
            .note-marker {
                padding: 4px 10px;
                font-size: 0.85em;
                margin-left: 4px;
                margin-right: 2px;
                min-width: 28px;
                border: 1px solid transparent;
            }
            .note-footnote { border-color: rgba(212, 180, 74, 0.3); }
            .note-xref { border-color: rgba(168, 50, 50, 0.25); }
        }
        .note-footnote {
            color: #8b6914;
            background: rgba(212, 180, 74, 0.15);
        }
        .note-footnote:hover, .note-footnote.active {
            background: rgba(212, 180, 74, 0.4);
        }
        .note-xref {
            color: var(--accent);
            background: rgba(168, 50, 50, 0.1);
        }
        .note-xref:hover, .note-xref.active {
            background: rgba(168, 50, 50, 0.25);
        }
        [data-theme="dark"] .note-footnote { color: #d4a84b; }

        /* Popover */
        .note-popover {
            display: block;
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 10px 36px 10px 14px;
            margin: 8px 0;
            font-family: 'Segoe UI', system-ui, sans-serif;
            font-size: 0.92rem;
            line-height: 1.5;
            box-shadow: var(--shadow);
            position: relative;
            max-height: 320px;
            overflow-y: auto;
        }
        .note-popover-label {
            font-size: 0.72rem;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.6px;
            margin-bottom: 4px;
        }
        .note-popover-text {
            color: var(--text);
        }
        .note-popover-refs {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            margin-top: 8px;
        }
        .note-popover-refs .xref-btn {
            padding: 8px 14px;
            background: transparent;
            border: 1px solid var(--border);
            border-radius: 999px;
            color: var(--accent);
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 600;
            transition: all 0.15s;
            min-height: 34px;
        }
        .note-popover-refs .xref-btn:hover,
        .note-popover-refs .xref-btn:active {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
        }
        @media (max-width: 700px) {
            .note-popover-refs .xref-btn {
                padding: 10px 16px;
                font-size: 0.95rem;
                min-height: 40px;
            }
            .note-popover { padding: 14px 44px 14px 16px; }
            .note-popover-close { font-size: 1.5rem; padding: 6px 10px; }
        }
        .note-popover-close {
            position: absolute;
            top: 6px;
            right: 8px;
            background: transparent;
            border: none;
            color: var(--text-muted);
            font-size: 1.2rem;
            cursor: pointer;
            line-height: 1;
            padding: 2px 6px;
            border-radius: 4px;
        }
        .note-popover-close:hover { background: rgba(0,0,0,0.08); color: var(--text); }
        .xref-showmore {
            margin-top: 10px;
            padding: 8px 14px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 999px;
            cursor: pointer;
            font-size: 0.88rem;
            font-weight: 600;
            transition: background 0.15s;
        }
        .xref-showmore:hover, .xref-showmore:active { background: var(--accent-hover); }

        /* Card footer buttons */
        .verse-card-footer {
            display: flex;
            gap: 8px;
            margin-top: 12px;
            padding-top: 10px;
            border-top: 1px solid var(--border);
            flex-wrap: wrap;
        }
        .card-action-btn {
            padding: 6px 14px;
            font-size: 0.8rem;
            background: transparent;
            border: 1px solid var(--border);
            border-radius: 999px;
            cursor: pointer;
            color: var(--text-muted);
            transition: all 0.2s;
            white-space: nowrap;
        }
        .card-action-btn:hover { border-color: var(--accent); color: var(--accent); }

        /* Error */
        .error-card { background: var(--error-bg); border-left: 4px solid var(--error); }
        .error-card .verse-card-label { color: var(--error); }
        .error-message { color: var(--error); font-size: 0.95rem; }

        /* Text search results */
        .search-result-item {
            background: var(--card-bg);
            border-radius: 24px;
            padding: 14px 18px;
            margin-bottom: 10px;
            box-shadow: var(--shadow);
            cursor: pointer;
            transition: border-color 0.2s;
            border: 2px solid transparent;
        }
        .search-result-item:hover { border-color: var(--accent); }
        .search-result-ref {
            font-weight: 700;
            color: var(--accent);
            font-size: 0.9rem;
            margin-bottom: 4px;
        }
        .search-result-text {
            font-family: 'Georgia', 'Times New Roman', serif;
            font-size: 1rem;
            line-height: 1.6;
            color: var(--text);
        }
        .search-result-count {
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-bottom: 12px;
        }

        /* All-versions view */
        .all-versions-block {
            background: var(--card-bg);
            border-radius: 24px;
            padding: 20px 24px;
            margin-bottom: 16px;
            box-shadow: var(--shadow);
        }
        .all-versions-block .version-label {
            font-weight: 700;
            font-size: 0.95rem;
            color: var(--accent);
            margin-bottom: 6px;
        }
        .all-versions-block .verse-text {
            margin-bottom: 16px;
        }
        .all-versions-block .verse-text:last-child { margin-bottom: 0; }

        /* Collapsible book groups - integrated card style */
        .book-group {
            margin-bottom: 10px;
            background: var(--card-bg);
            border: 2px solid var(--border);
            border-radius: 24px;
            overflow: hidden;
            transition: border-color 0.2s;
        }
        .book-group:has(.book-group-header.open) { border-color: var(--accent); }
        .book-group-header {
            padding: 12px 18px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: 700;
            color: var(--accent);
            user-select: none;
        }
        .book-group-header:hover { background: rgba(168, 50, 50, 0.04); }
        [data-theme="dark"] .book-group-header:hover { background: rgba(201, 68, 68, 0.08); }
        .book-group-header .chevron {
            transition: transform 0.2s;
            font-size: 0.8em;
            color: var(--text-muted);
        }
        .book-group-header.open .chevron { transform: rotate(90deg); }
        .book-group-count {
            font-weight: 400;
            color: var(--text-muted);
            font-size: 0.9em;
            margin-left: 6px;
        }
        .book-group-items {
            display: none;
            border-top: 1px solid var(--border);
        }
        .book-group-items.open { display: block; }
        .book-group-item {
            padding: 12px 18px;
            cursor: pointer;
            border-bottom: 1px solid var(--border);
            transition: background 0.15s;
        }
        .book-group-item:last-child { border-bottom: none; }
        .book-group-item:hover { background: rgba(168, 50, 50, 0.05); }
        [data-theme="dark"] .book-group-item:hover { background: rgba(201, 68, 68, 0.1); }
        .book-group-item.expanded { background: rgba(168, 50, 50, 0.05); }
        [data-theme="dark"] .book-group-item.expanded { background: rgba(201, 68, 68, 0.1); }
        .book-group-more {
            padding: 10px 18px;
            font-size: 0.85rem;
            color: var(--text-muted);
            font-style: italic;
            border-top: 1px solid var(--border);
            text-align: center;
        }
        .book-group-actions {
            padding: 10px 18px;
            border-top: 1px solid var(--border);
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .other-version-header {
            font-weight: 700;
            color: var(--accent);
            margin: 16px 0 8px;
            padding: 0 2px;
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .search-controls {
            display: flex;
            gap: 10px;
            align-items: center;
            margin-bottom: 14px;
            flex-wrap: wrap;
        }

        /* Empty state */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
        }
        .empty-state h2 { font-size: 1.3rem; margin-bottom: 10px; color: var(--text); }
        .empty-state p { font-size: 0.95rem; line-height: 1.6; }
        .empty-state code {
            background: var(--border);
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 0.9em;
        }

        /* Toast */
        .toast {
            position: fixed; bottom: 24px; left: 50%;
            transform: translateX(-50%) translateY(80px);
            background: #333; color: white;
            padding: 10px 20px;
            border-radius: 999px;
            font-size: 0.9rem;
            opacity: 0;
            transition: all 0.3s;
            z-index: 1000;
            pointer-events: none;
        }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

        .btn-ai {
            background: #f5f0e0;
            color: #8b6914;
            border: 1px solid #d4b44a;
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 0.9rem;
            cursor: pointer;
            font-weight: 500;
            transition: background 0.2s;
            white-space: nowrap;
        }
        .btn-ai:hover { background: #ede3c0; }
        .btn-ai:disabled { opacity: 0.6; cursor: wait; }
        [data-theme="dark"] .btn-ai { background: #3a3010; color: #d4a84b; border-color: #6b5520; }
        [data-theme="dark"] .btn-ai:hover { background: #4a3e14; }

        /* Compare card (side by side on PC, stacked on mobil) */
        .verse-card.compare-card {
            border-top: 3px solid var(--accent);
        }
        @media (min-width: 701px) {
            .verse-card.compare-card { border-top: none; border-left: 3px solid var(--accent); }
        }
        .compare-card-header { flex-wrap: wrap; gap: 10px; }

        /* Compare version bar */
        .compare-version-bar {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 10px;
            flex-wrap: wrap;
        }
        .compare-version-bar-label {
            font-size: 0.82rem;
            color: var(--text-muted);
            font-weight: 500;
        }
        .compare-version-btn {
            padding: 4px 14px;
            border-radius: 999px;
            border: 1.5px solid var(--border);
            background: var(--card-bg);
            color: var(--text);
            cursor: pointer;
            font-size: 0.82rem;
            font-weight: 600;
            transition: all 0.15s;
        }
        .compare-version-btn.active { background: var(--accent); color: white; border-color: var(--accent); }
        .compare-version-btn:hover:not(.active) { border-color: var(--accent); color: var(--accent); }

        /* Custom version picker */
        .version-picker { position: relative; flex-shrink: 0; display: flex; }
        .version-picker-trigger {
            display: flex;
            align-items: center;
            gap: 5px;
            padding: 0 14px;
            background: transparent;
            border: none;
            border-left: 1px solid var(--border);
            color: var(--text);
            cursor: pointer;
            font-size: 0.88rem;
            font-weight: 600;
            white-space: nowrap;
            height: 100%;
            transition: background 0.15s;
        }
        .version-picker-trigger:hover { background: rgba(0,0,0,0.04); }
        [data-theme="dark"] .version-picker-trigger:hover { background: rgba(255,255,255,0.06); }
        .version-picker-arrow { font-size: 0.72rem; color: var(--text-muted); transition: transform 0.2s; }
        .version-picker.open .version-picker-arrow { transform: rotate(180deg); }
        .version-picker-panel {
            display: none;
            position: fixed;
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 18px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.14);
            min-width: 210px;
            z-index: 300;
            padding: 6px;
        }
        .version-picker-panel.open { display: block; }
        .version-option {
            display: flex;
            flex-direction: column;
            padding: 9px 14px;
            cursor: pointer;
            border-radius: 12px;
            transition: background 0.1s;
        }
        .version-option:hover { background: rgba(168,50,50,0.07); }
        .version-option.selected { background: rgba(168,50,50,0.12); }
        [data-theme="dark"] .version-option:hover { background: rgba(201,68,68,0.1); }
        [data-theme="dark"] .version-option.selected { background: rgba(201,68,68,0.16); }
        .version-option-name { font-weight: 700; font-size: 0.9rem; color: var(--text); }
        .version-option-desc { font-size: 0.75rem; color: var(--text-muted); margin-top: 1px; }
        .ai-diff-section {
            margin: -4px 0 16px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .ai-diff-buttons {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .ai-diff-buttons .btn-diff { flex: 1; min-width: 140px; }

        .btn-diff {
            padding: 10px 18px;
            font-size: 0.9rem;
            background: #fef3c7;
            color: #92400e;
            border: 1px solid #fbbf24;
            border-radius: 999px;
            cursor: pointer;
            font-weight: 600;
            transition: background 0.2s;
        }
        .btn-diff:hover { background: #fde68a; }
        .btn-diff:disabled { opacity: 0.6; cursor: wait; }
        [data-theme="dark"] .btn-diff { background: #3b2200; color: #fbbf24; border-color: #7c4a00; }

        .suggestion-item {

        [data-theme="dark"] .suggestion-item:hover, [data-theme="dark"] .suggestion-item.hover {

        .suggestion-icon { flex: 0 0 auto; font-size: 1em; }
        .suggestion-text { flex: 1; min-width: 0; }

        /* Desktop: suggestions appear BELOW the search input */
        @media (min-width: 701px) {
            .desktop-only .suggestions {
                top: calc(100% + 8px);
                bottom: auto;
            }

        @media (max-width: 700px) {

            .controls-actions .btn-primary,

        @media (min-width: 701px) {

            .app-header {
                border-radius: 24px;

            /* Sentrert oppstart: header + søkefelt sentrert midt på skjermen */
            .search-area {
                max-width: 640px;

            .page-top-mode .results-wrapper {

            /* Sammenligningsvisning trenger bredere layout */
            .page-top-mode.compare-active .search-area { max-width: 1300px; }
            .page-top-mode.compare-active .results-wrapper { max-width: 1300px; }
        }
        @media (max-width: 700px) {
            .app-header { padding: 10px 16px; }
            .app-header h1 { font-size: 1.1rem; }
            .header-logo { height: 30px; }
        }
    </style>

            Forkortelser og engelske navn fungerer også: <code>joh</code>, <code>1. mos</code>, <code>rom</code><br>

<script>
    // ── State ──
    let compareMode = false;
    let lastQuery = '';
    let aiDiffState = null; // null | {loading:true} | {text:'...'} | {error:'...'}
    let mainData = null;
    let compareData = null;
    let currentView = 'normal'; // 'normal', 'text_search', 'all_versions'
    let booksData = [];
    let allVersionsCache = null; // {results, label} for re-rendering
    let textSearchCache = null; // {results, query} for re-rendering
    let collapsed = true; // default: search results grouped by book
    let highlightVerse = null; // verse number to highlight when reading chapter
    let sessionForcedTop = false;  // når satt til true, forblir søkefeltet på toppen hele økten

    function updatePageLayoutMode(isSingleVerse) {
        if (!sessionForcedTop && !isSingleVerse) {
            sessionForcedTop = true;
        }
        if (sessionForcedTop) {
            document.body.classList.add('page-top-mode');
            document.body.classList.remove('page-center-mode');
        } else {
            document.body.classList.add('page-center-mode');
            document.body.classList.remove('page-top-mode');
        }
        document.body.classList.toggle('compare-active', compareMode && !!compareData);
    }

    // ── BibleHub interlinear URL mapping ──
    const BIBLEHUB_SLUGS = {
        GEN:'genesis',EXO:'exodus',LEV:'leviticus',NUM:'numbers',DEU:'deuteronomy',
        JOS:'joshua',JDG:'judges',RUT:'ruth',
        '1SA':'1_samuel','2SA':'2_samuel','1KI':'1_kings','2KI':'2_kings',
        '1CH':'1_chronicles','2CH':'2_chronicles',
        EZR:'ezra',NEH:'nehemiah',EST:'esther',JOB:'job',PSA:'psalms',
        PRO:'proverbs',ECC:'ecclesiastes',SNG:'songs',
        ISA:'isaiah',JER:'jeremiah',LAM:'lamentations',EZK:'ezekiel',DAN:'daniel',
        HOS:'hosea',JOL:'joel',AMO:'amos',OBA:'obadiah',JON:'jonah',MIC:'micah',
        NAM:'nahum',HAB:'habakkuk',ZEP:'zephaniah',HAG:'haggai',ZEC:'zechariah',MAL:'malachi',
        MAT:'matthew',MRK:'mark',LUK:'luke',JHN:'john',ACT:'acts',ROM:'romans',
        '1CO':'1_corinthians','2CO':'2_corinthians',
        GAL:'galatians',EPH:'ephesians',PHP:'philippians',COL:'colossians',
        '1TH':'1_thessalonians','2TH':'2_thessalonians',
        '1TI':'1_timothy','2TI':'2_timothy',TIT:'titus',PHM:'philemon',
        HEB:'hebrews',JAS:'james',
        '1PE':'1_peter','2PE':'2_peter',
        '1JN':'1_john','2JN':'2_john','3JN':'3_john',
        JUD:'jude',REV:'revelation'
    };

    function bookName(code) {
        const b = booksData.find(x => x.code === code);
        return b ? b.name : code;
    }

    // Labels kommer allerede på norsk fra serveren — ingen oversettelse nødvendig
    function translateLabel(label, bookCode) {
        return label;
    }

    function interlinearUrl(bookCode, chapter, verseNum) {
        const slug = BIBLEHUB_SLUGS[bookCode];
        if (!slug) return null;
        if (verseNum != null) {
            return `https://biblehub.com/interlinear/${slug}/${chapter}-${verseNum}.htm`;
        }
        return `https://biblehub.com/interlinear/${slug}/${chapter}.htm`;
    }

    // ── Elements ──
    // Desktop inputs
    const searchInputDesktop = document.getElementById('searchInput');
    const versionSelectDesktop = document.getElementById('versionSelect');
    const searchBtnDesktop = document.getElementById('searchBtn');
    const compareBtnDesktop = null;
    // Mobile inputs
    const searchInputMobile = document.getElementById('searchInputMobile');
    const versionSelectMobile = document.getElementById('versionSelectMobile');
    const searchBtnMobile = document.getElementById('searchBtnMobile');
    const compareBtnMobile = null;
    // Shared helpers: always read active input
    function getSearchInput() {
        const mobile = document.getElementById('searchBottomBar');
        if (mobile && getComputedStyle(mobile).display !== 'none') return searchInputMobile;
        return searchInputDesktop;
    }
    function getVersionSelect() {
        const mobile = document.getElementById('searchBottomBar');
        if (mobile && getComputedStyle(mobile).display !== 'none') return versionSelectMobile;
        return versionSelectDesktop;
    }
    // Proxy: versionSelect / searchInput / compareBtn used throughout code
    // We create live proxies that delegate to the active element
    const versionSelect = { get value() { return getVersionSelect().value; },
                             set value(v) { versionSelectDesktop.value = v; versionSelectMobile.value = v; },
                             add(opt) { versionSelectDesktop.add(opt); versionSelectMobile.add(new Option(opt.text, opt.value)); },
                             addEventListener(evt, fn) { versionSelectDesktop.addEventListener(evt, fn); versionSelectMobile.addEventListener(evt, fn); } };
    const searchInput = {
        get value() {
            // Normaliser non-breaking spaces til vanlige mellomrom
            return (getSearchInput().textContent || '').replace(/\u00A0/g, ' ').replace(/\s+/g, ' ').trim();
        },
        set value(v) {
            searchInputDesktop.textContent = v;
            searchInputMobile.textContent = v;
            formatSearchInputCE(searchInputDesktop);
            formatSearchInputCE(searchInputMobile);
        }
    };

    // ── Contenteditable operator formatting (bold " and -word) ──
    function getCursorOffset(el) {
        const sel = window.getSelection();
        if (!sel.rangeCount) return 0;
        const range = sel.getRangeAt(0);
        const pre = range.cloneRange();
        pre.selectNodeContents(el);
        pre.setEnd(range.endContainer, range.endOffset);
        return pre.toString().length;
    }
    function setCursorOffset(el, offset) {
        const sel = window.getSelection();
        const range = document.createRange();
        let pos = 0;
        function walk(node) {
            if (node.nodeType === Node.TEXT_NODE) {
                const len = node.nodeValue.length;
                if (pos + len >= offset) {
                    range.setStart(node, Math.max(0, offset - pos));
                    range.collapse(true);
                    return true;
                }
                pos += len;
            } else {
                for (const c of node.childNodes) if (walk(c)) return true;
            }
            return false;
        }
        if (!walk(el)) {
            range.selectNodeContents(el);
            range.collapse(false);
        }
        sel.removeAllRanges();
        sel.addRange(range);
    }
    function buildFormattedHtml(text) {
        let html = '';
        let inQuote = false;
        for (let i = 0; i < text.length; i++) {
            const c = text[i];
            if (c === '"') {
                html += '<b>"</b>';
                inQuote = !inQuote;
            } else if (c === '-' && !inQuote && (i === 0 || text[i - 1] === ' ') &&
                       i + 1 < text.length && text[i + 1] !== ' ' && text[i + 1] !== '-') {
                html += '<b>-</b>';
            } else if (c === '<') html += '&lt;';
            else if (c === '>') html += '&gt;';
            else if (c === '&') html += '&amp;';
            else html += c;
        }
        return html;
    }
    function formatSearchInputCE(el) {
        const text = el.textContent;
        const isFocused = document.activeElement === el;
        const cursor = isFocused ? getCursorOffset(el) : null;
        const newHtml = buildFormattedHtml(text);
        if (el.innerHTML !== newHtml) el.innerHTML = newHtml;
        if (isFocused && cursor != null) setCursorOffset(el, cursor);
    }
    function setupSearchCE(el) {
        el.addEventListener('input', () => formatSearchInputCE(el));
        el.addEventListener('keydown', e => {
            if (e.key === 'Enter') {
                e.preventDefault();
                doSearch();
            }
        });
        el.addEventListener('paste', e => {
            e.preventDefault();
            const text = (e.clipboardData || window.clipboardData).getData('text/plain');
            document.execCommand('insertText', false, text.replace(/\n/g, ' '));
        });
    }
    setupSearchCE(searchInputDesktop);
    setupSearchCE(searchInputMobile);

    // Hjelper: har søket operatorer (bypass KI)?
    function queryHasOperators(q) {
        if (q.indexOf('"') !== -1) return true;
        return q.split(/\s+/).some(t => t.startsWith('-') && t.length > 1);
    }
    // Legacy no-op proxy (compare is now per-card, ikke en global knapp)
    const compareBtn = { classList: { toggle() {} }, show() {}, hide() {} };

const resultsWrapper = document.getElementById('resultsWrapper');
    const compareVersionSelect = document.getElementById('compareVersionSelect');
    const emptyState = document.getElementById('emptyState');
    const emptyStateHtml = emptyState.outerHTML;
    const toast = document.getElementById('toast');
    // bookSelect/chapterSelect ble fjernet — bruk kolon-prefix (Johannes:) eller referanse (Johannes 3) i stedet
    const bookSelect = null;
    const chapterSelect = null;

    // ── Version display names (folder name → display name) ──
    const VERSION_DISPLAY = {
        'NB88': 'NB88/07',
    };
    const VERSION_DESC = {
        'NB88':     'Norsk Bibel 1988/2007',
        'Bibel2011':'Bibelen 2011',
        'Bibel1930':'Bibelen 1930',
        'BGO':      'Bibelen Guds Ord',
        'ESV':      'English Standard Version',
        'KJV':      'King James Version',
        'NASB1995': 'New American Standard Bible',
        'NIV':      'New International Version',
        'NKJV':     'New King James Version',
    };
    function versionLabel(v) { return VERSION_DISPLAY[v] || v; }

    // ── Custom version picker (desktop) ──
    const versionPickerDesktop = document.getElementById('versionPickerDesktop');
    const versionPickerTrigger = document.getElementById('versionPickerTrigger');
    const versionPickerLabel  = document.getElementById('versionPickerLabel');
    const versionPickerPanel  = document.getElementById('versionPickerPanel');
    const versionSelectEl     = document.getElementById('versionSelect');

    function buildVersionPickerPanel() {
        if (!versionPickerPanel) return;
        const selected = versionSelectEl.value;
        versionPickerLabel.textContent = versionLabel(selected);
        versionPickerPanel.innerHTML = Array.from(versionSelectEl.options).map(o =>
            `<div class="version-option${o.value === selected ? ' selected' : ''}" onclick="pickVersion('${o.value}')">
                <span class="version-option-name">${escHtml(versionLabel(o.value))}</span>
                <span class="version-option-desc">${escHtml(VERSION_DESC[o.value] || o.text)}</span>
            </div>`
        ).join('');
    }

    if (versionPickerTrigger) {
        versionPickerTrigger.addEventListener('click', e => {
            e.stopPropagation();
            const isOpen = !versionPickerPanel.classList.contains('open');
            versionPickerPanel.classList.toggle('open', isOpen);
            versionPickerDesktop.classList.toggle('open', isOpen);
            if (isOpen) {
                buildVersionPickerPanel();
                const rect = versionPickerTrigger.getBoundingClientRect();
                versionPickerPanel.style.top = (rect.bottom + 8) + 'px';
                versionPickerPanel.style.right = (window.innerWidth - rect.right) + 'px';
            }
        });
    }
    document.addEventListener('click', () => {
        if (versionPickerPanel) versionPickerPanel.classList.remove('open');
        if (versionPickerDesktop) versionPickerDesktop.classList.remove('open');
    });

    window.pickVersion = function(v) {
        versionSelect.value = v;
        versionSelectEl.dispatchEvent(new Event('change'));
        versionPickerLabel.textContent = versionLabel(v);
        if (versionPickerPanel) versionPickerPanel.classList.remove('open');
        if (versionPickerDesktop) versionPickerDesktop.classList.remove('open');
    };

    // ── Browser history (fram/tilbake-knapper) ──
    let isRestoringHistory = false;

    function buildUrl(state) {
        const url = new URL(window.location.origin + window.location.pathname);
        if (!state || state.view === 'home') return url.toString();
        if (state.query) url.searchParams.set('q', state.query);
        if (state.version) url.searchParams.set('v', state.version);
        if (state.view && state.view !== 'normal') url.searchParams.set('view', state.view);
        if (state.highlightVerse) url.searchParams.set('hv', state.highlightVerse);
        if (state.label) url.searchParams.set('label', state.label);
        if (state.bookFilter) url.searchParams.set('book', state.bookFilter);
        return url.toString();
    }

    function pushHistoryState(state) {
        if (isRestoringHistory) return;
        history.pushState(state, '', buildUrl(state));
    }

    function replaceHistoryState(state) {
        if (isRestoringHistory) return;
        history.replaceState(state, '', buildUrl(state));
    }

    async function restoreFromState(state) {
        isRestoringHistory = true;
        try {
            if (!state || state.view === 'home') {
                goHome();
                return;
            }
            if (state.version && versionSelect.value !== state.version) {
                versionSelect.value = state.version;
            }
            if (state.view === 'all_versions' && state.label) {
                await showAllVersions(state.label);
                return;
            }
            searchInput.value = state.query || '';
            lastQuery = state.query || '';
            highlightVerse = state.highlightVerse || null;
            await doSearch();
        } finally {
            isRestoringHistory = false;
        }
    }

    window.addEventListener('popstate', e => {
        restoreFromState(e.state);
    });

    // På første sidelast: hvis URL har ?q= osv., restaurér
    function restoreFromUrl() {
        const params = new URLSearchParams(window.location.search);
        const q = params.get('q');
        if (!q) return false;
        const state = {
            query: q,
            version: params.get('v') || null,
            view: params.get('view') || 'normal',
            highlightVerse: params.get('hv') ? parseInt(params.get('hv'), 10) : null,
            label: params.get('label') || null,
            bookFilter: params.get('book') || null,
        };
        history.replaceState(state, '', window.location.href);
        // Vent til init er ferdig (versjoner lastet)
        setTimeout(() => restoreFromState(state), 50);
        return true;
    }

    // ── Suggestions ──
    const suggestionsDesktop = document.getElementById('suggestionsDesktop');
    const suggestionsMobile = document.getElementById('suggestionsMobile');

    function activeSuggestionsEl() {
        return document.activeElement === searchInputMobile ? suggestionsMobile : suggestionsDesktop;
    }

    function looksEnglish(q) {
        if (!q) return false;
        // Inneholder kun ASCII-bokstaver + mellomrom, og ingen norske spesialtegn
        if (/[æøåÆØÅ]/.test(q)) return false;
        return /^[A-Za-z\s']+$/.test(q);
    }

    function parseSimpleReference(q) {
        // Prøv å identifisere book + kapittel fra en streng som "Joh 3" eller "Matteus 5:3"
        // Returnerer {bookCode, chapter} eller null
        const m = q.trim().match(/^(.+?)\s+(\d+)(?::\d+.*)?$/);
        if (!m) return null;
        const maybeBook = m[1].toLowerCase().replace(/[.,]/g, '').trim();
        const chapter = parseInt(m[2], 10);
        const book = booksData.find(b => b.name.toLowerCase().startsWith(maybeBook) || (b.code.toLowerCase() === maybeBook));
        return book ? { bookCode: book.code, chapter } : null;
    }

    // Finn bøker som matcher input (prefix-match på navn)
    function findMatchingBooks(input) {
        const q = input.toLowerCase().trim();
        if (q.length < 2) return [];
        return booksData
            .map(b => {
                const lower = b.name.toLowerCase();
                const startsWith = lower.startsWith(q);
                const contains = !startsWith && lower.includes(q);
                return { book: b, startsWith, contains };
            })
            .filter(x => x.startsWith || x.contains)
            .sort((a, b) => (a.startsWith === b.startsWith ? a.book.name.length - b.book.name.length : (a.startsWith ? -1 : 1)))
            .slice(0, 2)
            .map(x => x.book);
    }

    function buildSuggestions(query) {
        const q = query.trim();
        const candidates = [];  // { priority, suggestion } — høy prioritet = nederst (best)
        const versions = Array.from(versionSelectDesktop.options).map(o => o.value);
        const currentVer = versionSelect.value;

        // Når feltet er tomt: bare nylige søk (maks 3, nyeste nederst)
        if (q.length < 2) {
            const recent = getRecentSearches().slice(0, 3);
            // Reverse så nyeste er nederst (nærmest søkefeltet)
            recent.slice().reverse().forEach((r, idx) => {
                candidates.push({
                    priority: idx + 1,
                    suggestion: {
                        icon: '🕘',
                        html: escHtml(r),
                        onClick: () => { searchInput.value = r; doSearch(); closeSuggestions(); }
                    }
                });
            });
            return finalizeSuggestions(candidates);
        }

        const wordCount = q.split(/\s+/).filter(Boolean).length;
        const hasOperators = q.indexOf('"') !== -1 || /\s-\S/.test(' ' + q);
        const hasBookPrefix = /^[^:]+:\s*/.test(q) && !q.startsWith('"');

        // ── HØY PRIORITET: Bok-match (brukerens hovedforespørsel) ──
        if (!hasBookPrefix && !hasOperators) {
            const matched = findMatchingBooks(q);
            matched.forEach((book, i) => {
                candidates.push({
                    priority: 100 - i,  // første match er mest relevant
                    suggestion: {
                        icon: '🎯',
                        html: `Søk bare i <strong>${escHtml(book.name)}</strong>`,
                        hint: '(filter-prefiks)',
                        onClick: () => {
                            searchInput.value = `${book.name}: `;
                            const input = getSearchInput();
                            input.focus();
                            formatSearchInputCE(input);
                            setCursorOffset(input, input.textContent.length);
                            updateSuggestions();
                        }
                    }
                });
            });
        }

        // ── Eksakt søk: ≥3 ord, ingen anførselstegn ──
        if (wordCount >= 3 && q.indexOf('"') === -1) {
            candidates.push({
                priority: 80,
                suggestion: {
                    icon: '🔍',
                    html: `Søk eksakt: <strong>${escHtml('"' + q + '"')}</strong>`,
                    onClick: () => { searchInput.value = `"${q}"`; doSearch(); closeSuggestions(); }
                }
            });
        }

        // ── Begrens til bok (etter tekstsøk med treff) ──
        if (textSearchCache && textSearchCache.bookTotals && textSearchCache.query === q && !hasOperators) {
            const topBooks = Object.entries(textSearchCache.bookTotals)
                .sort((a, b) => b[1] - a[1]).slice(0, 1);
            topBooks.forEach(([code, count]) => {
                candidates.push({
                    priority: 75,
                    suggestion: {
                        icon: '🎯',
                        html: `Søk kun i <strong>${escHtml(bookName(code))}</strong>`,
                        hint: `(${count} treff)`,
                        onClick: () => { searchOnlyInBook(code); closeSuggestions(); }
                    }
                });
            });
        }

        // ── Parallellsteder (kjent referanse) ──
        const ref = parseSimpleReference(q);
        if (ref) {
            const parallels = PARALLELS[`${ref.bookCode}:${ref.chapter}`];
            if (parallels && parallels[0]) {
                candidates.push({
                    priority: 70,
                    suggestion: {
                        icon: '🔗',
                        html: `Parallellsted: <strong>${escHtml(parallels[0].label)}</strong>`,
                        hint: parallels[0].ref,
                        onClick: () => { searchInput.value = parallels[0].ref; doSearch(); closeSuggestions(); }
                    }
                });
            }
        }

        // ── Ekskluder ord (etter tekstsøk) ──
        if (textSearchCache && textSearchCache.results && textSearchCache.query === q && !hasOperators) {
            const commonWords = topWordsInResults(textSearchCache.results, q);
            if (commonWords[0]) {
                candidates.push({
                    priority: 60,
                    suggestion: {
                        icon: '➖',
                        html: `Ekskluder: <strong>${escHtml(commonWords[0])}</strong>`,
                        hint: '(smalere søk)',
                        onClick: () => { searchInput.value = `${q} -${commonWords[0]}`; doSearch(); closeSuggestions(); }
                    }
                });
            }
        }

        // ── Tekstsøk-variant: hvis input ligner et boknavn (allerede dekket av bok-forslag over) ──

        // ── Engelsk versjon-bytte ──
        if (looksEnglish(q) && currentVer === 'Bibel2011') {
            const engVer = versions.find(v => ['ESV','KJV','NIV','NKJV','NASB1995'].includes(v));
            if (engVer) {
                candidates.push({
                    priority: 40,
                    suggestion: {
                        icon: '🌍',
                        html: `Søk i <strong>${escHtml(versionLabel(engVer))}</strong>`,
                        hint: '(engelsk)',
                        onClick: () => { versionSelect.value = engVer; doSearch(); closeSuggestions(); }
                    }
                });
            }
        }

        // ── NT / GT filter ──
        candidates.push({
            priority: 20,
            suggestion: {
                icon: '✝️',
                html: `Søk kun i <strong>Det nye testamentet</strong>`,
                onClick: () => { searchInTestament(q, 'NT'); closeSuggestions(); }
            }
        });
        candidates.push({
            priority: 15,
            suggestion: {
                icon: '📜',
                html: `Søk kun i <strong>Det gamle testamentet</strong>`,
                onClick: () => { searchInTestament(q, 'GT'); closeSuggestions(); }
            }
        });

        return finalizeSuggestions(candidates);
    }

    // Sortér etter prioritet stigende, ta toppen-4, behold rekkefølgen så best er nederst
    function finalizeSuggestions(candidates) {
        candidates.sort((a, b) => a.priority - b.priority);
        return candidates.slice(-4).map(c => c.suggestion);
    }

    function topWordsInResults(results, query) {
        const queryWords = new Set(query.toLowerCase().split(/\s+/).filter(Boolean));
        const stopWords = new Set(['og','i','er','det','de','den','at','som','han','hun','på','av','til','med','for','å','en','et','ei','men','så','skal','har','blir','ikke','var','ble','vil','kan','må','oss','dere','meg','deg','seg','jeg','du','vi','alle','hans','hennes','sin','sitt','sine','når','da','hvor','hva','hvem']);
        const counts = {};
        results.forEach(r => {
            const words = r.text.toLowerCase().replace(/[.,:;!?'"\u00AB\u00BB\-]/g, ' ').split(/\s+/);
            words.forEach(w => {
                if (!w || w.length < 4) return;
                if (queryWords.has(w)) return;
                if (stopWords.has(w)) return;
                counts[w] = (counts[w] || 0) + 1;
            });
        });
        return Object.entries(counts).sort((a, b) => b[1] - a[1]).map(([w]) => w);
    }

    async function searchInTestament(query, testament) {
        const targetBooks = booksData.map(b => b.code).filter(c => testament === 'NT' ? isNtBook(c) : !isNtBook(c));
        if (!targetBooks.length) return;
        setSearchLoading(true);
        const version = versionSelect.value;
        try {
            // Kjør parallelle søk for hver bok
            const allResults = [];
            const bookTotals = {};
            const chunks = await Promise.all(targetBooks.map(code =>
                fetchWithRetry(`/api/search?q=${encodeURIComponent(query)}&version=${encodeURIComponent(version)}&book=${encodeURIComponent(code)}`)
                    .then(r => r.json()).catch(() => null)
            ));
            chunks.forEach(d => {
                if (d && d.results) {
                    d.results.forEach(r => allResults.push(r));
                    Object.entries(d.book_totals || {}).forEach(([k, v]) => bookTotals[k] = v);
                }
            });
            const total = Object.values(bookTotals).reduce((s, n) => s + n, 0);
            currentView = 'text_search';
            collapsed = true;
            renderTextSearch(allResults, query, bookTotals, total);
            searchInput.value = `${testament}: ${query}`;
            lastQuery = query;
        } finally {
            setSearchLoading(false);
        }
    }

    function renderSuggestions(el, suggestions) {
        if (!suggestions.length) { el.classList.remove('open'); el.innerHTML = ''; return; }
        let html = '';
        suggestions.forEach((s, i) => {
            if (s.groupLabel) {
                html += `<div class="suggestions-group-label">${escHtml(s.groupLabel)}</div>`;
                return;
            }
            html += `<div class="suggestion-item" data-idx="${i}">
                <span class="suggestion-icon">${s.icon || ''}</span>
                <span class="suggestion-text">${s.html}</span>
                ${s.hint ? `<span class="suggestion-hint">${escHtml(s.hint)}</span>` : ''}
            </div>`;
        });
        el.innerHTML = html;
        el.classList.add('open');
        el.querySelectorAll('.suggestion-item').forEach(item => {
            const i = parseInt(item.getAttribute('data-idx'), 10);
            item.addEventListener('mousedown', e => {
                e.preventDefault();  // unngå blur på input før click kjøres
                suggestions[i].onClick && suggestions[i].onClick();
            });
        });
    }

    function updateSuggestions() {
        const el = activeSuggestionsEl();
        const active = document.activeElement;
        if (active !== searchInputDesktop && active !== searchInputMobile) {
            closeSuggestions();
            return;
        }
        const q = searchInput.value;
        const list = buildSuggestions(q);
        renderSuggestions(el, list);
    }

    function closeSuggestions() {
        suggestionsDesktop.classList.remove('open');
        suggestionsMobile.classList.remove('open');
    }

    [searchInputDesktop, searchInputMobile].forEach(el => {
        el.addEventListener('input', updateSuggestions);
        el.addEventListener('focus', updateSuggestions);
        el.addEventListener('blur', () => setTimeout(closeSuggestions, 200));
    });
    document.addEventListener('click', e => {
        if (!e.target.closest('.suggestions') && !e.target.closest('.search-bar-wrap')) {
            closeSuggestions();
        }
    });

    // ── Fetch with retry for transient network errors ──
    async function fetchWithRetry(url, options = {}, retries = 2) {
        let lastErr;
        for (let attempt = 0; attempt <= retries; attempt++) {
            try {
                const resp = await fetch(url, options);
                return resp;
            } catch (err) {
                lastErr = err;
                console.warn(`[fetch retry ${attempt + 1}/${retries + 1}] ${url}:`, err.message || err);
                if (attempt < retries) {
                    await new Promise(r => setTimeout(r, 300 * (attempt + 1)));
                }
            }
        }
        throw lastErr;
    }

    // ── Search in-flight tracking to prevent overlapping requests ──
    let searchInFlight = false;
    function setSearchLoading(loading) {
        searchInFlight = loading;
        [searchBtnDesktop, searchBtnMobile].forEach(b => {
            b.disabled = loading;
            b.style.opacity = loading ? '0.6' : '';
        });
    }

    // ── Search ──
    searchBtnDesktop.addEventListener('click', () => doSearch());
    searchBtnMobile.addEventListener('click', () => doSearch());
    searchInputDesktop.addEventListener('keydown', e => { if (e.key === 'Enter') doSearch(); });
    searchInputMobile.addEventListener('keydown', e => { if (e.key === 'Enter') doSearch(); });

    async function doSearch(isAiRetry = false) {
        const query = searchInput.value.trim();
        if (!query) return;
        if (searchInFlight && !isAiRetry) return;  // Prevent overlapping searches
        if (!isAiRetry) {
            lastQuery = query;
            highlightVerse = null;
            setSearchLoading(true);
            addRecentSearch(query);
            closeSuggestions();
            clearAiReformulated();  // nytt bruker-initiert søk → fjern gammel KI-indikator
            pushHistoryState({
                view: 'normal', query, version: versionSelect.value,
            });
        }
        currentView = 'normal';
        aiDiffState = null;

        const version = versionSelect.value;
        try {
            const resp = await fetchWithRetry(`/api/search?q=${encodeURIComponent(query)}&version=${encodeURIComponent(version)}`);
            const data = await resp.json();
            if (data.error) {
                resultsWrapper.innerHTML = errorCardHtml('Feil', data.error);
                return;
            }

            if (data.type === 'text_search') {
                const usesOperators = data.has_operators || queryHasOperators(query);
                if (data.results.length === 0 && !isAiRetry) {
                    if (usesOperators) {
                        // Operatorsøk: ingen KI — prøv andre versjoner i stedet
                        await searchOtherVersions(query, version);
                        return;
                    }
                    // Vanlig søk uten treff: bruk KI
                    await tryAiFallback(query);
                    return;
                }
                currentView = 'text_search';
                renderTextSearch(data.results, data.query, data.book_totals || {}, data.total || data.results.length);
                compareBtn.hide();
                return;
            }

            mainData = data.results;
            const hasContent = mainData.some(b => b.verses && b.verses.length > 0);
            if (!hasContent && !isAiRetry) {
                if (queryHasOperators(query)) {
                    // Skulle ikke skje (operatorer gir tekstsøk på server), men vær safe
                    resultsWrapper.innerHTML = `<div class="empty-state"><h2>Ingen resultater</h2></div>`;
                    return;
                }
                await tryAiFallback(query);
                return;
            }

            if (compareMode) {
                await fetchCompareData(query);
            } else {
                compareData = null;
            }
            renderAll();
            compareBtn.show();
        } catch (err) {
            console.error('[doSearch] feil:', err);
            resultsWrapper.innerHTML = errorCardHtml('Feil', 'Kunne ikke koble til serveren: ' + (err.message || err));
        } finally {
            if (!isAiRetry) setSearchLoading(false);
        }
    }

    // Søk på tvers av alle andre versjoner når gjeldende versjon ikke har treff (kun for operatorsøk)
    async function searchOtherVersions(query, currentVersion) {
        resultsWrapper.innerHTML = `<div class="empty-state"><p><span class="ai-searching">Søkte i andre versjoner…</span></p></div>`;
        try {
            const allVersResp = await fetchWithRetry('/api/versions');
            const allVers = (await allVersResp.json()).versions || [];
            const otherVersions = allVers.filter(v => v !== currentVersion);
            const hits = [];
            for (const v of otherVersions) {
                try {
                    const r = await fetchWithRetry(`/api/search?q=${encodeURIComponent(query)}&version=${encodeURIComponent(v)}`);
                    const d = await r.json();
                    if (d.type === 'text_search' && d.results && d.results.length > 0) {
                        hits.push({ version: v, results: d.results, bookTotals: d.book_totals || {}, total: d.total || d.results.length });
                    }
                } catch {}
            }
            if (hits.length === 0) {
                resultsWrapper.innerHTML = `<div class="empty-state"><h2>Ingen resultater</h2><p>Ingen vers funnet for «${escHtml(query)}» i noen versjon.</p></div>`;

            }
            // Render stable banner + hver versjon som egen seksjon
            let html = `<div class="empty-state" style="padding:20px 10px;"><p style="color:var(--text-muted);">Ingen treff i <b>${escHtml(versionLabel(currentVersion))}</b> — søkte i andre versjoner:</p></div>`;
            hits.forEach(h => {
                html += `<div class="other-version-header">${escHtml(versionLabel(h.version))} — ${h.total} treff</div>`;
                // Render hver versjon som en bok-gruppe-samling inline
                const groups = {};
                const order = [];
                h.results.forEach(r => {
                    if (!groups[r.book]) { groups[r.book] = []; order.push(r.book); }
                    groups[r.book].push(r);
                });
                order.forEach(code => {
                    const items = groups[code];
                    const bName = bookName(code);
                    const totalInBook = h.bookTotals[code] || items.length;
                    const countLabel = totalInBook > items.length ? `${items.length}+` : `${items.length}`;
                    html += `<div class="book-group">
                        <div class="book-group-header" onclick="this.classList.toggle('open');this.nextElementSibling.classList.toggle('open')">

    function markAiReformulated() {
        [document.getElementById('searchBarWrapDesktop'), document.getElementById('searchBarWrapMobile')].forEach(el => {
            if (!el) return;
            el.classList.add('ai-reformulated');

    async function tryAiFallback(originalQuery) {
        resultsWrapper.innerHTML = `<div class="empty-state"><p><span class="ai-searching">✨ Prøver å reformulere med KI…</span></p></div>`;
        try {
            const aiResp = await fetch(`/api/ai_parse?q=${encodeURIComponent(originalQuery)}`);
            const aiData = await aiResp.json();
            if (aiData.result && aiData.result.trim() !== originalQuery.trim()) {
                searchInput.value = aiData.result;
                lastQuery = aiData.result;
                markAiReformulated();
                await doSearch(true);
            } else {
                // Show empty results
                resultsWrapper.innerHTML = `<div class="empty-state"><h2>Ingen resultater</h2><p>Ingen vers funnet for «${escHtml(originalQuery)}».</p></div>`;
            }
        } catch {
            resultsWrapper.innerHTML = `<div class="empty-state"><h2>Ingen resultater</h2><p>Ingen vers funnet for «${escHtml(originalQuery)}».</p></div>`;
        }
    }

    async function fetchCompareData(query) {
        const version = compareVersionSelect.value;
        try {
            const resp = await fetch(`/api/search?q=${encodeURIComponent(query)}&version=${encodeURIComponent(version)}`);
            const data = await resp.json();
            if (data.type === 'reference' && !data.error) {
                compareData = data.results;
            } else {
                compareData = null;
            }
        } catch { compareData = null; }
    }

    // ── AI: toggle diff ──
    window.toggleDiff = async function() {
        if (aiDiffState && aiDiffState.text) {
            aiDiffState = null;
            renderAll();
            return;
        }
        if (aiDiffState && aiDiffState.loading) return;

        const text1 = (mainData || []).flatMap(b => b.verses || []).map(v => v.text).join(' ');
        const text2 = (compareData || []).flatMap(b => b.verses || []).map(v => v.text).join(' ');
        if (!text1 || !text2) { showToast('Ingen tekst å sammenligne'); return; }

        aiDiffState = { loading: true };
        renderAll();

        try {
            const resp = await fetch('/api/ai_diff', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    text1, text2,
                    label: (mainData[0] && mainData[0].label) || lastQuery,
                    version1: versionLabel(versionSelect.value),
                    version2: versionLabel(compareVersionSelect.value),
                })
            });
            const data = await resp.json();
            aiDiffState = data.error ? { error: data.error } : { text: data.result };
        } catch {
            aiDiffState = { error: 'Kunne ikke koble til serveren.' };
        }
        renderAll();
    };

    // ── AI: finn mest ulike versjon ──
    window.findMostDifferent = async function() {
        if (aiDiffState && (aiDiffState.loading || aiDiffState.text)) return;
        const label = (mainData && mainData[0] && mainData[0].label) || lastQuery;
        if (!label) { showToast('Ingen referanse å sammenligne'); return; }
        aiDiffState = { loading: true };
        renderAll();
        try {
            const resp = await fetch('/api/ai_most_different', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    label,
                    current_version: versionLabel(versionSelect.value),
                })
            });
            const data = await resp.json();
            if (!data.error) {
                // Finn hvilken kjent versjon som er nevnt i svaret og bytt til den
                const allVersions = Array.from(document.getElementById('versionSelect').options).map(o => o.value);
                const found = allVersions.find(v => data.result.includes(v) || data.result.includes(versionLabel(v)));
                if (found && found !== versionSelect.value) {
                    compareVersionSelect.value = found;
                    if (!compareMode) { compareMode = true; }
                    await fetchCompareData(lastQuery);
                }
            }
            aiDiffState = data.error ? { error: data.error } : { text: data.result };
        } catch {
            aiDiffState = { error: 'Kunne ikke koble til serveren.' };
        }
        renderAll();
    };

    // ── Render reference results ──
    function renderAll() {
        if (!mainData || mainData.length === 0) {
            resultsWrapper.innerHTML = emptyStateHtml;
            return;
        }
        // Layout: enkelt vers holder sentrert; større resultater flytter til toppen
        const isSingleVerse = mainData.length === 1
            && mainData[0].verses && mainData[0].verses.length === 1
            && !mainData[0].error;
        updatePageLayoutMode(isSingleVerse);

        const showCompare = compareMode && compareData;
        let html = '';

        // Compare version bar øverst
        if (showCompare) {
            const mainV = versionSelect.value;
            const allV = Array.from(document.getElementById('versionSelect').options).map(o => o.value);
            html += `<div class="compare-version-bar"><span class="compare-version-bar-label">Sammenligner med:</span>`;
            allV.filter(v => v !== mainV).forEach(v => {
                const active = v === compareVersionSelect.value ? ' active' : '';
                html += `<button class="compare-version-btn${active}" onclick="setCompareVersion('${escAttr(v)}')">${escHtml(versionLabel(v))}</button>`;
            });
            html += `</div>`;
        }

        // Side by side (PC) / stablet (mobil)
        for (let idx = 0; idx < mainData.length; idx++) {
            const mainBlock = mainData[idx];
            const compBlock = showCompare && idx < compareData.length ? compareData[idx] : null;

            if (showCompare) {
                html += '<div class="verse-row">';
                html += buildCardHtml(mainBlock, idx, false);
                html += buildCompareCardHtml(compBlock, idx);
                html += '</div>';
            } else {
                html += buildCardHtml(mainBlock, idx, false);
            }
        }

        // Bunnseksjon: KI-sammenligning
        if (showCompare) {
            html += '<div class="ai-diff-section">';
            if (aiDiffState && aiDiffState.text) {
                html += `<div class="diff-result-card">${escHtml(aiDiffState.text)}</div>`;
            } else if (aiDiffState && aiDiffState.error) {
                html += `<div class="diff-result-card" style="color:var(--error);border-color:var(--error);background:var(--error-bg);">${escHtml(aiDiffState.error)}</div>`;
            } else {
                const disabled = aiDiffState && aiDiffState.loading ? 'disabled' : '';
                html += `<div class="ai-diff-buttons">
                    <button class="btn-diff" onclick="toggleDiff()" ${disabled}>
                        ${aiDiffState && aiDiffState.loading ? 'Analyserer…' : '✨ Sammenlign'}
                    </button>
                    <button class="btn-diff" onclick="findMostDifferent()" ${disabled}>
                        ${aiDiffState && aiDiffState.loading ? 'Analyserer…' : '🔍 Finn største ulikhet'}
                    </button>
                </div>`;
            }
            html += '</div>';
        }

        resultsWrapper.innerHTML = html;
    }

    function buildCardHtml(block, idx, isCompare) {

        const displayLabel = block.label;
        let html = `<div class="verse-card" id="card-${idx}">
            <div class="verse-card-header">
                <span class="verse-card-label">${escHtml(displayLabel)}</span>
                <button class="copy-btn" onclick="copyBlock(${idx}, false)">Kopier</button>
            </div>

            html += `<div class="verse-card-footer">

                <button class="card-action-btn" onclick="showAllVersions('${escAttr(block.label)}')">Alle versjoner</button>`;
            if (ilUrl) {
                html += `<a class="card-action-btn" href="${ilUrl}" target="_blank" rel="noopener" style="text-decoration:none;">biblehub</a>`;
            }

    function buildCompareCardHtml(block, idx) {
        const vLabel = escHtml(versionLabel(compareVersionSelect.value));
        if (!block) {
            return `<div class="verse-card compare-card">
                <div class="verse-card-header">
                    <span class="verse-card-label">${vLabel}</span>

    function renderVerseTextHtml(verses, hlVerse) {
        let html = '';
        let lastChapter = null;
        const isMultiChapter = verses.some(x => x.chapter !== verses[0]?.chapter);

        verses.forEach((v, vi) => {
            if (isMultiChapter && v.chapter !== lastChapter) {
                html += `<div class="chapter-heading">Kapittel ${v.chapter}</div>`;
                lastChapter = v.chapter;
            } else if (lastChapter === null) {
                lastChapter = v.chapter;
            }

            // Seksjonsoverskrift: vises før verset hvis 'section' er satt
            if (v.section) {
                html += `<div class="section-heading">${escHtml(v.section)}</div>`;
            }

            html += `<span class="verse-num">${v.num}</span>`;
            const txt = escHtml(v.text) + ' ';
            if (hlVerse != null && v.num === hlVerse) {
                html += `<mark class="highlighted-verse">${txt}</mark>`;
            } else {
                html += txt;
            }

            // Fotnote-markører etter versteksten
            if (v.footnotes && v.footnotes.length) {
                v.footnotes.forEach((fn, i) => {
                    const dataAttr = escAttr(JSON.stringify({type: 'footnote', text: fn.text, marker: fn.marker}));
                    html += `<sup class="note-marker note-footnote" data-note='${dataAttr}' onclick="toggleNotePopover(this, event)" title="Fotnote">${escHtml(fn.marker || '*')}</sup>`;
                });
            }
            // Xrefs: samlet i én markør (viser alle referanser når man klikker)
            if (v.xrefs && v.xrefs.length) {
                const dataAttr = escAttr(JSON.stringify({type: 'xref', items: v.xrefs}));
                html += `<sup class="note-marker note-xref" data-note='${dataAttr}' onclick="toggleNotePopover(this, event)" title="${v.xrefs.length} kryssreferanser">†</sup>`;
            }

            lastChapter = v.chapter;
        });
        return html;
    }

    // Popover for fotnoter og kryssreferanser
    window.toggleNotePopover = function(el, event) {
        if (event) event.stopPropagation();
        // Lukk eksisterende popovers
        document.querySelectorAll('.note-popover').forEach(p => p.remove());
        if (el.classList.contains('active')) {
            el.classList.remove('active');
            return;
        }
        document.querySelectorAll('.note-marker.active').forEach(n => n.classList.remove('active'));
        el.classList.add('active');

        const data = JSON.parse(el.getAttribute('data-note'));
        const pop = document.createElement('div');
        pop.className = 'note-popover';
        let content = '';
        if (data.type === 'footnote') {
            content = `<div class="note-popover-label">Fotnote</div><div class="note-popover-text">${escHtml(data.text)}</div>`;
        } else if (data.type === 'xref') {
            const items = data.items || [];
            const count = items.length;
            const initial = Math.min(count, 10);
            content = `<div class="note-popover-label">Kryssreferanser (${count}) — sortert etter relevans</div>`;
            content += `<div class="note-popover-refs" data-showing="${initial}" data-total="${count}">`;
            items.slice(0, initial).forEach(item => {
                const display = formatUsfmRef(item.r);
                if (!display) return;
                content += `<button class="xref-btn" onclick="event.stopPropagation(); navigateToRef('${escAttr(display)}')" title="${item.v} stemmer">${escHtml(display)}</button>`;
            });
            content += `</div>`;
            if (count > initial) {
                const restEncoded = JSON.stringify(items.slice(initial)).replace(/"/g, '&quot;');
                content += `<button class="xref-showmore" data-rest="${restEncoded}" onclick="event.stopPropagation(); showMoreXrefs(this)">Vis alle ${count} →</button>`;
            }
        }
        pop.innerHTML = content + `<button class="note-popover-close" onclick="event.stopPropagation(); this.parentNode.remove(); document.querySelectorAll('.note-marker.active').forEach(n=>n.classList.remove('active'));">×</button>`;
        el.parentNode.insertBefore(pop, el.nextSibling);
    };

    // Konverter USFM som 'JHN.3.16' eller 'JHN.1.1-3' eller 'JHN.1.1-2.5' til visningstekst
    function formatUsfmRef(usfmRef) {
        // Del på '-' for range
        const parts = usfmRef.split('-');
        if (parts.length === 1) {
            const m = usfmRef.match(/^([^.]+)\.(\d+)\.(\d+)$/);
            if (!m) return null;
            return `${bookName(m[1])} ${m[2]}:${m[3]}`;
        }
        // Range — mulige former:
        //   JHN.1.1-3          (samme kap)
        //   JHN.1.1-2.5        (kryss-kapittel samme bok)
        //   JHN.1.1-ROM.1.1    (kryss-bok)
        const start = parts[0].match(/^([^.]+)\.(\d+)\.(\d+)$/);
        if (!start) return null;
        const startDisplay = `${bookName(start[1])} ${start[2]}:${start[3]}`;
        const endRaw = parts[1];
        const endFull = endRaw.match(/^([^.]+)\.(\d+)\.(\d+)$/);
        const endMid = endRaw.match(/^(\d+)\.(\d+)$/);
        const endVerse = endRaw.match(/^(\d+)$/);
        if (endFull) return `${startDisplay} – ${bookName(endFull[1])} ${endFull[2]}:${endFull[3]}`;
        if (endMid) return `${startDisplay}–${endMid[1]}:${endMid[2]}`;
        if (endVerse) return `${startDisplay}–${endVerse[1]}`;
        return startDisplay;
    }

    // Vis resterende xrefs (når det er >10)
    window.showMoreXrefs = function(btnEl) {
        const rest = JSON.parse(btnEl.getAttribute('data-rest'));
        const refsDiv = btnEl.previousElementSibling;
        rest.forEach(item => {
            const display = formatUsfmRef(item.r);
            if (!display) return;
            const b = document.createElement('button');
            b.className = 'xref-btn';
            b.title = `${item.v} stemmer`;
            b.textContent = display;
            b.onclick = (e) => { e.stopPropagation(); navigateToRef(display); };
            refsDiv.appendChild(b);
        });
        btnEl.remove();
    };

    // ── Text search results ──
