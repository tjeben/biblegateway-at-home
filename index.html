<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BibleGateway at home</title>
    <link rel="icon" href="/logo_biblegateway.png" type="image/png" sizes="any">
    <link rel="shortcut icon" href="/favicon.ico">
    <link rel="apple-touch-icon" sizes="180x180" href="/logo_biblegateway.png">
    <style>
        :root {
            --bg: #f5f1eb;
            --card-bg: #ffffff;
            --text: #2c2c2c;
            --text-muted: #6b6b6b;
            --accent: #a83232;
            --accent-hover: #8c2828;
            --border: #d4cfc7;
            --error: #9c3030;
            --error-bg: #fdf0f0;
            --verse-num: #a83232;
            --shadow: 0 2px 8px rgba(0,0,0,0.08);
        }

        [data-theme="dark"] {
            --bg: #1a1a1e;
            --card-bg: #26262b;
            --text: #e0e0e0;
            --text-muted: #9a9a9a;
            --accent: #c94444;
            --accent-hover: #b33636;
            --border: #3a3a40;
            --error: #e05555;
            --error-bg: #2e1a1a;
            --verse-num: #c94444;
            --shadow: 0 2px 8px rgba(0,0,0,0.3);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        .header {
            background: var(--accent);
            color: white;
            padding: 12px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 2px 12px rgba(0,0,0,0.15);
        }
        .header-left {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
        }
        .header-logo {
            height: 40px;
            width: auto;
            display: block;
        }
        .header h1 { font-size: 1.4rem; font-weight: 600; letter-spacing: 0.5px; }
        @media (max-width: 480px) {
            .header { padding: 10px 16px; }
            .header-logo { height: 30px; }
            .header h1 { font-size: 1.1rem; }
        }

        .controls {
            max-width: 1400px;
            margin: 20px auto 0;
            padding: 0 24px;
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
        }

        .search-box {
            flex: 1;
            min-width: 250px;
        }
        .search-box input {
            width: 100%;
            padding: 12px 16px;
            font-size: 1rem;
            border: 2px solid var(--border);
            border-radius: 8px;
            background: var(--card-bg);
            color: var(--text);
            outline: none;
            transition: border-color 0.2s;
        }
        .search-box input:focus { border-color: var(--accent); }
        .search-box input::placeholder { color: #aaa; }

        .btn {
            padding: 10px 20px;
            font-size: 0.95rem;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
            transition: background 0.2s, transform 0.1s;
        }
        .btn:active { transform: scale(0.97); }
        .btn-primary { background: var(--accent); color: white; }
        .btn-primary:hover { background: var(--accent-hover); }
        .btn-secondary { background: var(--card-bg); color: var(--text); border: 2px solid var(--border); }
        .btn-secondary:hover { background: #f0ede7; }
        [data-theme="dark"] .btn-secondary:hover { background: #32323a; }
        .btn-secondary.active { background: var(--accent); color: white; border-color: var(--accent); }

        select {
            padding: 10px 14px;
            font-size: 0.95rem;
            border: 2px solid var(--border);
            border-radius: 8px;
            background: var(--card-bg);
            color: var(--text);
            cursor: pointer;
            outline: none;
        }
        select:focus { border-color: var(--accent); }
        select option { background: var(--card-bg); color: var(--text); }

        .dark-toggle {
            background: transparent;
            border: 2px solid rgba(255,255,255,0.3);
            color: white;
            width: 38px; height: 38px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1.1rem;
            line-height: 1;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transition: border-color 0.2s;
        }
        .dark-toggle:hover { border-color: rgba(255,255,255,0.6); }

        /* Book browser / sorter */
        .browser-bar {
            max-width: 1400px;
            margin: 12px auto 0;
            padding: 0 24px;
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }
        .browser-bar > label {
            font-size: 0.9rem;
            color: var(--text-muted);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-right: 2px;
        }
        .browser-bar select {
            padding: 7px 10px;
            font-size: 0.9rem;
        }
        /* Mobil-versjonsvelger — bare synlig på mobil */
        .mobile-version-select { display: none; }
        @media (max-width: 700px) {
            .mobile-version-select { display: block; flex: 1; min-width: 100px; }
        }

        /* Toggles */
        .toggles {
            max-width: 1400px;
            margin: 12px auto 0;
            padding: 0 24px;
            display: flex;
            gap: 20px;
            align-items: center;
            flex-wrap: wrap;
        }
        .toggle-group {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9rem;
            color: var(--text-muted);
        }
        .toggle { position: relative; width: 42px; height: 24px; }
        .toggle input { opacity: 0; width: 0; height: 0; }
        .toggle-slider {
            position: absolute; inset: 0;
            background: var(--border);
            border-radius: 24px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .toggle-slider::before {
            content: '';
            position: absolute;
            width: 18px; height: 18px;
            left: 3px; bottom: 3px;
            background: white;
            border-radius: 50%;
            transition: transform 0.2s;
        }
        .toggle input:checked + .toggle-slider { background: var(--accent); }
        .toggle input:checked + .toggle-slider::before { transform: translateX(18px); }

        /* Results area */
        .results-wrapper {
            max-width: 1400px;
            margin: 20px auto;
            padding: 0 24px 40px;
        }
        .verse-row {
            display: flex;
            gap: 20px;
            margin-bottom: 16px;
            align-items: stretch;
        }
        .verse-row > .verse-card {
            flex: 1;
            min-width: 0;
            margin-bottom: 0;
        }
        .compare-columns-header {
            display: flex;
            gap: 20px;
            margin-bottom: 12px;
        }
        .column-label {
            flex: 1;
            min-width: 0;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-muted);
        }
        .column-label select {
            padding: 5px 8px;
            font-size: 0.85rem;
            text-transform: none;
            letter-spacing: 0;
            font-weight: 400;
        }

        /* Back button */
        .back-bar {
            margin-bottom: 16px;
        }
        .back-btn {
            padding: 6px 16px;
            font-size: 0.85rem;
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            cursor: pointer;
            color: var(--text-muted);
            transition: all 0.2s;
        }
        .back-btn:hover { border-color: var(--accent); color: var(--accent); }

        /* Verse card */
        .verse-card {
            background: var(--card-bg);
            border-radius: 10px;
            padding: 20px 24px;
            margin-bottom: 16px;
            box-shadow: var(--shadow);
            position: relative;
            display: flex;
            flex-direction: column;
        }
        .verse-card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--border);
        }
        .verse-card-label { font-weight: 700; font-size: 1rem; color: var(--accent); }
        .copy-btn {
            padding: 5px 12px;
            font-size: 0.8rem;
            background: transparent;
            border: 1px solid var(--border);
            border-radius: 6px;
            cursor: pointer;
            color: var(--text-muted);
            transition: all 0.2s;
            white-space: nowrap;
        }
        .copy-btn:hover { background: var(--accent); color: white; border-color: var(--accent); }

        .verse-text {
            font-family: 'Georgia', 'Times New Roman', 'Palatino Linotype', serif;
            font-size: 1.1rem;
            line-height: 1.8;
            color: var(--text);
            flex: 1;
        }
        .verse-num {
            color: var(--verse-num);
            font-size: 0.75em;
            vertical-align: super;
            font-weight: 700;
            margin-right: 2px;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }
        .chapter-heading {
            font-weight: 700;
            font-size: 0.9rem;
            color: var(--text-muted);
            margin: 12px 0 4px;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }
        .chapter-heading:first-child { margin-top: 0; }

        /* Card footer buttons */
        .verse-card-footer {
            display: flex;
            gap: 8px;
            margin-top: 12px;
            padding-top: 10px;
            border-top: 1px solid var(--border);
            flex-wrap: wrap;
        }
        .card-action-btn {
            padding: 5px 12px;
            font-size: 0.8rem;
            background: transparent;
            border: 1px solid var(--border);
            border-radius: 6px;
            cursor: pointer;
            color: var(--text-muted);
            transition: all 0.2s;
            white-space: nowrap;
        }
        .card-action-btn:hover { border-color: var(--accent); color: var(--accent); }

        /* Error */
        .error-card { background: var(--error-bg); border-left: 4px solid var(--error); }
        .error-card .verse-card-label { color: var(--error); }
        .error-message { color: var(--error); font-size: 0.95rem; }

        /* Text search results */
        .search-result-item {
            background: var(--card-bg);
            border-radius: 8px;
            padding: 14px 18px;
            margin-bottom: 10px;
            box-shadow: var(--shadow);
            cursor: pointer;
            transition: border-color 0.2s;
            border: 2px solid transparent;
        }
        .search-result-item:hover { border-color: var(--accent); }
        .search-result-ref {
            font-weight: 700;
            color: var(--accent);
            font-size: 0.9rem;
            margin-bottom: 4px;
        }
        .search-result-text {
            font-family: 'Georgia', 'Times New Roman', serif;
            font-size: 1rem;
            line-height: 1.6;
            color: var(--text);
        }
        .search-result-count {
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-bottom: 12px;
        }

        /* All-versions view */
        .all-versions-block {
            background: var(--card-bg);
            border-radius: 10px;
            padding: 20px 24px;
            margin-bottom: 16px;
            box-shadow: var(--shadow);
        }
        .all-versions-block .version-label {
            font-weight: 700;
            font-size: 0.95rem;
            color: var(--accent);
            margin-bottom: 6px;
        }
        .all-versions-block .verse-text {
            margin-bottom: 16px;
        }
        .all-versions-block .verse-text:last-child { margin-bottom: 0; }

        /* Collapsible book groups - integrated card style */
        .book-group {
            margin-bottom: 10px;
            background: var(--card-bg);
            border: 2px solid var(--border);
            border-radius: 8px;
            overflow: hidden;
            transition: border-color 0.2s;
        }
        .book-group:has(.book-group-header.open) { border-color: var(--accent); }
        .book-group-header {
            padding: 12px 18px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: 700;
            color: var(--accent);
            user-select: none;
        }
        .book-group-header:hover { background: rgba(168, 50, 50, 0.04); }
        [data-theme="dark"] .book-group-header:hover { background: rgba(201, 68, 68, 0.08); }
        .book-group-header .chevron {
            transition: transform 0.2s;
            font-size: 0.8em;
            color: var(--text-muted);
        }
        .book-group-header.open .chevron { transform: rotate(90deg); }
        .book-group-count {
            font-weight: 400;
            color: var(--text-muted);
            font-size: 0.9em;
            margin-left: 6px;
        }
        .book-group-items {
            display: none;
            border-top: 1px solid var(--border);
        }
        .book-group-items.open { display: block; }
        .book-group-item {
            padding: 12px 18px;
            cursor: pointer;
            border-bottom: 1px solid var(--border);
            transition: background 0.15s;
        }
        .book-group-item:last-child { border-bottom: none; }
        .book-group-item:hover { background: rgba(168, 50, 50, 0.05); }
        [data-theme="dark"] .book-group-item:hover { background: rgba(201, 68, 68, 0.1); }
        .book-group-item.expanded { background: rgba(168, 50, 50, 0.05); }
        [data-theme="dark"] .book-group-item.expanded { background: rgba(201, 68, 68, 0.1); }
        .book-group-more {
            padding: 10px 18px;
            font-size: 0.85rem;
            color: var(--text-muted);
            font-style: italic;
            border-top: 1px solid var(--border);
            text-align: center;
        }
        .book-group-actions {
            padding: 10px 18px;
            border-top: 1px solid var(--border);
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .other-version-header {
            font-weight: 700;
            color: var(--accent);
            margin: 16px 0 8px;
            padding: 0 2px;
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .search-controls {
            display: flex;
            gap: 10px;
            align-items: center;
            margin-bottom: 14px;
            flex-wrap: wrap;
        }

        /* Empty state */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
        }
        .empty-state h2 { font-size: 1.3rem; margin-bottom: 10px; color: var(--text); }
        .empty-state p { font-size: 0.95rem; line-height: 1.6; }
        .empty-state code {
            background: var(--border);
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 0.9em;
        }

        /* Toast */
        .toast {
            position: fixed; bottom: 24px; left: 50%;
            transform: translateX(-50%) translateY(80px);
            background: #333; color: white;
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 0.9rem;
            opacity: 0;
            transition: all 0.3s;
            z-index: 1000;
            pointer-events: none;
        }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

        .btn-ai {
            background: #f5f0e0;
            color: #8b6914;
            border: 1px solid #d4b44a;
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 0.9rem;
            cursor: pointer;
            font-weight: 500;
            transition: background 0.2s;
            white-space: nowrap;
        }
        .btn-ai:hover { background: #ede3c0; }
        .btn-ai:disabled { opacity: 0.6; cursor: wait; }
        [data-theme="dark"] .btn-ai { background: #3a3010; color: #d4a84b; border-color: #6b5520; }
        [data-theme="dark"] .btn-ai:hover { background: #4a3e14; }

        /* Compare card (stacked directly below main card) */
        .verse-card.compare-card {
            margin-top: -10px;  /* knytt nærmere hovedkortet */
            border-top: 3px solid var(--accent);
        }
        .compare-card-header {
            flex-wrap: wrap;
            gap: 10px;
        }
        .compare-card-header .compare-version-inline {
            padding: 5px 10px;
            font-size: 0.9rem;
            border: 1px solid var(--border);
            border-radius: 6px;
            background: var(--card-bg);
            color: var(--text);
            cursor: pointer;
            flex: 1;
            min-width: 100px;
        }
        .ai-diff-section {
            margin: -4px 0 16px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .ai-diff-section .btn-diff {
            align-self: flex-start;
        }

        .btn-diff {
            padding: 10px 18px;
            font-size: 0.9rem;
            background: #fef3c7;
            color: #92400e;
            border: 1px solid #fbbf24;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: background 0.2s;
        }
        .btn-diff:hover { background: #fde68a; }
        .btn-diff:disabled { opacity: 0.6; cursor: wait; }
        [data-theme="dark"] .btn-diff { background: #3b2200; color: #fbbf24; border-color: #7c4a00; }
        [data-theme="dark"] .btn-diff:hover { background: #4a2d00; }

        .diff-result-card {
            background: #fffbeb;
            border: 1px solid #fbbf24;
            border-radius: 8px;
            padding: 14px 18px;
            margin-top: 10px;
            font-size: 0.95rem;
            line-height: 1.6;
            color: #78350f;
        }
        [data-theme="dark"] .diff-result-card { background: #2d1a00; color: #fde68a; border-color: #7c4a00; }

        .controls-actions {
            display: flex;
            gap: 8px;
            align-items: center;
            flex-wrap: wrap;
        }

        /* Integrated search bar: input + version select + search btn in one row */
        .search-bar-wrap {
            display: flex;
            align-items: stretch;
            border: 2px solid var(--border);
            border-radius: 999px;  /* pilleformet som iOS Safari */
            background: var(--card-bg);
            overflow: hidden;
            transition: border-color 0.2s;
            flex: 1;
            min-width: 250px;
        }
        .search-bar-wrap:focus-within { border-color: var(--accent); }
        .search-bar-wrap input,
        .search-bar-wrap .search-ce {
            flex: 1;
            padding: 12px 18px;  /* litt mer venstre-padding for pille-formen */
            font-size: 1rem;
            border: none;
            background: transparent;
            color: var(--text);
            outline: none;
            min-width: 0;
            white-space: nowrap;
            overflow-x: auto;
            font-family: inherit;
        }
        .search-bar-wrap input::placeholder { color: #aaa; }
        .search-bar-wrap .search-ce:empty::before {
            content: attr(data-placeholder);
            color: #aaa;
            pointer-events: none;
        }
        .search-bar-wrap .search-ce b {
            font-weight: 900;
            color: var(--accent);
        }
        .search-bar-wrap .search-version-select {
            padding: 8px 10px;
            font-size: 0.85rem;
            border: none;
            border-left: 1px solid var(--border);
            border-radius: 0;
            background: var(--card-bg);
            color: var(--text);
            cursor: pointer;
            outline: none;
            min-width: 80px;
        }
        .search-bar-wrap .search-btn-inline {
            padding: 10px 18px;
            font-size: 0.95rem;
            border: none;
            border-left: 1px solid var(--border);
            border-radius: 0;
            background: var(--accent);
            color: white;
            cursor: pointer;
            font-weight: 600;
            transition: background 0.2s;
            white-space: nowrap;
        }
        .search-bar-wrap .search-btn-inline:hover { background: var(--accent-hover); }
        .search-bar-wrap .search-btn-inline:active { transform: scale(0.97); }

        /* Sort/browse toggle button */
        .sort-toggle-btn {
            padding: 10px 14px;
            font-size: 1.1rem;
            border: 2px solid var(--border);
            border-radius: 8px;
            background: var(--card-bg);
            color: var(--text-muted);
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
        }
        .sort-toggle-btn:hover, .sort-toggle-btn.active { border-color: var(--accent); color: var(--accent); }

        /* Highlighted verse when reading chapter */
        .highlighted-verse {
            background: rgba(168, 50, 50, 0.15);
            border-radius: 3px;
            padding: 1px 3px;
        }
        [data-theme="dark"] .highlighted-verse { background: rgba(201, 68, 68, 0.2); }

        /* Inline verse expansion in text search */
        .inline-verse-expand {
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px dashed var(--border);
        }
        .inline-verse-expand-actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .search-result-item.expanded { border-color: var(--accent); background: var(--card-bg); }

        /* AI loading indicator */
        .ai-searching {
            display: inline-block;
            font-size: 0.82rem;
            color: var(--text-muted);
            padding: 4px 10px;
            background: var(--card-bg);
            border-radius: 6px;
            border: 1px solid var(--border);
            margin-left: 8px;
        }

        /* Suggestions dropdown */
        .suggestions-wrap {
            position: relative;
        }
        .suggestions {
            position: absolute;
            left: 0;
            right: 0;
            bottom: calc(100% + 8px);
            background: var(--card-bg);
            border: 2px solid var(--border);
            border-radius: 10px;
            box-shadow: var(--shadow);
            max-height: 280px;
            overflow-y: auto;
            z-index: 110;
            display: none;
        }
        .suggestions.open { display: block; }
        .suggestions-group-label {
            font-size: 0.7rem;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.6px;
            padding: 8px 14px 4px;
        }
        .suggestion-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 14px;
            cursor: pointer;
            font-size: 0.92rem;
            border-bottom: 1px solid var(--border);
            transition: background 0.1s;
        }
        .suggestion-item:last-child { border-bottom: none; }
        .suggestion-item:hover, .suggestion-item.hover {
            background: rgba(168, 50, 50, 0.06);
        }
        [data-theme="dark"] .suggestion-item:hover, [data-theme="dark"] .suggestion-item.hover {
            background: rgba(201, 68, 68, 0.1);
        }
        .suggestion-icon { flex: 0 0 auto; font-size: 1em; }
        .suggestion-text { flex: 1; min-width: 0; }
        .suggestion-text strong { color: var(--accent); }
        .suggestion-hint {
            font-size: 0.78rem;
            color: var(--text-muted);
            margin-left: 8px;
            flex: 0 0 auto;
        }

        @media (max-width: 700px) {
