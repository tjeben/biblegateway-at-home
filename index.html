    // Popover for fotnoter og kryssreferanser
    window.toggleNotePopover = function(el, event) {
        if (event) event.stopPropagation();
        // Lukk eksisterende popovers (animert)
        document.querySelectorAll('.note-popover:not(.closing)').forEach(p => closePopoverAnimated(p));
        if (el.classList.contains('active')) {
            el.classList.remove('active');
            return;
        }
        document.querySelectorAll('.note-marker.active').forEach(n => n.classList.remove('active'));
        el.classList.add('active');

        const data = JSON.parse(el.getAttribute('data-note'));
        const pop = document.createElement('div');
        pop.className = 'note-popover';
        let content = '';
        if (data.type === 'footnote') {
            content = `<div class="note-popover-label">Fotnote</div><div class="note-popover-text">${escHtml(data.text)}</div>`;
        } else if (data.type === 'xref') {
            const items = data.items || [];
            const count = items.length;
            const initial = Math.min(count, 10);
            const source = data.source;
            // Header m/ label til venstre og evt. visualiseringsknapper til høyre
            let headerBtns = '';
            if (count >= 3) {
                const perBook = countXrefsPerBook(items);
                if (Object.keys(perBook).length >= 2) {
                    const encoded = JSON.stringify(perBook).replace(/"/g, '&quot;');
                    headerBtns += `<button class="bible-map-toggle" data-book-counts="${encoded}" onclick="event.stopPropagation(); openXrefMap(this)">🗺️ Kart</button>`;
                }
                if (source) {
                    const info = JSON.stringify({ source, items }).replace(/"/g, '&quot;');
                    headerBtns += `<button class="bible-map-toggle" data-xref-info="${info}" onclick="event.stopPropagation(); openXrefTimeline(this)">📈 Tidslinje</button>`;
                }
            }
            content = `<div class="note-popover-header">
                <div class="note-popover-label">Kryssreferanser (${count}) — sortert etter relevans</div>
                <div class="note-popover-header-btns">${headerBtns}</div>
            </div>`;
            content += `<div class="note-popover-refs" data-showing="${initial}" data-total="${count}">`;
            items.slice(0, initial).forEach(item => {
                const display = formatUsfmRef(item.r);
                if (!display) return;
                content += `<button class="xref-btn" onclick="event.stopPropagation(); navigateToRef('${escAttr(display)}')" title="${item.v} stemmer">${escHtml(display)}</button>`;
            });
            content += `</div>`;
            if (count > initial) {
                const restEncoded = JSON.stringify(items.slice(initial)).replace(/"/g, '&quot;');
                content += `<button class="xref-showmore" data-rest="${restEncoded}" onclick="event.stopPropagation(); showMoreXrefs(this)">Vis alle ${count} →</button>`;
            }
        }
        pop.innerHTML = content + `<button class="note-popover-close" onclick="event.stopPropagation(); closePopoverAnimated(this.parentNode); document.querySelectorAll('.note-marker.active').forEach(n=>n.classList.remove('active'));">×</button>`;
        el.parentNode.insertBefore(pop, el.nextSibling);

        // Auto-åpne tidslinje når visning er ett enkelt vers
        if (data.type === 'xref' && data.source && data.items &&
            mainData && mainData.length === 1 && mainData[0].verses && mainData[0].verses.length === 1) {
            // Bare auto-åpne hvis ingen tidslinje allerede finnes
            if (!document.getElementById('xrefTimelineHost')) {
                showXrefTimeline(data.source, data.items);
            }
        }
    };

    // Konverter USFM som 'JHN.3.16' eller 'JHN.1.1-3' eller 'JHN.1.1-2.5' til visningstekst
    function formatUsfmRef(usfmRef) {
        // Del på '-' for range
        const parts = usfmRef.split('-');
        if (parts.length === 1) {
            const m = usfmRef.match(/^([^.]+)\.(\d+)\.(\d+)$/);
            if (!m) return null;
            return `${bookName(m[1])} ${m[2]}:${m[3]}`;
        }
        // Range — mulige former:
        //   JHN.1.1-3          (samme kap)
        //   JHN.1.1-2.5        (kryss-kapittel samme bok)
        //   JHN.1.1-ROM.1.1    (kryss-bok)
        const start = parts[0].match(/^([^.]+)\.(\d+)\.(\d+)$/);
        if (!start) return null;
        const startDisplay = `${bookName(start[1])} ${start[2]}:${start[3]}`;
        const endRaw = parts[1];
        const endFull = endRaw.match(/^([^.]+)\.(\d+)\.(\d+)$/);
        const endMid = endRaw.match(/^(\d+)\.(\d+)$/);
        const endVerse = endRaw.match(/^(\d+)$/);
        if (endFull) return `${startDisplay} – ${bookName(endFull[1])} ${endFull[2]}:${endFull[3]}`;
        if (endMid) return `${startDisplay}–${endMid[1]}:${endMid[2]}`;
        if (endVerse) return `${startDisplay}–${endVerse[1]}`;
        return startDisplay;
    }

    // ── Text search results ──
    function renderTextSearch(results, query, bookTotals, totalMatches) {
        bookTotals = bookTotals || {};
        textSearchCache = { results, query, bookTotals, totalMatches };
        updatePageLayoutMode(false);  // tekstsøk = alltid mange resultater → flytt søkefeltet til toppen
        let html = '';
        if (results.length === 0) {
            html = `<div class="empty-state"><h2>Ingen resultater</h2><p>Ingen vers funnet for «${escHtml(query)}».</p></div>`;
            resultsWrapper.innerHTML = html;
            return;
        }

        const total = totalMatches != null ? totalMatches : results.length;
        // Vis bibelkart-knapp ved siden av når 2+ bøker har treff
        const booksWithHits = Object.keys(bookTotals).filter(k => bookTotals[k] > 0);
        const showMapBtn = booksWithHits.length >= 2;
        html += `<div class="search-controls">
            <div class="search-result-count" style="margin:0">${total} resultat${total !== 1 ? 'er' : ''} for «${escHtml(query)}»</div>
            <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
                <button class="card-action-btn" onclick="toggleCollapse()">${collapsed ? 'Utvid alle' : 'Grupper etter bok'}</button>
                ${showMapBtn ? `<button class="card-action-btn bible-map-toggle-inline" onclick="toggleBibleMap(this)">🗺️ Bibelkart</button>` : ''}
            </div>
        </div>`;
        if (showMapBtn) {
            const mapHtml = buildBibleMapHtml(bookTotals, 'mapJumpToSearchBook');
            html += `<div class="bible-map-wrap" style="margin-top:-4px;margin-bottom:12px;"><div class="bible-map"><div class="bible-map-inner">${mapHtml}</div></div></div>`;
        }

        if (collapsed) {
            const bookOrder = [];
            const groupMap = {};
            results.forEach(r => {
                if (!groupMap[r.book]) {
                    groupMap[r.book] = [];
                    bookOrder.push(r.book);
                }
                groupMap[r.book].push(r);
            });

            bookOrder.forEach(code => {
                const items = groupMap[code];
                const bName = bookName(code);
                const totalInBook = bookTotals[code] || items.length;
                const countLabel = totalInBook > items.length ? `${items.length}+` : `${items.length}`;
                html += `<div class="book-group" data-book="${escAttr(code)}">
                    <div class="book-group-header" onclick="this.classList.toggle('open');this.nextElementSibling.classList.toggle('open')">
                        <span>${escHtml(bName)}<span class="book-group-count">(${countLabel})</span></span>
                        <span class="chevron">&#9654;</span>
                    </div>
                    <div class="book-group-items">`;
                items.forEach(r => {
                    html += `<div class="book-group-item" onclick="expandVerse(this, '${escAttr(r.ref)}', '${escAttr(r.book)}')">
                        <div class="search-result-ref">${escHtml(r.ref)}</div>
                        <div class="search-result-text">${highlightWords(escHtml(r.text), query)}</div>
                    </div>`;
                });
                if (totalInBook > items.length) {
                    html += `<div class="book-group-actions">
                        <button class="card-action-btn" onclick="event.stopPropagation(); loadMoreInBook('${escAttr(code)}', this)">Last inn flere (${totalInBook - items.length})</button>
                        <button class="card-action-btn" onclick="event.stopPropagation(); searchOnlyInBook('${escAttr(code)}')">Søk bare i ${escHtml(bName)}</button>
                    </div>`;
                } else {
                    html += `<div class="book-group-actions">
                        <button class="card-action-btn" onclick="event.stopPropagation(); searchOnlyInBook('${escAttr(code)}')">Søk bare i ${escHtml(bName)}</button>
                    </div>`;
                }
                html += '</div></div>';
            });
        } else {
            results.forEach(r => {
                html += `<div class="search-result-item" onclick="expandVerse(this, '${escAttr(r.ref)}', '${escAttr(r.book)}')">
                    <div class="search-result-ref">${escHtml(r.ref)}</div>
                    <div class="search-result-text">${highlightWords(escHtml(r.text), query)}</div>
                </div>`;
            });
        }

        resultsWrapper.innerHTML = html;
        updateNavButtons();
    }

    function highlightWords(htmlText, query) {
        // Finn eksakt-fraser først (i anførselstegn)
        const phrases = [];
        const phraseRe = /"([^"]+)"/g;
        let m;
        while ((m = phraseRe.exec(query)) !== null) phrases.push(m[1]);

        // Fjern fraser og eksklusjonsord fra query for enkeltord-matching
        const cleaned = query
            .replace(/"[^"]+"/g, ' ')
            .replace(/(^|\s)-\S+/g, ' ')
            .toLowerCase();
        const words = cleaned.split(/\s+/).filter(Boolean);

        const escapeRe = s => s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');

        // Uthev hele fraser først (greedy), så enkeltord
        phrases.forEach(p => {
            const re = new RegExp(`(${escapeRe(p)})`, 'gi');
            htmlText = htmlText.replace(re, '<b style="color:var(--accent)">$1</b>');
        });
        words.forEach(w => {
            const re = new RegExp(`(${escapeRe(w)})`, 'gi');
            htmlText = htmlText.replace(re, '<b style="color:var(--accent)">$1</b>');
        });
        return htmlText;
    }

    // Inline expansion in grouped/flat text search — viser kun handlingsknapper
    window.expandVerse = function(el, ref, bookCode) {
        // If already expanded, toggle off
        const existing = el.querySelector('.inline-verse-expand');
        if (existing) {
            existing.remove();
            el.classList.remove('expanded');
            return;
        }
        // Collapse any other expanded items (both flat and grouped view)
        document.querySelectorAll('.search-result-item.expanded, .book-group-item.expanded').forEach(item => {
            item.querySelector('.inline-verse-expand')?.remove();
            item.classList.remove('expanded');
        });

        // Parse ref — format: "Bokname K:V" (f.eks. "Matteus 3:16")
        const match = ref.match(/(\d+):(\d+)\s*$/);
        if (!match) return;
        const ch = parseInt(match[1], 10);
        const verseNum = parseInt(match[2], 10);
        const bName = bookName(bookCode);

        el.classList.add('expanded');
        const expand = document.createElement('div');
        expand.className = 'inline-verse-expand';
        expand.innerHTML = `<div class="inline-verse-expand-actions">
            <button class="card-action-btn" onclick="event.stopPropagation(); goToVerseFromExpand('${escAttr(ref)}', '${escAttr(bookCode)}', ${ch}, '${escAttr(bName)}', ${verseNum})">Les i kapittelet</button>
            <button class="card-action-btn" onclick="event.stopPropagation(); goToVerseAndCompare('${escAttr(ref)}')">Sammenlign versjoner</button>
        </div>`;
        el.appendChild(expand);
    };

    // ── Forrige/neste kapittel-navigasjon ──
    function getNavContext() {
        if (currentView !== 'normal' || !mainData || !mainData[0] || mainData[0].error) return null;
        const block = mainData[0];
        if (!block.book || !block.verses || !block.verses.length) return null;
        const chapter = block.verses[0].chapter;
        const sameChapter = block.verses.every(v => v.chapter === chapter);
        if (!sameChapter) return null;
        const bookIdx = booksData.findIndex(b => b.code === block.book);
        if (bookIdx < 0) return null;
        return { book: block.book, bookInfo: booksData[bookIdx], chapter, bookIdx };
    }

    function updateNavButtons() {
        const prev = document.getElementById('navPrev');
        const next = document.getElementById('navNext');
        if (!prev || !next) return;
        const ctx = getNavContext();
        if (!ctx) {
            prev.classList.remove('visible');
            next.classList.remove('visible');
            return;
        }
        prev.classList.add('visible');
        next.classList.add('visible');
        prev.disabled = ctx.bookIdx === 0 && ctx.chapter === 1;
        next.disabled = ctx.bookIdx === booksData.length - 1 && ctx.chapter === ctx.bookInfo.chapters;
    }

    function navigateToChapter(bookCode, chapter) {
        const b = booksData.find(x => x.code === bookCode);
        const name = b ? b.name : bookCode;
        searchInput.value = `${name} ${chapter}`;
        lastQuery = searchInput.value;
        highlightVerse = null;
        doSearch();
    }

    window.navPrev = function() {
        const ctx = getNavContext();
        if (!ctx) return;
        let chapter = ctx.chapter - 1;
        let book = ctx.book;
        if (chapter < 1) {
            if (ctx.bookIdx === 0) return;
            const prev = booksData[ctx.bookIdx - 1];
            book = prev.code;
            chapter = prev.chapters;
        }
        navigateToChapter(book, chapter);
    };

    window.navNext = function() {
        const ctx = getNavContext();
        if (!ctx) return;
        let chapter = ctx.chapter + 1;
        let book = ctx.book;
        if (chapter > ctx.bookInfo.chapters) {
            if (ctx.bookIdx >= booksData.length - 1) return;
            const nxt = booksData[ctx.bookIdx + 1];
            book = nxt.code;
            chapter = 1;
        }
        navigateToChapter(book, chapter);
    };

    // ── Copy ──
    window.copyBlock = function(blockIdx, isCompare) {
        const source = isCompare ? compareData : mainData;
        if (!source || !source[blockIdx]) return;
        const block = source[blockIdx];
        let text = '';
        let lastChapter = null;
        const isMultiChapter = block.verses.some(x => x.chapter !== block.verses[0]?.chapter);

        block.verses.forEach((v, vi) => {
            if (isMultiChapter && v.chapter !== lastChapter) {
                if (vi > 0) text += '\n';
                text += `Kapittel ${v.chapter}\n`;
                lastChapter = v.chapter;
            } else if (lastChapter === null) {
                lastChapter = v.chapter;
            }
            text += `${v.num} `;
            text += v.text + ' ';
            lastChapter = v.chapter;
        });

        navigator.clipboard.writeText(text.trim()).then(() => showToast('Kopiert!'));
    };

    function errorCardHtml(label, message) {
        return `<div class="verse-card error-card">
            <div class="verse-card-header"><span class="verse-card-label">${escHtml(label)}</span></div>
            <div class="error-message">${escHtml(message)}</div>
        </div>`;
    }

    // ── Toast ──
    function showToast(msg) {
        toast.textContent = msg;
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 2000);
    }

    // ── Dark mode ──
    const darkToggle = document.getElementById('darkToggle');
    function applyTheme(dark) {
        document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light');
        darkToggle.innerHTML = dark ? '&#9788;' : '&#9790;';
        localStorage.setItem('theme', dark ? 'dark' : 'light');
    }
    darkToggle.addEventListener('click', () => {
        applyTheme(document.documentElement.getAttribute('data-theme') !== 'dark');
    });
    applyTheme(localStorage.getItem('theme') === 'dark');

    // ── Utils ──
    function escHtml(s) {
        const d = document.createElement('div');
        d.textContent = s;
        return d.innerHTML;
    }
    function escAttr(s) {
        return s.replace(/\\/g, '\\\\').replace(/'/g, "\\'");
    }
</script>

</body>
</html>
