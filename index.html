<div class="toast" id="toast"></div>

<script>
    // ── State ──
    let compareMode = false;
    let lastQuery = '';
    let aiDiffState = null; // null | {loading:true} | {text:'...'} | {error:'...'}
    let mainData = null;
    let compareData = null;
    let currentView = 'normal'; // 'normal', 'text_search', 'all_versions'
    let booksData = [];
    let previousState = null; // for back button
    let allVersionsCache = null; // {results, label} for re-rendering
    let textSearchCache = null; // {results, query} for re-rendering
    let collapsed = true; // default: search results grouped by book
    let highlightVerse = null; // verse number to highlight when reading chapter

    // ── BibleHub interlinear URL mapping ──
    const BIBLEHUB_SLUGS = {
        GEN:'genesis',EXO:'exodus',LEV:'leviticus',NUM:'numbers',DEU:'deuteronomy',
        JOS:'joshua',JDG:'judges',RUT:'ruth',
        '1SA':'1_samuel','2SA':'2_samuel','1KI':'1_kings','2KI':'2_kings',
        '1CH':'1_chronicles','2CH':'2_chronicles',
        EZR:'ezra',NEH:'nehemiah',EST:'esther',JOB:'job',PSA:'psalms',
        PRO:'proverbs',ECC:'ecclesiastes',SNG:'songs',
        ISA:'isaiah',JER:'jeremiah',LAM:'lamentations',EZK:'ezekiel',DAN:'daniel',
        HOS:'hosea',JOL:'joel',AMO:'amos',OBA:'obadiah',JON:'jonah',MIC:'micah',
        NAM:'nahum',HAB:'habakkuk',ZEP:'zephaniah',HAG:'haggai',ZEC:'zechariah',MAL:'malachi',
        MAT:'matthew',MRK:'mark',LUK:'luke',JHN:'john',ACT:'acts',ROM:'romans',
        '1CO':'1_corinthians','2CO':'2_corinthians',
        GAL:'galatians',EPH:'ephesians',PHP:'philippians',COL:'colossians',
        '1TH':'1_thessalonians','2TH':'2_thessalonians',
        '1TI':'1_timothy','2TI':'2_timothy',TIT:'titus',PHM:'philemon',
        HEB:'hebrews',JAS:'james',
        '1PE':'1_peter','2PE':'2_peter',
        '1JN':'1_john','2JN':'2_john','3JN':'3_john',
        JUD:'jude',REV:'revelation'
    };

    function bookName(code) {
        const b = booksData.find(x => x.code === code);
        return b ? b.name : code;
    }

    // Labels kommer allerede på norsk fra serveren — ingen oversettelse nødvendig
    function translateLabel(label, bookCode) {
        return label;
    }

    function interlinearUrl(bookCode, chapter, verseNum) {
        const slug = BIBLEHUB_SLUGS[bookCode];
        if (!slug) return null;
        if (verseNum != null) {
            return `https://biblehub.com/interlinear/${slug}/${chapter}-${verseNum}.htm`;
        }
        return `https://biblehub.com/interlinear/${slug}/${chapter}.htm`;
    }

    // ── Elements ──
    // Desktop inputs
    const searchInputDesktop = document.getElementById('searchInput');
    const versionSelectDesktop = document.getElementById('versionSelect');
    const searchBtnDesktop = document.getElementById('searchBtn');
    const compareBtnDesktop = null;
    // Mobile inputs
    const searchInputMobile = document.getElementById('searchInputMobile');
    const versionSelectMobile = document.getElementById('versionSelectMobile');
    const searchBtnMobile = document.getElementById('searchBtnMobile');
    const compareBtnMobile = null;
    // Shared helpers: always read active input
    function getSearchInput() {
        const mobile = document.getElementById('searchBottomBar');
        if (mobile && getComputedStyle(mobile).display !== 'none') return searchInputMobile;
        return searchInputDesktop;
    }
    function getVersionSelect() {
        const mobile = document.getElementById('searchBottomBar');
        if (mobile && getComputedStyle(mobile).display !== 'none') return versionSelectMobile;
        return versionSelectDesktop;
    }
    // Proxy: versionSelect / searchInput / compareBtn used throughout code
    // We create live proxies that delegate to the active element
    const versionSelect = { get value() { return getVersionSelect().value; },
                             set value(v) { versionSelectDesktop.value = v; versionSelectMobile.value = v; },
                             add(opt) { versionSelectDesktop.add(opt); versionSelectMobile.add(new Option(opt.text, opt.value)); },
                             addEventListener(evt, fn) { versionSelectDesktop.addEventListener(evt, fn); versionSelectMobile.addEventListener(evt, fn); } };
    const searchInput = {
        get value() {
            // Normaliser non-breaking spaces til vanlige mellomrom
            return (getSearchInput().textContent || '').replace(/\u00A0/g, ' ').replace(/\s+/g, ' ').trim();
        },
        set value(v) {
            searchInputDesktop.textContent = v;
            searchInputMobile.textContent = v;
            formatSearchInputCE(searchInputDesktop);
            formatSearchInputCE(searchInputMobile);
        }
    };

    // ── Contenteditable operator formatting (bold " and -word) ──
    function getCursorOffset(el) {
        const sel = window.getSelection();
        if (!sel.rangeCount) return 0;
        const range = sel.getRangeAt(0);
        const pre = range.cloneRange();
        pre.selectNodeContents(el);
        pre.setEnd(range.endContainer, range.endOffset);
        return pre.toString().length;
    }
    function setCursorOffset(el, offset) {
        const sel = window.getSelection();
        const range = document.createRange();
        let pos = 0;
        function walk(node) {
            if (node.nodeType === Node.TEXT_NODE) {
                const len = node.nodeValue.length;
                if (pos + len >= offset) {
                    range.setStart(node, Math.max(0, offset - pos));
                    range.collapse(true);
                    return true;
                }
                pos += len;
            } else {
                for (const c of node.childNodes) if (walk(c)) return true;
            }
            return false;
        }
        if (!walk(el)) {
            range.selectNodeContents(el);
            range.collapse(false);
        }
        sel.removeAllRanges();
        sel.addRange(range);
    }
    function buildFormattedHtml(text) {
        let html = '';
        let inQuote = false;
        for (let i = 0; i < text.length; i++) {
            const c = text[i];
            if (c === '"') {
                html += '<b>"</b>';
                inQuote = !inQuote;
            } else if (c === '-' && !inQuote && (i === 0 || text[i - 1] === ' ') &&
                       i + 1 < text.length && text[i + 1] !== ' ' && text[i + 1] !== '-') {
                html += '<b>-</b>';
            } else if (c === '<') html += '&lt;';
            else if (c === '>') html += '&gt;';
            else if (c === '&') html += '&amp;';
            else html += c;
        }
        return html;
    }
    function formatSearchInputCE(el) {
        const text = el.textContent;
        const isFocused = document.activeElement === el;
        const cursor = isFocused ? getCursorOffset(el) : null;
        const newHtml = buildFormattedHtml(text);
        if (el.innerHTML !== newHtml) el.innerHTML = newHtml;
        if (isFocused && cursor != null) setCursorOffset(el, cursor);
    }
    function setupSearchCE(el) {
        el.addEventListener('input', () => formatSearchInputCE(el));
        el.addEventListener('keydown', e => {
            if (e.key === 'Enter') {
                e.preventDefault();
                doSearch();
            }
        });
        el.addEventListener('paste', e => {
            e.preventDefault();
            const text = (e.clipboardData || window.clipboardData).getData('text/plain');
            document.execCommand('insertText', false, text.replace(/\n/g, ' '));
        });
    }
    setupSearchCE(searchInputDesktop);
    setupSearchCE(searchInputMobile);

    // Hjelper: har søket operatorer (bypass KI)?
    function queryHasOperators(q) {
        if (q.indexOf('"') !== -1) return true;
        return q.split(/\s+/).some(t => t.startsWith('-') && t.length > 1);
    }
    // Legacy no-op proxy (compare is now per-card, ikke en global knapp)
    const compareBtn = { classList: { toggle() {} }, show() {}, hide() {} };

const resultsWrapper = document.getElementById('resultsWrapper');
    const compareVersionSelect = document.getElementById('compareVersionSelect');
    const emptyState = document.getElementById('emptyState');
    const emptyStateHtml = emptyState.outerHTML;
    const toast = document.getElementById('toast');
    const bookSelect = document.getElementById('bookSelect');
    const chapterSelect = document.getElementById('chapterSelect');

    // ── Version display names (folder name → display name) ──
    const VERSION_DISPLAY = {
        'NB88': 'NB88/07',
    };
    function versionLabel(v) { return VERSION_DISPLAY[v] || v; }

    // Sort/browse er nå alltid synlig — ingen toggle

    // ── Toggle compare mode (per-card Sammenlign-knapp kaller denne) ──
    window.toggleCompareMode = async function() {
        if (currentView !== 'normal' || !mainData) return;
        compareMode = !compareMode;
        aiDiffState = null;
        if (compareMode && lastQuery) {
            await fetchCompareData(lastQuery);
        } else {
            compareData = null;
        }
        renderAll();
    };

    // ── Init ──
    const PREF_VERSION_KEY = 'preferredVersion';
    async function init() {
        const resp = await fetch('/api/versions');
        const data = await resp.json();
        data.versions.forEach(v => {
            versionSelect.add(new Option(versionLabel(v), v));
            compareVersionSelect.add(new Option(versionLabel(v), v));
        });
        // Default: husket versjon → Bibel2011 → første tilgjengelige
        const saved = localStorage.getItem(PREF_VERSION_KEY);
        let defaultV;
        if (saved && data.versions.includes(saved)) defaultV = saved;
        else if (data.versions.includes('Bibel2011')) defaultV = 'Bibel2011';
        else defaultV = data.versions[0];
        versionSelect.value = defaultV;
        if (data.versions.length > 1) {
            compareVersionSelect.value = data.versions.find(v => v !== defaultV) || data.versions[1];
        }
        loadBooks();
        // Hvis URL har søkeparametre, restaurér tilstand
        restoreFromUrl();
    }
    init();

    // Husk versjonsvalg når brukeren endrer det
    [versionSelectDesktop, versionSelectMobile].forEach(el => {
        if (el) el.addEventListener('change', () => {
            try { localStorage.setItem(PREF_VERSION_KEY, el.value); } catch {}
        });
    });

    async function loadBooks() {
        const version = versionSelect.value || '';
        const resp = await fetch(`/api/books?version=${encodeURIComponent(version)}`);
        const data = await resp.json();
        booksData = data.books;
        refreshBookDropdown();
    }

    function refreshBookDropdown() {
        const prev = bookSelect.value;
        bookSelect.innerHTML = '<option value="">-- Bok --</option>';
        booksData.forEach(b => {
            bookSelect.add(new Option(b.name, b.code));
        });
        bookSelect.value = prev;
        chapterSelect.innerHTML = '<option value="">-- Kap --</option>';
        chapterSelect.disabled = true;
    }

    versionSelectDesktop.addEventListener('change', () => {
        versionSelectMobile.value = versionSelectDesktop.value;
        loadBooks();
        if (lastQuery) doSearch();
    });
    versionSelectMobile.addEventListener('change', () => {
        versionSelectDesktop.value = versionSelectMobile.value;
        loadBooks();
        if (lastQuery) doSearch();
    });

    bookSelect.addEventListener('change', () => {
        const code = bookSelect.value;
        chapterSelect.innerHTML = '<option value="">-- Kap --</option>';
        if (!code) { chapterSelect.disabled = true; return; }
        const book = booksData.find(b => b.code === code);
        if (!book) return;
        for (let i = 1; i <= book.chapters; i++) {
            chapterSelect.add(new Option(i, i));
        }
        chapterSelect.disabled = false;
    });

    chapterSelect.addEventListener('change', () => {
        const code = bookSelect.value;
        const ch = chapterSelect.value;
        if (!code || !ch) return;
        const book = booksData.find(b => b.code === code);
        if (!book) return;
        searchInput.value = `${book.name} ${ch}`;
        doSearch();
    });

    // ── Heartbeat ──
    setInterval(() => fetch('/api/heartbeat').catch(() => {}), 3000);

    // ── Browser history (fram/tilbake-knapper) ──
    let isRestoringHistory = false;

    function buildUrl(state) {
        const url = new URL(window.location.origin + window.location.pathname);
        if (!state || state.view === 'home') return url.toString();
        if (state.query) url.searchParams.set('q', state.query);
        if (state.version) url.searchParams.set('v', state.version);
        if (state.view && state.view !== 'normal') url.searchParams.set('view', state.view);
        if (state.highlightVerse) url.searchParams.set('hv', state.highlightVerse);
        if (state.label) url.searchParams.set('label', state.label);
        if (state.bookFilter) url.searchParams.set('book', state.bookFilter);
        return url.toString();
    }

    function pushHistoryState(state) {
        if (isRestoringHistory) return;
        history.pushState(state, '', buildUrl(state));
    }

    function replaceHistoryState(state) {
        if (isRestoringHistory) return;
        history.replaceState(state, '', buildUrl(state));
    }

    async function restoreFromState(state) {
        isRestoringHistory = true;
        try {
            if (!state || state.view === 'home') {
                goHome();
                return;
            }
            if (state.version && versionSelect.value !== state.version) {
                versionSelect.value = state.version;
            }
            if (state.view === 'all_versions' && state.label) {
                await showAllVersions(state.label);
                return;
            }
            searchInput.value = state.query || '';
            lastQuery = state.query || '';
            highlightVerse = state.highlightVerse || null;
            previousState = null;
            await doSearch();
        } finally {
            isRestoringHistory = false;
        }
    }

    window.addEventListener('popstate', e => {
        restoreFromState(e.state);
    });

    // På første sidelast: hvis URL har ?q= osv., restaurér
    function restoreFromUrl() {
        const params = new URLSearchParams(window.location.search);
        const q = params.get('q');
        if (!q) return false;
        const state = {
            query: q,
            version: params.get('v') || null,
            view: params.get('view') || 'normal',
            highlightVerse: params.get('hv') ? parseInt(params.get('hv'), 10) : null,
            label: params.get('label') || null,
            bookFilter: params.get('book') || null,
        };
        history.replaceState(state, '', window.location.href);
        // Vent til init er ferdig (versjoner lastet)
        setTimeout(() => restoreFromState(state), 50);
        return true;
    }

    // ── Recent searches (localStorage) ──
    const RECENT_KEY = 'recentSearches';
    function getRecentSearches() {
        try { return JSON.parse(localStorage.getItem(RECENT_KEY) || '[]'); } catch { return []; }
    }
    function addRecentSearch(q) {
        if (!q || !q.trim()) return;
        q = q.trim();
        let recent = getRecentSearches().filter(x => x !== q);
        recent.unshift(q);
        recent = recent.slice(0, 5);
        try { localStorage.setItem(RECENT_KEY, JSON.stringify(recent)); } catch {}
    }

    // ── Testament / book sets ──
    const NT_BOOKS = new Set(['MAT','MRK','LUK','JHN','ACT','ROM','1CO','2CO','GAL','EPH','PHP','COL','1TH','2TH','1TI','2TI','TIT','PHM','HEB','JAS','1PE','2PE','1JN','2JN','3JN','JUD','REV']);
    function isNtBook(code) { return NT_BOOKS.has(code); }

    // Parallellsteder (statisk kart for kjente parallellpassasjer)
    const PARALLELS = {
        'MAT:1': [{ label: 'Jesu slektstavle i Luk', ref: 'Luk 3:23-38' }],
        'MAT:3': [{ label: 'Jesu dåp i Mark/Luk', ref: 'Mark 1:9-11' }],
        'MAT:4': [{ label: 'Fristelsen i Mark/Luk', ref: 'Mark 1:12-13' }, { label: 'Fristelsen i Luk', ref: 'Luk 4:1-13' }],
        'MAT:5': [{ label: 'Bergprekenen (sletteprekenen) i Luk', ref: 'Luk 6:20-49' }],
        'MAT:6': [{ label: 'Fadervår i Luk', ref: 'Luk 11:2-4' }],
        'MAT:14': [{ label: 'Bespisningen av de 5000 i Mark', ref: 'Mark 6:30-44' }, { label: 'Bespisningen i Luk', ref: 'Luk 9:10-17' }, { label: 'Bespisningen i Joh', ref: 'Joh 6:1-14' }],
        'MAT:21': [{ label: 'Inntoget i Jerusalem i Mark', ref: 'Mark 11:1-11' }, { label: 'Inntoget i Luk', ref: 'Luk 19:28-40' }, { label: 'Inntoget i Joh', ref: 'Joh 12:12-19' }],
        'MAT:26': [{ label: 'Nattverden i Mark', ref: 'Mark 14:22-25' }, { label: 'Nattverden i Luk', ref: 'Luk 22:14-20' }, { label: 'Nattverden i 1 Kor', ref: '1 Kor 11:23-26' }],
        'MAT:27': [{ label: 'Korsfestelsen i Mark', ref: 'Mark 15' }, { label: 'Korsfestelsen i Luk', ref: 'Luk 23' }, { label: 'Korsfestelsen i Joh', ref: 'Joh 19' }],
        'MAT:28': [{ label: 'Oppstandelsen i Mark', ref: 'Mark 16' }, { label: 'Oppstandelsen i Luk', ref: 'Luk 24' }, { label: 'Oppstandelsen i Joh', ref: 'Joh 20' }],
        'MRK:1': [{ label: 'Paralleller i Matt/Luk', ref: 'Matt 3:13-17' }],
        'LUK:2': [{ label: 'Julefortellingen i Matt', ref: 'Matt 1:18-2:12' }],
        'JHN:1': [{ label: 'Skapelsen i 1 Mos', ref: '1 Mos 1:1-5' }],
        'GEN:1': [{ label: 'Skapelsen i Joh', ref: 'Joh 1:1-14' }, { label: 'Kristus og skapelsen i Kol', ref: 'Kol 1:15-17' }],
        'GEN:2': [{ label: 'Skapelsen i Joh', ref: 'Joh 1:1-14' }],
        '1CO:13': [{ label: 'Kjærlighetens bud i 1 Joh', ref: '1 Joh 4:7-21' }],
    };

    // ── Suggestions ──
    const suggestionsDesktop = document.getElementById('suggestionsDesktop');
    const suggestionsMobile = document.getElementById('suggestionsMobile');

    function activeSuggestionsEl() {
        return document.activeElement === searchInputMobile ? suggestionsMobile : suggestionsDesktop;
    }

    function looksEnglish(q) {
        if (!q) return false;
        // Inneholder kun ASCII-bokstaver + mellomrom, og ingen norske spesialtegn
        if (/[æøåÆØÅ]/.test(q)) return false;
        return /^[A-Za-z\s']+$/.test(q);
    }

    function parseSimpleReference(q) {
        // Prøv å identifisere book + kapittel fra en streng som "Joh 3" eller "Matteus 5:3"
        // Returnerer {bookCode, chapter} eller null
        const m = q.trim().match(/^(.+?)\s+(\d+)(?::\d+.*)?$/);
        if (!m) return null;
        const maybeBook = m[1].toLowerCase().replace(/[.,]/g, '').trim();
        const chapter = parseInt(m[2], 10);
        const book = booksData.find(b => b.name.toLowerCase().startsWith(maybeBook) || (b.code.toLowerCase() === maybeBook));
        return book ? { bookCode: book.code, chapter } : null;
    }

    function buildSuggestions(query) {
        const suggestions = [];
        const q = query.trim();
        const versions = Array.from(versionSelectDesktop.options).map(o => o.value);
        const currentVer = versionSelect.value;

        // Grupper: nylige søk (når feltet er tomt eller kun få tegn)
        if (q.length < 2) {
            const recent = getRecentSearches();
            if (recent.length) {
                suggestions.push({ groupLabel: 'Nylige søk' });
                recent.forEach(r => {
                    suggestions.push({
                        icon: '🕘',
                        html: escHtml(r),
                        onClick: () => { searchInput.value = r; doSearch(); closeSuggestions(); }
                    });
                });
            }
            return suggestions;
        }

        const wordCount = q.split(/\s+/).filter(Boolean).length;
        const hasOperators = q.indexOf('"') !== -1 || /\s-\S/.test(' ' + q);

        // ── Søke-forslag ──
        // 1) Eksakt søk: ≥3 ord og ikke allerede kvotert
        if (wordCount >= 3 && q.indexOf('"') === -1) {
            const quoted = `"${q}"`;
            suggestions.push({
                icon: '🔍',
                html: `Søk eksakt: <strong>${escHtml(quoted)}</strong>`,
                onClick: () => { searchInput.value = quoted; doSearch(); closeSuggestions(); }
            });
        }

        // 2) Tekstsøk-variant: hvis input matcher et boknavn, tilby å søke etter ordet i stedet
        if (wordCount === 1 && !hasOperators) {
            const matchingBook = booksData.find(b =>
                b.name.toLowerCase().startsWith(q.toLowerCase()) && q.length >= 3
            );
            if (matchingBook) {
                suggestions.push({
                    icon: '🔤',
                    html: `Søk etter ordet <strong>${escHtml(q)}</strong> i Bibelen`,
                    hint: '(tekstsøk, ikke bok)',
                    onClick: () => { searchInput.value = `"${q}"`; doSearch(); closeSuggestions(); }
                });
            }
        }

        // 3) Ekskluder ord: etter tekstsøk, vis topp-hyppige ord som kan ekskluderes
        if (textSearchCache && textSearchCache.results && textSearchCache.query === q && !hasOperators) {
            const commonWords = topWordsInResults(textSearchCache.results, q);
            commonWords.slice(0, 2).forEach(w => {
                suggestions.push({
                    icon: '➖',
                    html: `Ekskluder: <strong>${escHtml(w)}</strong>`,
                    hint: '(smalere søk)',
                    onClick: () => { searchInput.value = `${q} -${w}`; doSearch(); closeSuggestions(); }
                });
            });
        }

        // 4) Begrens til bok: hvis vi har tekstsøkresultater med en tydelig bok på topp
        if (textSearchCache && textSearchCache.bookTotals && textSearchCache.query === q && !hasOperators) {
            const totals = textSearchCache.bookTotals;
            const topBooks = Object.entries(totals).sort((a, b) => b[1] - a[1]).slice(0, 2);
            topBooks.forEach(([code, count]) => {
                const bn = bookName(code);
                suggestions.push({
                    icon: '🎯',
                    html: `Søk kun i <strong>${escHtml(bn)}</strong>`,
                    hint: `(${count} treff)`,
                    onClick: () => { searchOnlyInBook(code); closeSuggestions(); }
                });
            });
        }

        // ── Kontekst-forslag ──
        // 5) Bytt versjon: hvis søk ser engelsk ut og det finnes engelske versjoner
        if (looksEnglish(q) && currentVer === 'NB88') {
            const engVer = versions.find(v => ['ESV','KJV','NIV','NKJV','NASB1995'].includes(v));
            if (engVer) {
                suggestions.push({
                    icon: '🌍',
                    html: `Søk i <strong>${escHtml(versionLabel(engVer))}</strong>`,
                    hint: '(engelsk versjon)',
                    onClick: () => {
                        versionSelect.value = engVer;
                        doSearch();
                        closeSuggestions();
                    }
                });
            }
        }

        // 6) Testament-filter: tilby NT / GT filter
        suggestions.push({
            icon: '✝️',
            html: `Søk kun i <strong>Det nye testamentet</strong>`,
            onClick: () => { searchInTestament(q, 'NT'); closeSuggestions(); }
        });
        suggestions.push({
            icon: '📜',
            html: `Søk kun i <strong>Det gamle testamentet</strong>`,
            onClick: () => { searchInTestament(q, 'GT'); closeSuggestions(); }
        });

        // 7) Parallellsteder: hvis input parses til en kjent referanse-nøkkel
        const ref = parseSimpleReference(q);
        if (ref) {
            const key = `${ref.bookCode}:${ref.chapter}`;
            const parallels = PARALLELS[key];
            if (parallels) {
                parallels.forEach(p => {
                    suggestions.push({
                        icon: '🔗',
                        html: `Parallellsted: <strong>${escHtml(p.label)}</strong>`,
                        hint: p.ref,
                        onClick: () => { searchInput.value = p.ref; doSearch(); closeSuggestions(); }
                    });
                });
            }
        }

        return suggestions;
    }

    function topWordsInResults(results, query) {
        const queryWords = new Set(query.toLowerCase().split(/\s+/).filter(Boolean));
        const stopWords = new Set(['og','i','er','det','de','den','at','som','han','hun','på','av','til','med','for','å','en','et','ei','men','så','skal','har','blir','ikke','var','ble','vil','kan','må','oss','dere','meg','deg','seg','jeg','du','vi','alle','hans','hennes','sin','sitt','sine','når','da','hvor','hva','hvem']);
        const counts = {};
        results.forEach(r => {
            const words = r.text.toLowerCase().replace(/[.,:;!?'"\u00AB\u00BB\-]/g, ' ').split(/\s+/);
            words.forEach(w => {
                if (!w || w.length < 4) return;
                if (queryWords.has(w)) return;
                if (stopWords.has(w)) return;
                counts[w] = (counts[w] || 0) + 1;
            });
        });
        return Object.entries(counts).sort((a, b) => b[1] - a[1]).map(([w]) => w);
    }

    async function searchInTestament(query, testament) {
        const targetBooks = booksData.map(b => b.code).filter(c => testament === 'NT' ? isNtBook(c) : !isNtBook(c));
        if (!targetBooks.length) return;
        previousState = { query: lastQuery, mainData, compareData, view: currentView, textSearch: textSearchCache };
        setSearchLoading(true);
        const version = versionSelect.value;
        try {
            // Kjør parallelle søk for hver bok
            const allResults = [];
            const bookTotals = {};
            const chunks = await Promise.all(targetBooks.map(code =>
                fetchWithRetry(`/api/search?q=${encodeURIComponent(query)}&version=${encodeURIComponent(version)}&book=${encodeURIComponent(code)}`)
                    .then(r => r.json()).catch(() => null)
            ));
            chunks.forEach(d => {
                if (d && d.results) {
                    d.results.forEach(r => allResults.push(r));
                    Object.entries(d.book_totals || {}).forEach(([k, v]) => bookTotals[k] = v);
                }
            });
            const total = Object.values(bookTotals).reduce((s, n) => s + n, 0);
            currentView = 'text_search';
            collapsed = true;
            renderTextSearch(allResults, query, bookTotals, total);
            searchInput.value = `${testament}: ${query}`;
            lastQuery = query;
        } finally {
            setSearchLoading(false);
        }
    }

    function renderSuggestions(el, suggestions) {
        if (!suggestions.length) { el.classList.remove('open'); el.innerHTML = ''; return; }
        let html = '';
        suggestions.forEach((s, i) => {
            if (s.groupLabel) {
                html += `<div class="suggestions-group-label">${escHtml(s.groupLabel)}</div>`;
                return;
            }
            html += `<div class="suggestion-item" data-idx="${i}">
                <span class="suggestion-icon">${s.icon || ''}</span>
                <span class="suggestion-text">${s.html}</span>
                ${s.hint ? `<span class="suggestion-hint">${escHtml(s.hint)}</span>` : ''}
            </div>`;
        });
        el.innerHTML = html;
        el.classList.add('open');
        el.querySelectorAll('.suggestion-item').forEach(item => {
            const i = parseInt(item.getAttribute('data-idx'), 10);
            item.addEventListener('mousedown', e => {
                e.preventDefault();  // unngå blur på input før click kjøres
                suggestions[i].onClick && suggestions[i].onClick();
            });
        });
    }

    function updateSuggestions() {
        const el = activeSuggestionsEl();
        const active = document.activeElement;
        if (active !== searchInputDesktop && active !== searchInputMobile) {
            closeSuggestions();
            return;
        }
        const q = searchInput.value;
        const list = buildSuggestions(q);
        renderSuggestions(el, list);
    }

    function closeSuggestions() {
        suggestionsDesktop.classList.remove('open');
        suggestionsMobile.classList.remove('open');
    }

    [searchInputDesktop, searchInputMobile].forEach(el => {
        el.addEventListener('input', updateSuggestions);
        el.addEventListener('focus', updateSuggestions);
        el.addEventListener('blur', () => setTimeout(closeSuggestions, 200));
    });
    document.addEventListener('click', e => {
        if (!e.target.closest('.suggestions') && !e.target.closest('.search-bar-wrap')) {
            closeSuggestions();
        }
    });

    // ── Fetch with retry for transient network errors ──
    async function fetchWithRetry(url, options = {}, retries = 2) {
        let lastErr;
        for (let attempt = 0; attempt <= retries; attempt++) {
            try {
                const resp = await fetch(url, options);
                return resp;
            } catch (err) {
                lastErr = err;
                console.warn(`[fetch retry ${attempt + 1}/${retries + 1}] ${url}:`, err.message || err);
                if (attempt < retries) {
                    await new Promise(r => setTimeout(r, 300 * (attempt + 1)));
                }
            }
        }
        throw lastErr;
    }

    // ── Search in-flight tracking to prevent overlapping requests ──
    let searchInFlight = false;
    function setSearchLoading(loading) {
        searchInFlight = loading;
        [searchBtnDesktop, searchBtnMobile].forEach(b => {
            b.disabled = loading;
            b.style.opacity = loading ? '0.6' : '';
        });
    }

    // ── Search ──
    searchBtnDesktop.addEventListener('click', () => doSearch());
    searchBtnMobile.addEventListener('click', () => doSearch());
    searchInputDesktop.addEventListener('keydown', e => { if (e.key === 'Enter') doSearch(); });
    searchInputMobile.addEventListener('keydown', e => { if (e.key === 'Enter') doSearch(); });

    async function doSearch(isAiRetry = false) {
        const query = searchInput.value.trim();
        if (!query) return;
        if (searchInFlight && !isAiRetry) return;  // Prevent overlapping searches
        if (!isAiRetry) {
            lastQuery = query;
            previousState = null;
            highlightVerse = null;
            setSearchLoading(true);
            addRecentSearch(query);
            closeSuggestions();
            pushHistoryState({
                view: 'normal', query, version: versionSelect.value,
            });
        }
        currentView = 'normal';
        aiDiffState = null;

        const version = versionSelect.value;
        try {
            const resp = await fetchWithRetry(`/api/search?q=${encodeURIComponent(query)}&version=${encodeURIComponent(version)}`);
            const data = await resp.json();
            if (data.error) {
                resultsWrapper.innerHTML = errorCardHtml('Feil', data.error);
                return;
            }

            if (data.type === 'text_search') {
                const usesOperators = data.has_operators || queryHasOperators(query);
                if (data.results.length === 0 && !isAiRetry) {
                    if (usesOperators) {
                        // Operatorsøk: ingen KI — prøv andre versjoner i stedet
                        await searchOtherVersions(query, version);
                        return;
                    }
                    // Vanlig søk uten treff: bruk KI
                    await tryAiFallback(query);
                    return;
                }
                currentView = 'text_search';
                renderTextSearch(data.results, data.query, data.book_totals || {}, data.total || data.results.length);
                compareBtn.hide();
                return;
            }

            mainData = data.results;
            const hasContent = mainData.some(b => b.verses && b.verses.length > 0);
            if (!hasContent && !isAiRetry) {
                if (queryHasOperators(query)) {
                    // Skulle ikke skje (operatorer gir tekstsøk på server), men vær safe
                    resultsWrapper.innerHTML = `<div class="empty-state"><h2>Ingen resultater</h2></div>`;
                    return;
                }
                await tryAiFallback(query);
                return;
            }

            if (compareMode) {
                await fetchCompareData(query);
            } else {
                compareData = null;
            }
            renderAll();
            compareBtn.show();
        } catch (err) {
            console.error('[doSearch] feil:', err);
            resultsWrapper.innerHTML = errorCardHtml('Feil', 'Kunne ikke koble til serveren: ' + (err.message || err));
        } finally {
            if (!isAiRetry) setSearchLoading(false);
        }
    }

    // Søk på tvers av alle andre versjoner når gjeldende versjon ikke har treff (kun for operatorsøk)
    async function searchOtherVersions(query, currentVersion) {
        resultsWrapper.innerHTML = `<div class="empty-state"><p><span class="ai-searching">Søkte i andre versjoner…</span></p></div>`;
        try {
            const allVersResp = await fetchWithRetry('/api/versions');
            const allVers = (await allVersResp.json()).versions || [];
            const otherVersions = allVers.filter(v => v !== currentVersion);
            const hits = [];
            for (const v of otherVersions) {
                try {
                    const r = await fetchWithRetry(`/api/search?q=${encodeURIComponent(query)}&version=${encodeURIComponent(v)}`);
                    const d = await r.json();
                    if (d.type === 'text_search' && d.results && d.results.length > 0) {
                        hits.push({ version: v, results: d.results, bookTotals: d.book_totals || {}, total: d.total || d.results.length });
                    }
                } catch {}
            }
            if (hits.length === 0) {
                resultsWrapper.innerHTML = `<div class="empty-state"><h2>Ingen resultater</h2><p>Ingen vers funnet for «${escHtml(query)}» i noen versjon.</p></div>`;
                return;
            }
            // Render stable banner + hver versjon som egen seksjon
            let html = `<div class="empty-state" style="padding:20px 10px;"><p style="color:var(--text-muted);">Ingen treff i <b>${escHtml(versionLabel(currentVersion))}</b> — søkte i andre versjoner:</p></div>`;
            hits.forEach(h => {
                html += `<div class="other-version-header">${escHtml(versionLabel(h.version))} — ${h.total} treff</div>`;
                // Render hver versjon som en bok-gruppe-samling inline
                const groups = {};
                const order = [];
                h.results.forEach(r => {
                    if (!groups[r.book]) { groups[r.book] = []; order.push(r.book); }
                    groups[r.book].push(r);
                });
                order.forEach(code => {
                    const items = groups[code];
                    const bName = bookName(code);
                    const totalInBook = h.bookTotals[code] || items.length;
                    const countLabel = totalInBook > items.length ? `${items.length}+` : `${items.length}`;
                    html += `<div class="book-group">
                        <div class="book-group-header" onclick="this.classList.toggle('open');this.nextElementSibling.classList.toggle('open')">
                            <span>${escHtml(bName)}<span class="book-group-count">(${countLabel})</span></span>
                            <span class="chevron">&#9654;</span>
                        </div>
                        <div class="book-group-items">`;
                    items.forEach(r => {
                        html += `<div class="book-group-item">
                            <div class="search-result-ref">${escHtml(r.ref)}</div>
                            <div class="search-result-text">${highlightWords(escHtml(r.text), query)}</div>
                        </div>`;
                    });
                    html += '</div></div>';
                });
            });
            resultsWrapper.innerHTML = html;
            currentView = 'text_search';
            compareBtn.hide();
        } catch {
            resultsWrapper.innerHTML = `<div class="empty-state"><h2>Ingen resultater</h2></div>`;
        }
    }

    async function tryAiFallback(originalQuery) {
        resultsWrapper.innerHTML = `<div class="empty-state"><p><span class="ai-searching">✨ Prøver å reformulere med KI…</span></p></div>`;
        try {
            const aiResp = await fetch(`/api/ai_parse?q=${encodeURIComponent(originalQuery)}`);
            const aiData = await aiResp.json();
            if (aiData.result && aiData.result.trim() !== originalQuery.trim()) {
                searchInput.value = aiData.result;
                lastQuery = aiData.result;
                await doSearch(true);
            } else {
                // Show empty results
                resultsWrapper.innerHTML = `<div class="empty-state"><h2>Ingen resultater</h2><p>Ingen vers funnet for «${escHtml(originalQuery)}».</p></div>`;
            }
        } catch {
            resultsWrapper.innerHTML = `<div class="empty-state"><h2>Ingen resultater</h2><p>Ingen vers funnet for «${escHtml(originalQuery)}».</p></div>`;
        }
    }

    async function fetchCompareData(query) {
        const version = compareVersionSelect.value;
        try {
            const resp = await fetch(`/api/search?q=${encodeURIComponent(query)}&version=${encodeURIComponent(version)}`);
            const data = await resp.json();
            if (data.type === 'reference' && !data.error) {
                compareData = data.results;
            } else {
                compareData = null;
            }
        } catch { compareData = null; }
    }

    // ── Compare toggle (handled via onCompareBtnClick above) ──

    compareVersionSelect.addEventListener('change', async () => {
        aiDiffState = null;
        if (compareMode && lastQuery && currentView === 'normal') {
            await fetchCompareData(lastQuery);
            renderAll();
        }
    });

    // ── AI: toggle diff ──
    window.toggleDiff = async function() {
        if (aiDiffState && aiDiffState.text) {
            aiDiffState = null;
            renderAll();
            return;
        }
        if (aiDiffState && aiDiffState.loading) return;

        const text1 = (mainData || []).flatMap(b => b.verses || []).map(v => v.text).join(' ');
        const text2 = (compareData || []).flatMap(b => b.verses || []).map(v => v.text).join(' ');
        if (!text1 || !text2) { showToast('Ingen tekst å sammenligne'); return; }

        aiDiffState = { loading: true };
        renderAll();

        try {
            const resp = await fetch('/api/ai_diff', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    text1, text2,
                    label: (mainData[0] && mainData[0].label) || lastQuery,
                    version1: versionLabel(versionSelect.value),
                    version2: versionLabel(compareVersionSelect.value),
                })
            });
            const data = await resp.json();
            aiDiffState = data.error ? { error: data.error } : { text: data.result };
        } catch {
            aiDiffState = { error: 'Kunne ikke koble til serveren.' };
        }
        renderAll();
    };

    // AI parse is now automatic (tryAiFallback) — no manual button needed

    // ── Re-render on toggle change ──

    // ── Render reference results ──
    function renderAll() {
        if (!mainData || mainData.length === 0) {
            resultsWrapper.innerHTML = emptyStateHtml;
            return;
        }

        const showCompare = compareMode && compareData;
        let html = '';

        if (previousState) {
            html += '<div class="back-bar"><button class="back-btn" onclick="goBack()">&larr; Tilbake</button></div>';
        }

        // Stack: for hver blokk, render hovedkort → evt. sammenligningskort rett under
        for (let idx = 0; idx < mainData.length; idx++) {
            const mainBlock = mainData[idx];
            const compBlock = showCompare && idx < compareData.length ? compareData[idx] : null;

            html += buildCardHtml(mainBlock, idx, false);
            if (showCompare && compBlock) {
                html += buildCompareCardHtml(compBlock, idx);
            }
        }

        // Bunnseksjon: KI-sammenligning (kun synlig når compare er aktiv)
        if (showCompare) {
            html += '<div class="ai-diff-section">';
            if (aiDiffState && aiDiffState.text) {
                html += `<div class="diff-result-card">${escHtml(aiDiffState.text)}</div>`;
            } else if (aiDiffState && aiDiffState.error) {
                html += `<div class="diff-result-card" style="color:var(--error);border-color:var(--error);background:var(--error-bg);">${escHtml(aiDiffState.error)}</div>`;
            } else {
                html += `<button class="btn-diff" onclick="toggleDiff()" ${aiDiffState && aiDiffState.loading ? 'disabled' : ''}>
                    ${aiDiffState && aiDiffState.loading ? 'Analyserer…' : '✨ Sammenlign med KI'}
                </button>`;
            }
            html += '</div>';
        }

        resultsWrapper.innerHTML = html;

        // Koble opp versjonsvelger inne i sammenligningskortene
        if (showCompare) {
            document.querySelectorAll('.compare-version-inline').forEach(sel => {
                Array.from(compareVersionSelect.options).forEach(o => {
                    sel.add(new Option(o.text, o.value));
                });
                sel.value = compareVersionSelect.value;
                sel.addEventListener('change', () => {
                    compareVersionSelect.value = sel.value;
                    compareVersionSelect.dispatchEvent(new Event('change'));
                });
            });
        }
    }

    function buildCardHtml(block, idx, isCompare) {
        if (!block) return '';
        if (block.error) {
            const lbl = block.label || 'Feil';
            return `<div class="verse-card error-card">
                <div class="verse-card-header">
                    <span class="verse-card-label">${escHtml(lbl)}</span>
                </div>
                <div class="error-message">${escHtml(block.error)}</div>
            </div>`;
        }

        const displayLabel = block.label;
        let html = `<div class="verse-card" id="card-${idx}">
            <div class="verse-card-header">
                <span class="verse-card-label">${escHtml(displayLabel)}</span>
                <button class="copy-btn" onclick="copyBlock(${idx}, false)">Kopier</button>
            </div>
            <div class="verse-text">`;

        html += renderVerseTextHtml(block.verses, highlightVerse);
        html += '</div>';

        // Footer buttons
        if (block.book && block.verses.length > 0) {
            const ch = block.verses[0].chapter;
            const bName = bookName(block.book);
            const isSingleVerse = block.verses.length === 1;
            const ilUrl = interlinearUrl(block.book, ch, isSingleVerse ? block.verses[0].num : null);
            const verseNum = isSingleVerse ? block.verses[0].num : null;

            html += `<div class="verse-card-footer">
                <button class="card-action-btn" onclick="readChapter('${escAttr(block.book)}', ${ch}, '${escAttr(bName)}', ${verseNum || 'null'})">Les ${escHtml(bName)} ${ch}</button>
                <button class="card-action-btn" onclick="showAllVersions('${escAttr(block.label)}')">Alle versjoner</button>
                <button class="card-action-btn" onclick="toggleCompareMode()">${compareMode ? 'Skjul sammenligning' : 'Sammenlign'}</button>`;
            if (ilUrl) {
                html += `<a class="card-action-btn" href="${ilUrl}" target="_blank" rel="noopener" style="text-decoration:none;">Interlinear (biblehub.com)</a>`;
            }
            html += `</div>`;
        }

        html += '</div>';
        return html;
    }

    function buildCompareCardHtml(block, idx) {
        if (!block) {
            return `<div class="verse-card compare-card">
                <div class="verse-card-header compare-card-header">
                    <span class="verse-card-label">Sammenlign med:</span>
                    <select class="compare-version-inline"></select>
                </div>
                <div class="verse-text" style="color:var(--text-muted);font-style:italic;">Ikke tilgjengelig i denne versjonen.</div>
            </div>`;
        }
        let html = `<div class="verse-card compare-card" id="compare-card-${idx}">
            <div class="verse-card-header compare-card-header">
                <span class="verse-card-label">Sammenlign med:</span>
                <select class="compare-version-inline"></select>
                <button class="copy-btn" onclick="copyBlock(${idx}, true)">Kopier</button>
            </div>
            <div class="verse-text">`;
        html += renderVerseTextHtml(block.verses);
        html += '</div></div>';
        return html;
    }

    function renderVerseTextHtml(verses, hlVerse) {
        let html = '';
        let lastChapter = null;
        const isMultiChapter = verses.some(x => x.chapter !== verses[0]?.chapter);

        verses.forEach((v, vi) => {
            if (isMultiChapter && v.chapter !== lastChapter) {
                html += `<div class="chapter-heading">Kapittel ${v.chapter}</div>`;
                lastChapter = v.chapter;
            } else if (lastChapter === null) {
                lastChapter = v.chapter;
            }

            html += `<span class="verse-num">${v.num}</span>`;
            const txt = escHtml(v.text) + ' ';
            if (hlVerse != null && v.num === hlVerse) {
                html += `<mark class="highlighted-verse">${txt}</mark>`;
            } else {
                html += txt;
            }
            lastChapter = v.chapter;
        });
        return html;
    }

    // ── Text search results ──
    function renderTextSearch(results, query, bookTotals, totalMatches) {
        bookTotals = bookTotals || {};
        textSearchCache = { results, query, bookTotals, totalMatches };
        let html = '';
        if (results.length === 0) {
            html = `<div class="empty-state"><h2>Ingen resultater</h2><p>Ingen vers funnet for «${escHtml(query)}».</p></div>`;
            resultsWrapper.innerHTML = html;
            return;
        }

        const total = totalMatches != null ? totalMatches : results.length;
        html += `<div class="search-controls">
            <div class="search-result-count" style="margin:0">${total} resultat${total !== 1 ? 'er' : ''} for «${escHtml(query)}»</div>
            <button class="card-action-btn" onclick="toggleCollapse()">${collapsed ? 'Utvid alle' : 'Grupper etter bok'}</button>
        </div>`;

        if (collapsed) {
            const bookOrder = [];
            const groupMap = {};
            results.forEach(r => {
                if (!groupMap[r.book]) {
                    groupMap[r.book] = [];
                    bookOrder.push(r.book);
                }
                groupMap[r.book].push(r);
            });

            bookOrder.forEach(code => {
                const items = groupMap[code];
                const bName = bookName(code);
                const totalInBook = bookTotals[code] || items.length;
                const countLabel = totalInBook > items.length ? `${items.length}+` : `${items.length}`;
                html += `<div class="book-group">
                    <div class="book-group-header" onclick="this.classList.toggle('open');this.nextElementSibling.classList.toggle('open')">
                        <span>${escHtml(bName)}<span class="book-group-count">(${countLabel})</span></span>
                        <span class="chevron">&#9654;</span>
                    </div>
                    <div class="book-group-items">`;
                items.forEach(r => {
                    html += `<div class="book-group-item" onclick="expandVerse(this, '${escAttr(r.ref)}', '${escAttr(r.book)}')">
                        <div class="search-result-ref">${escHtml(r.ref)}</div>
                        <div class="search-result-text">${highlightWords(escHtml(r.text), query)}</div>
                    </div>`;
                });
                if (totalInBook > items.length) {
                    html += `<div class="book-group-actions">
                        <button class="card-action-btn" onclick="event.stopPropagation(); loadMoreInBook('${escAttr(code)}', this)">Last inn flere (${totalInBook - items.length})</button>
                        <button class="card-action-btn" onclick="event.stopPropagation(); searchOnlyInBook('${escAttr(code)}')">Søk bare i ${escHtml(bName)}</button>
                    </div>`;
                } else {
                    html += `<div class="book-group-actions">
                        <button class="card-action-btn" onclick="event.stopPropagation(); searchOnlyInBook('${escAttr(code)}')">Søk bare i ${escHtml(bName)}</button>
                    </div>`;
                }
                html += '</div></div>';
            });
        } else {
            results.forEach(r => {
                html += `<div class="search-result-item" onclick="expandVerse(this, '${escAttr(r.ref)}', '${escAttr(r.book)}')">
                    <div class="search-result-ref">${escHtml(r.ref)}</div>
                    <div class="search-result-text">${highlightWords(escHtml(r.text), query)}</div>
                </div>`;
            });
        }

        resultsWrapper.innerHTML = html;
        if (previousState) {
            // Add back button at top when drilling back from text search
            resultsWrapper.insertAdjacentHTML('afterbegin', '<div class="back-bar"><button class="back-btn" onclick="goBack()">&larr; Tilbake</button></div>');
        }
    }

    // Last inn flere treff i en spesifikk bok (inline, behold andre bøker)
    window.loadMoreInBook = async function(bookCode, btnEl) {
        const query = (textSearchCache && textSearchCache.query) || lastQuery;
        if (!query) return;
        btnEl.disabled = true;
        btnEl.textContent = 'Laster…';
        const version = versionSelect.value;
        try {
            const resp = await fetchWithRetry(`/api/search?q=${encodeURIComponent(query)}&version=${encodeURIComponent(version)}&book=${encodeURIComponent(bookCode)}`);
            const data = await resp.json();
            if (!data.results) return;
            const group = btnEl.closest('.book-group');
            const itemsDiv = group.querySelector('.book-group-items');
            const bName = bookName(bookCode);
            let itemsHtml = '';
            data.results.forEach(r => {
                itemsHtml += `<div class="book-group-item" onclick="expandVerse(this, '${escAttr(r.ref)}', '${escAttr(r.book)}')">
                    <div class="search-result-ref">${escHtml(r.ref)}</div>
                    <div class="search-result-text">${highlightWords(escHtml(r.text), query)}</div>
                </div>`;
            });
            itemsHtml += `<div class="book-group-actions">
                <button class="card-action-btn" onclick="event.stopPropagation(); searchOnlyInBook('${escAttr(bookCode)}')">Søk bare i ${escHtml(bName)}</button>
            </div>`;
            itemsDiv.innerHTML = itemsHtml;
            // Oppdater telling i header
            const countEl = group.querySelector('.book-group-count');
            if (countEl) countEl.textContent = `(${data.results.length})`;
        } catch {
            btnEl.disabled = false;
            btnEl.textContent = 'Last inn flere';
            showToast('Kunne ikke laste flere resultater');
        }
    };

    // Søk på nytt, men bare i én bok (viser full referanse-visning)
    window.searchOnlyInBook = async function(bookCode) {
        const query = (textSearchCache && textSearchCache.query) || lastQuery;
        if (!query) return;
        previousState = { query: lastQuery, mainData, compareData, view: currentView, textSearch: textSearchCache };
        const version = versionSelect.value;
        setSearchLoading(true);
        try {
            const resp = await fetchWithRetry(`/api/search?q=${encodeURIComponent(query)}&version=${encodeURIComponent(version)}&book=${encodeURIComponent(bookCode)}`);
            const data = await resp.json();
            currentView = 'text_search';
            collapsed = false;  // vis flat liste siden vi er i én bok
            renderTextSearch(data.results, data.query, data.book_totals || {}, data.total || data.results.length);
            // Sett søkefelt til å reflektere filteret
            searchInput.value = `${bookName(bookCode)}: ${query}`;
            lastQuery = query;
        } catch {
            showToast('Kunne ikke søke i boken');
        } finally {
            setSearchLoading(false);
        }
    };

    window.toggleCollapse = function() {
        collapsed = !collapsed;
        if (textSearchCache) renderTextSearch(textSearchCache.results, textSearchCache.query, textSearchCache.bookTotals, textSearchCache.totalMatches);
    };

    function highlightWords(htmlText, query) {
        const words = query.toLowerCase().split(/\s+/).filter(Boolean);
        words.forEach(w => {
            const regex = new RegExp(`(${w.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi');
            htmlText = htmlText.replace(regex, '<b style="color:var(--accent)">$1</b>');
        });
        return htmlText;
    }

    // Inline expansion in grouped/flat text search — viser kun handlingsknapper
    window.expandVerse = function(el, ref, bookCode) {
        // If already expanded, toggle off
        const existing = el.querySelector('.inline-verse-expand');
        if (existing) {
            existing.remove();
            el.classList.remove('expanded');
            return;
        }
        // Collapse any other expanded items (both flat and grouped view)
        document.querySelectorAll('.search-result-item.expanded, .book-group-item.expanded').forEach(item => {
            item.querySelector('.inline-verse-expand')?.remove();
            item.classList.remove('expanded');
        });

        // Parse ref — format: "Bokname K:V" (f.eks. "Matteus 3:16")
        const match = ref.match(/(\d+):(\d+)\s*$/);
        if (!match) return;
        const ch = parseInt(match[1], 10);
        const verseNum = parseInt(match[2], 10);
        const bName = bookName(bookCode);

        el.classList.add('expanded');
        const expand = document.createElement('div');
        expand.className = 'inline-verse-expand';
        expand.innerHTML = `<div class="inline-verse-expand-actions">
            <button class="card-action-btn" onclick="event.stopPropagation(); goToVerseFromExpand('${escAttr(ref)}', '${escAttr(bookCode)}', ${ch}, '${escAttr(bName)}', ${verseNum})">Les i kapittelet</button>
            <button class="card-action-btn" onclick="event.stopPropagation(); showAllVersions('${escAttr(ref)}')">Sammenlign versjoner</button>
        </div>`;
        el.appendChild(expand);
    };

    window.goToVerseFromExpand = function(ref, bookCode, chapter, bName, verseNum) {
        previousState = { query: lastQuery, mainData, compareData, view: currentView, textSearch: textSearchCache };
        searchInput.value = bName + ' ' + chapter;
        lastQuery = searchInput.value;
        highlightVerse = verseNum;
        currentView = 'normal';
        pushHistoryState({ view: 'normal', query: lastQuery, version: versionSelect.value, highlightVerse });
        const version = versionSelect.value;
        fetch(`/api/search?q=${encodeURIComponent(lastQuery)}&version=${encodeURIComponent(version)}`)
            .then(r => r.json()).then(data => {
                if (data.type === 'reference' && !data.error) {
                    mainData = data.results;
                    compareData = null;
                    renderAll();
                    compareBtn.show();
                }
            }).catch(() => {});
    };

    window.goToVerse = function(ref) {
        previousState = { query: lastQuery, mainData, compareData, view: currentView, textSearch: textSearchCache };
        searchInput.value = ref;
        doSearch();
    };

    // ── Read chapter ──
    window.readChapter = async function(bookCode, chapter, bName, verseNum) {
        previousState = { query: lastQuery, mainData, compareData, view: currentView, textSearch: textSearchCache };
        const query = `${bName} ${chapter}`;
        searchInput.value = query;
        lastQuery = query;
        highlightVerse = verseNum != null ? verseNum : null;
        currentView = 'normal';
        pushHistoryState({ view: 'normal', query, version: versionSelect.value, highlightVerse });

        const version = versionSelect.value;
        try {
            const resp = await fetch(`/api/search?q=${encodeURIComponent(query)}&version=${encodeURIComponent(version)}`);
            const data = await resp.json();
            if (data.type === 'reference' && !data.error) {
                mainData = data.results;
                compareData = null;
                if (compareMode) await fetchCompareData(query);
                renderAll();
                compareBtn.show();
            }
        } catch {}
    };

    // ── All versions ──
    window.showAllVersions = async function(label) {
        previousState = { query: lastQuery, mainData, compareData, view: currentView, textSearch: textSearchCache };
        currentView = 'all_versions';
        pushHistoryState({ view: 'all_versions', label, version: versionSelect.value });

        try {
            const resp = await fetch(`/api/all_versions?q=${encodeURIComponent(label)}`);
            const data = await resp.json();
            if (data.error) {
                resultsWrapper.innerHTML = errorCardHtml('Error', data.error);
                return;
            }
            renderAllVersions(data.results, label);
        } catch {
            resultsWrapper.innerHTML = errorCardHtml('Feil', 'Kunne ikke hente versjoner.');
        }
    };

    function renderAllVersions(allResults, label) {
        allVersionsCache = { results: allResults, label };
        // Get book code from first result to translate label
        const firstBlocks = Object.values(allResults)[0] || [];
        const bCode = firstBlocks[0]?.book;
        const displayLabel = bCode ? translateLabel(label, bCode) : label;

        let html = `<div class="back-bar"><button class="back-btn" onclick="goBack()">&larr; Tilbake</button></div>`;
        html += `<div class="all-versions-block">
            <div class="verse-card-header" style="border-bottom:none;padding-bottom:0;margin-bottom:4px;">
                <span class="verse-card-label" style="font-size:1.15rem;">${escHtml(displayLabel)}</span>
            </div>`;

        for (const [versionName, blocks] of Object.entries(allResults)) {
            const verses = blocks.flatMap(b => b.verses || []);
            if (verses.length === 0) continue;

            html += `<div style="margin-bottom:18px;">
                <div class="version-label">${escHtml(versionName)}</div>
                <div class="verse-text">${renderVerseTextHtml(verses)}</div>
            </div>`;
        }

        html += '</div>';
        resultsWrapper.innerHTML = html;
    }

    window.goHome = function() {
        pushHistoryState({ view: 'home' });
        lastQuery = '';
        mainData = null;
        compareData = null;
        previousState = null;
        currentView = 'normal';
        textSearchCache = null;
        allVersionsCache = null;
        highlightVerse = null;
        compareMode = false;
        compareBtn.classList.toggle('active', false);
        compareBtn.hide();
        searchInput.value = '';
        resultsWrapper.innerHTML = emptyStateHtml;
    };

    window.goBack = function() {
        if (!previousState) return;
        const ps = previousState;
        previousState = null;
        lastQuery = ps.query;
        mainData = ps.mainData;
        compareData = ps.compareData;
        currentView = ps.view || 'normal';
        searchInput.value = lastQuery;
        highlightVerse = null;
        if (currentView === 'text_search' && ps.textSearch) {
            textSearchCache = ps.textSearch;
            renderTextSearch(ps.textSearch.results, ps.textSearch.query, ps.textSearch.bookTotals, ps.textSearch.totalMatches);
        } else if (currentView === 'all_versions' && allVersionsCache) {
            renderAllVersions(allVersionsCache.results, allVersionsCache.label);
        } else {
            renderAll();
        }
    };

    // ── Copy ──
    window.copyBlock = function(blockIdx, isCompare) {
        const source = isCompare ? compareData : mainData;
        if (!source || !source[blockIdx]) return;
        const block = source[blockIdx];
        let text = '';
        let lastChapter = null;
        const isMultiChapter = block.verses.some(x => x.chapter !== block.verses[0]?.chapter);

        block.verses.forEach((v, vi) => {
            if (isMultiChapter && v.chapter !== lastChapter) {
                if (vi > 0) text += '\n';
                text += `Kapittel ${v.chapter}\n`;
                lastChapter = v.chapter;
            } else if (lastChapter === null) {
                lastChapter = v.chapter;
            }
            text += `${v.num} `;
            text += v.text + ' ';
            lastChapter = v.chapter;
        });

        navigator.clipboard.writeText(text.trim()).then(() => showToast('Kopiert!'));
    };

    function errorCardHtml(label, message) {
        return `<div class="verse-card error-card">
            <div class="verse-card-header"><span class="verse-card-label">${escHtml(label)}</span></div>
            <div class="error-message">${escHtml(message)}</div>
        </div>`;
    }

    // ── Toast ──
    function showToast(msg) {
        toast.textContent = msg;
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 2000);
    }

    // ── Dark mode ──
    const darkToggle = document.getElementById('darkToggle');
    function applyTheme(dark) {
        document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light');
        darkToggle.innerHTML = dark ? '&#9788;' : '&#9790;';
        localStorage.setItem('theme', dark ? 'dark' : 'light');
    }
    darkToggle.addEventListener('click', () => {
        applyTheme(document.documentElement.getAttribute('data-theme') !== 'dark');
    });
    applyTheme(localStorage.getItem('theme') === 'dark');

    // ── Utils ──
    function escHtml(s) {
        const d = document.createElement('div');
        d.textContent = s;
        return d.innerHTML;
    }
    function escAttr(s) {
        return s.replace(/\\/g, '\\\\').replace(/'/g, "\\'");
    }
</script>

</body>
</html>
