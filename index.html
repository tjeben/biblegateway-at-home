<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BibleGateway at home</title>
    <link rel="icon" href="/logo_biblegateway.png" type="image/png" sizes="any">
    <link rel="shortcut icon" href="/favicon.ico">
    <link rel="apple-touch-icon" sizes="180x180" href="/logo_biblegateway.png">
    <style>
        :root {
            --bg: #f5f1eb;
            --card-bg: #ffffff;
            --text: #2c2c2c;
            --text-muted: #6b6b6b;
            --accent: #a83232;
            --accent-hover: #8c2828;
            --border: #d4cfc7;
            --error: #9c3030;
            --error-bg: #fdf0f0;
            --verse-num: #a83232;
            --shadow: 0 2px 8px rgba(0,0,0,0.08);
        }

        [data-theme="dark"] {
            --bg: #1a1a1e;
            --card-bg: #26262b;
            --text: #e0e0e0;
            --text-muted: #9a9a9a;
            --accent: #c94444;
            --accent-hover: #b33636;
            --border: #3a3a40;
            --error: #e05555;
            --error-bg: #2e1a1a;
            --verse-num: #c94444;
            --shadow: 0 2px 8px rgba(0,0,0,0.3);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        .header {
            background: var(--accent);
            color: white;
            padding: 12px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 2px 12px rgba(0,0,0,0.15);
        }
        .header-left {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
        }
        .header-logo {
            height: 40px;
            width: auto;
            display: block;
        }
        .header h1 { font-size: 1.4rem; font-weight: 600; letter-spacing: 0.5px; }
        @media (max-width: 480px) {
            .header { padding: 10px 16px; }
            .header-logo { height: 30px; }
            .header h1 { font-size: 1.1rem; }
        }

        .controls {
            max-width: 1400px;
            margin: 20px auto 0;
            padding: 0 24px;
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
        }

        .search-box {
            flex: 1;
            min-width: 250px;
        }
        .search-box input {
            width: 100%;
            padding: 12px 16px;
            font-size: 1rem;
            border: 2px solid var(--border);
            border-radius: 8px;
            background: var(--card-bg);
            color: var(--text);
            outline: none;
            transition: border-color 0.2s;
        }
        .search-box input:focus { border-color: var(--accent); }
        .search-box input::placeholder { color: #aaa; }

        .btn {
            padding: 10px 20px;
            font-size: 0.95rem;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
            transition: background 0.2s, transform 0.1s;
        }
        .btn:active { transform: scale(0.97); }
        .btn-primary { background: var(--accent); color: white; }
        .btn-primary:hover { background: var(--accent-hover); }
        .btn-secondary { background: var(--card-bg); color: var(--text); border: 2px solid var(--border); }
        .btn-secondary:hover { background: #f0ede7; }
        [data-theme="dark"] .btn-secondary:hover { background: #32323a; }
        .btn-secondary.active { background: var(--accent); color: white; border-color: var(--accent); }

        select {
            padding: 10px 14px;
            font-size: 0.95rem;
            border: 2px solid var(--border);
            border-radius: 8px;
            background: var(--card-bg);
            color: var(--text);
            cursor: pointer;
            outline: none;
        }
        select:focus { border-color: var(--accent); }
        select option { background: var(--card-bg); color: var(--text); }

        .dark-toggle {
            background: transparent;
            border: 2px solid rgba(255,255,255,0.3);
            color: white;
            width: 38px; height: 38px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1.1rem;
            line-height: 1;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transition: border-color 0.2s;
        }
        .dark-toggle:hover { border-color: rgba(255,255,255,0.6); }

        /* Book browser */
        .browser-bar {
            max-width: 1400px;
            margin: 12px auto 0;
            padding: 0 24px;
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }
        .browser-bar label {
            font-size: 0.9rem;
            color: var(--text-muted);
            font-weight: 500;
        }
        .browser-bar select {
            padding: 7px 10px;
            font-size: 0.9rem;
        }

        /* Toggles */
        .toggles {
            max-width: 1400px;
            margin: 12px auto 0;
            padding: 0 24px;
            display: flex;
            gap: 20px;
            align-items: center;
            flex-wrap: wrap;
        }
        .toggle-group {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9rem;
            color: var(--text-muted);
        }
        .toggle { position: relative; width: 42px; height: 24px; }
        .toggle input { opacity: 0; width: 0; height: 0; }
        .toggle-slider {
            position: absolute; inset: 0;
            background: var(--border);
            border-radius: 24px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .toggle-slider::before {
            content: '';
            position: absolute;
            width: 18px; height: 18px;
            left: 3px; bottom: 3px;
            background: white;
            border-radius: 50%;
            transition: transform 0.2s;
        }
        .toggle input:checked + .toggle-slider { background: var(--accent); }
        .toggle input:checked + .toggle-slider::before { transform: translateX(18px); }

        /* Results area */
        .results-wrapper {
            max-width: 1400px;
            margin: 20px auto;
            padding: 0 24px 40px;
        }
        .verse-row {
            display: flex;
            gap: 20px;
            margin-bottom: 16px;
            align-items: stretch;
        }
        .verse-row > .verse-card {
            flex: 1;
            min-width: 0;
            margin-bottom: 0;
        }
        .compare-columns-header {
            display: flex;
            gap: 20px;
            margin-bottom: 12px;
        }
        .column-label {
            flex: 1;
            min-width: 0;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-muted);
        }
        .column-label select {
            padding: 5px 8px;
            font-size: 0.85rem;
            text-transform: none;
            letter-spacing: 0;
            font-weight: 400;
        }

        /* Back button */
        .back-bar {
            margin-bottom: 16px;
        }
        .back-btn {
            padding: 6px 16px;
            font-size: 0.85rem;
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            cursor: pointer;
            color: var(--text-muted);
            transition: all 0.2s;
        }
        .back-btn:hover { border-color: var(--accent); color: var(--accent); }

        /* Verse card */
        .verse-card {
            background: var(--card-bg);
            border-radius: 10px;
            padding: 20px 24px;
            margin-bottom: 16px;
            box-shadow: var(--shadow);
            position: relative;
            display: flex;
            flex-direction: column;
        }
        .verse-card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--border);
        }
        .verse-card-label { font-weight: 700; font-size: 1rem; color: var(--accent); }
        .copy-btn {
            padding: 5px 12px;
            font-size: 0.8rem;
            background: transparent;
            border: 1px solid var(--border);
            border-radius: 6px;
            cursor: pointer;
            color: var(--text-muted);
            transition: all 0.2s;
            white-space: nowrap;
        }
        .copy-btn:hover { background: var(--accent); color: white; border-color: var(--accent); }

        .verse-text {
            font-family: 'Georgia', 'Times New Roman', 'Palatino Linotype', serif;
            font-size: 1.1rem;
            line-height: 1.8;
            color: var(--text);
            flex: 1;
        }
        .verse-num {
            color: var(--verse-num);
            font-size: 0.75em;
            vertical-align: super;
            font-weight: 700;
            margin-right: 2px;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }
        .chapter-heading {
            font-weight: 700;
            font-size: 0.9rem;
            color: var(--text-muted);
            margin: 12px 0 4px;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }
        .chapter-heading:first-child { margin-top: 0; }

        /* Card footer buttons */
        .verse-card-footer {
            display: flex;
            gap: 8px;
            margin-top: 12px;
            padding-top: 10px;
            border-top: 1px solid var(--border);
            flex-wrap: wrap;
        }
        .card-action-btn {
            padding: 5px 12px;
            font-size: 0.8rem;
            background: transparent;
            border: 1px solid var(--border);
            border-radius: 6px;
            cursor: pointer;
            color: var(--text-muted);
            transition: all 0.2s;
            white-space: nowrap;
        }
        .card-action-btn:hover { border-color: var(--accent); color: var(--accent); }

        /* Error */
        .error-card { background: var(--error-bg); border-left: 4px solid var(--error); }
        .error-card .verse-card-label { color: var(--error); }
        .error-message { color: var(--error); font-size: 0.95rem; }

        /* Text search results */
        .search-result-item {
            background: var(--card-bg);
            border-radius: 8px;
            padding: 14px 18px;
            margin-bottom: 10px;
            box-shadow: var(--shadow);
            cursor: pointer;
            transition: border-color 0.2s;
            border: 2px solid transparent;
        }
        .search-result-item:hover { border-color: var(--accent); }
        .search-result-ref {
            font-weight: 700;
            color: var(--accent);
            font-size: 0.9rem;
            margin-bottom: 4px;
        }
        .search-result-text {
            font-family: 'Georgia', 'Times New Roman', serif;
            font-size: 1rem;
            line-height: 1.6;
            color: var(--text);
        }
        .search-result-count {
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-bottom: 12px;
        }

        /* All-versions view */
        .all-versions-block {
            background: var(--card-bg);
            border-radius: 10px;
            padding: 20px 24px;
            margin-bottom: 16px;
            box-shadow: var(--shadow);
        }
        .all-versions-block .version-label {
            font-weight: 700;
            font-size: 0.95rem;
            color: var(--accent);
            margin-bottom: 6px;
        }
        .all-versions-block .verse-text {
            margin-bottom: 16px;
        }
        .all-versions-block .verse-text:last-child { margin-bottom: 0; }

        /* Collapsible book groups */
        .book-group {
            margin-bottom: 10px;
        }
        .book-group-header {
            background: var(--card-bg);
            border: 2px solid var(--border);
            border-radius: 8px;
            padding: 12px 18px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: 700;
            color: var(--accent);
            transition: border-color 0.2s;
            user-select: none;
        }
        .book-group-header:hover { border-color: var(--accent); }
        .book-group-header .chevron {
            transition: transform 0.2s;
            font-size: 0.8em;
            color: var(--text-muted);
        }
        .book-group-header.open .chevron { transform: rotate(90deg); }
        .book-group-count {
            font-weight: 400;
            color: var(--text-muted);
            font-size: 0.9em;
            margin-left: 6px;
        }
        .book-group-items {
            display: none;
            padding: 8px 0 0;
        }
        .book-group-items.open { display: block; }
        .search-controls {
            display: flex;
            gap: 10px;
            align-items: center;
            margin-bottom: 14px;
            flex-wrap: wrap;
        }

        /* Empty state */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
        }
        .empty-state h2 { font-size: 1.3rem; margin-bottom: 10px; color: var(--text); }
        .empty-state p { font-size: 0.95rem; line-height: 1.6; }
        .empty-state code {
            background: var(--border);
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 0.9em;
        }

        /* Toast */
        .toast {
            position: fixed; bottom: 24px; left: 50%;
            transform: translateX(-50%) translateY(80px);
            background: #333; color: white;
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 0.9rem;
            opacity: 0;
            transition: all 0.3s;
            z-index: 1000;
            pointer-events: none;
        }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

        .btn-ai {
            background: #f5f0e0;
            color: #8b6914;
            border: 1px solid #d4b44a;
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 0.9rem;
            cursor: pointer;
            font-weight: 500;
            transition: background 0.2s;
            white-space: nowrap;
        }
        .btn-ai:hover { background: #ede3c0; }
        .btn-ai:disabled { opacity: 0.6; cursor: wait; }
        [data-theme="dark"] .btn-ai { background: #3a3010; color: #d4a84b; border-color: #6b5520; }
        [data-theme="dark"] .btn-ai:hover { background: #4a3e14; }

        .btn-diff {
            padding: 6px 14px;
            font-size: 0.85rem;
            background: #fef3c7;
            color: #92400e;
            border: 1px solid #fbbf24;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 500;
            transition: background 0.2s;
        }
        .btn-diff:hover { background: #fde68a; }
        .btn-diff:disabled { opacity: 0.6; cursor: wait; }
        [data-theme="dark"] .btn-diff { background: #3b2200; color: #fbbf24; border-color: #7c4a00; }
        [data-theme="dark"] .btn-diff:hover { background: #4a2d00; }

        .diff-result-card {
            background: #fffbeb;
            border: 1px solid #fbbf24;
            border-radius: 8px;
            padding: 14px 18px;
            margin-top: 10px;
            font-size: 0.95rem;
            line-height: 1.6;
            color: #78350f;
        }
        [data-theme="dark"] .diff-result-card { background: #2d1a00; color: #fde68a; border-color: #7c4a00; }

        .controls-actions {
            display: flex;
            gap: 8px;
            align-items: center;
            flex-wrap: wrap;
        }

        /* Integrated search bar: input + version select + search btn in one row */
        .search-bar-wrap {
            display: flex;
            align-items: stretch;
            border: 2px solid var(--border);
            border-radius: 8px;
            background: var(--card-bg);
            overflow: hidden;
            transition: border-color 0.2s;
            flex: 1;
            min-width: 250px;
        }
        .search-bar-wrap:focus-within { border-color: var(--accent); }
        .search-bar-wrap input {
            flex: 1;
            padding: 12px 14px;
            font-size: 1rem;
            border: none;
            background: transparent;
            color: var(--text);
            outline: none;
            min-width: 0;
        }
        .search-bar-wrap input::placeholder { color: #aaa; }
        .search-bar-wrap .search-version-select {
            padding: 8px 10px;
            font-size: 0.85rem;
            border: none;
            border-left: 1px solid var(--border);
            border-radius: 0;
            background: var(--card-bg);
            color: var(--text);
            cursor: pointer;
            outline: none;
            min-width: 80px;
        }
        .search-bar-wrap .search-btn-inline {
            padding: 10px 18px;
            font-size: 0.95rem;
            border: none;
            border-left: 1px solid var(--border);
            border-radius: 0;
            background: var(--accent);
            color: white;
            cursor: pointer;
            font-weight: 600;
            transition: background 0.2s;
            white-space: nowrap;
        }
        .search-bar-wrap .search-btn-inline:hover { background: var(--accent-hover); }
        .search-bar-wrap .search-btn-inline:active { transform: scale(0.97); }

        /* Sort/browse toggle button */
        .sort-toggle-btn {
            padding: 10px 14px;
            font-size: 1.1rem;
            border: 2px solid var(--border);
            border-radius: 8px;
            background: var(--card-bg);
            color: var(--text-muted);
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
        }
        .sort-toggle-btn:hover, .sort-toggle-btn.active { border-color: var(--accent); color: var(--accent); }

        /* Highlighted verse when reading chapter */
        .highlighted-verse {
            background: rgba(168, 50, 50, 0.15);
            border-radius: 3px;
            padding: 1px 3px;
        }
        [data-theme="dark"] .highlighted-verse { background: rgba(201, 68, 68, 0.2); }

        /* Inline verse expansion in text search */
        .inline-verse-expand {
            background: var(--bg);
            border-left: 3px solid var(--accent);
            border-radius: 0 6px 6px 0;
            padding: 12px 16px;
            margin-top: 8px;
            font-family: 'Georgia', 'Times New Roman', serif;
            font-size: 1rem;
            line-height: 1.7;
            color: var(--text);
        }
        .inline-verse-expand-actions {
            margin-top: 8px;
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .search-result-item.expanded { border-color: var(--accent); background: var(--card-bg); }

        /* AI loading indicator */
        .ai-searching {
            display: inline-block;
            font-size: 0.82rem;
            color: var(--text-muted);
            padding: 4px 10px;
            background: var(--card-bg);
            border-radius: 6px;
            border: 1px solid var(--border);
            margin-left: 8px;
        }

        @media (max-width: 700px) {
            .controls { flex-direction: column; gap: 8px; }
            .search-bar-wrap { min-width: 100%; }
            .controls-actions { width: 100%; }
            .controls-actions select { flex: 1; min-width: 0; }
            .controls-actions .btn-primary,
            .controls-actions .btn-secondary { flex: 1; text-align: center; }
            .browser-bar select { flex: 1; min-width: 0; }
            #bookSelect { width: auto !important; }
            .toggles { gap: 12px; }
            .verse-row { flex-direction: column; }
            .compare-columns-header { flex-direction: column; gap: 6px; }

            /* Sticky bottom search bar on mobile */
            .search-bottom-bar {
                position: fixed;
                bottom: 0; left: 0; right: 0;
                background: var(--bg);
                border-top: 1px solid var(--border);
                padding: 10px 14px;
                z-index: 100;
                display: flex;
                flex-direction: column;
                gap: 8px;
                box-shadow: 0 -2px 12px rgba(0,0,0,0.1);
            }
            .search-bottom-bar .search-bar-wrap { min-width: 0; }
            .search-bottom-bar .controls-actions-row {
                display: flex;
                gap: 8px;
                align-items: center;
            }
            .controls.desktop-only { display: none; }
            .results-wrapper { padding-bottom: 110px; }
            /* Browser-bar (filter) alltid synlig øverst på mobil */
            #browserBar { display: flex !important; }
        }
        @media (min-width: 701px) {
            .search-bottom-bar { display: none; }
        }
    </style>
</head>
<body>

<div class="header">
    <div class="header-left" onclick="goHome()">
        <img src="/logo_biblegateway.png" alt="BibleGateway logo" class="header-logo">
        <h1>Bibelsøk</h1>
    </div>
    <div style="display:flex;gap:8px;align-items:center;">
        <button class="dark-toggle" id="langToggle" title="Bytt språk på boknavn">NO</button>
        <button class="dark-toggle" id="darkToggle" title="Mørk modus">&#9790;</button>
    </div>
</div>

<!-- Desktop search controls -->
<div class="controls desktop-only">
    <div class="search-bar-wrap">
        <input type="text" id="searchInput" placeholder="Søk… f.eks. Johannes 3:16 eller nåde"
               autocomplete="off" autofocus>
        <select id="versionSelect" class="search-version-select"></select>
        <button class="search-btn-inline" id="searchBtn">Søk</button>
    </div>
    <button class="sort-toggle-btn" id="sortToggleBtn" title="Bla gjennom bøker">⇅</button>
    <button class="btn btn-secondary" id="compareBtn" style="display:none;">Sammenlign</button>
</div>

<div class="browser-bar" id="browserBar" style="display:none;">
    <select id="bookSelect" style="width:230px"><option value="">-- Bok --</option></select>
    <select id="chapterSelect" disabled><option value="">-- Kap --</option></select>
</div>

<div class="toggles">
    <select id="compareVersionSelect" style="display:none;"></select>
</div>

<div class="results-wrapper" id="resultsWrapper">
    <div class="empty-state" id="emptyState">
        <h2>Søk i Bibelen</h2>
        <p>
            Slå opp vers med referanse: <code>Johannes 3:16</code>, <code>1. Mosebok 1:1-3</code>, <code>Salme 23</code><br>
            Bruk <code>;</code> for flere steder: <code>Joh 3:16;17</code>, <code>1. Mos 1:1;Josva 1:8</code><br>
            Forkortelser og engelske navn fungerer også: <code>joh</code>, <code>1. mos</code>, <code>rom</code><br>
            Eller skriv et hvilket som helst ord for å søke i hele Bibelen.
        </p>
    </div>
</div>

<!-- Mobile sticky bottom search bar -->
<div class="search-bottom-bar" id="searchBottomBar">
    <div class="search-bar-wrap">
        <input type="text" id="searchInputMobile" placeholder="Søk i Bibelen…"
               autocomplete="off">
        <select id="versionSelectMobile" class="search-version-select"></select>
        <button class="search-btn-inline" id="searchBtnMobile">Søk</button>
    </div>
    <button class="btn btn-secondary" id="compareBtnMobile" style="display:none;">Sammenlign</button>
</div>

<div class="toast" id="toast"></div>

<script>
    // ── State ──
    let compareMode = false;
    let lastQuery = '';
    let aiDiffState = null; // null | {loading:true} | {text:'...'} | {error:'...'}
    let mainData = null;
    let compareData = null;
    let currentView = 'normal'; // 'normal', 'text_search', 'all_versions'
    let booksData = [];
    let previousState = null; // for back button
    let allVersionsCache = null; // {results, label} for re-rendering

    // ── BibleHub interlinear URL mapping ──

    // ── Book name language helper ──
    const ENG_NAMES = {
        GEN:'Genesis',EXO:'Exodus',LEV:'Leviticus',NUM:'Numbers',DEU:'Deuteronomy',
        JOS:'Joshua',JDG:'Judges',RUT:'Ruth',
        '1SA':'1 Samuel','2SA':'2 Samuel','1KI':'1 Kings','2KI':'2 Kings',
        '1CH':'1 Chronicles','2CH':'2 Chronicles',
        EZR:'Ezra',NEH:'Nehemiah',EST:'Esther',JOB:'Job',PSA:'Psalms',

        '1PE':'1 Peter','2PE':'2 Peter',

    function bookName(code) {
        if (bookLang === 'en' && ENG_NAMES[code]) return ENG_NAMES[code];
        const b = booksData.find(x => x.code === code);
        return b ? b.name : code;
    }

    // Translate a label like "Johannes 3:16" or "2. Samuelsbok 16:23" to current language
    function translateLabel(label, bookCode) {
        if (!bookCode) return label;
        const newName = bookName(bookCode);
        // Find the Norwegian name for this book to strip it from the label
        const b = booksData.find(x => x.code === bookCode);
        const norwName = b ? b.name : null;
        if (norwName && label.startsWith(norwName)) {
            return newName + label.slice(norwName.length);
        }
        // Fallback: try English name
        const engName = ENG_NAMES[bookCode];
        if (engName && label.startsWith(engName)) {
            return newName + label.slice(engName.length);
        }
        return label;
    }

    function interlinearUrl(bookCode, chapter, verseNum) {
        const slug = BIBLEHUB_SLUGS[bookCode];
        if (!slug) return null;
        if (verseNum != null) {
            return `https://biblehub.com/interlinear/${slug}/${chapter}-${verseNum}.htm`;
        }
        return `https://biblehub.com/interlinear/${slug}/${chapter}.htm`;
    }

    // ── Elements ──
    // Desktop inputs
    const searchInputDesktop = document.getElementById('searchInput');
    const versionSelectDesktop = document.getElementById('versionSelect');
    const searchBtnDesktop = document.getElementById('searchBtn');
    const compareBtnDesktop = document.getElementById('compareBtn');
    // Mobile inputs
    const searchInputMobile = document.getElementById('searchInputMobile');
    const versionSelectMobile = document.getElementById('versionSelectMobile');
    const searchBtnMobile = document.getElementById('searchBtnMobile');
    const compareBtnMobile = document.getElementById('compareBtnMobile');
    // Shared helpers: always read active input
    function getSearchInput() {
        const mobile = document.getElementById('searchBottomBar');
        if (mobile && getComputedStyle(mobile).display !== 'none') return searchInputMobile;
        return searchInputDesktop;
    }
    function getVersionSelect() {
        const mobile = document.getElementById('searchBottomBar');
        if (mobile && getComputedStyle(mobile).display !== 'none') return versionSelectMobile;
        return versionSelectDesktop;
    }
    // Proxy: versionSelect / searchInput / compareBtn used throughout code
    // We create live proxies that delegate to the active element
    const versionSelect = { get value() { return getVersionSelect().value; },
                             set value(v) { versionSelectDesktop.value = v; versionSelectMobile.value = v; },
                             add(opt) { versionSelectDesktop.add(opt); versionSelectMobile.add(new Option(opt.text, opt.value)); },
                             addEventListener(evt, fn) { versionSelectDesktop.addEventListener(evt, fn); versionSelectMobile.addEventListener(evt, fn); } };
    const searchInput = { get value() { return getSearchInput().value; },
                           set value(v) { searchInputDesktop.value = v; searchInputMobile.value = v; } };
    const compareBtn = { classList: { toggle(cls, force) {
        [compareBtnDesktop, compareBtnMobile].forEach(b => b.classList.toggle(cls, force));
    }}, show() {
        compareBtnDesktop.style.display = '';
        compareBtnMobile.style.display = '';
    }, hide() {
        compareBtnDesktop.style.display = 'none';
        compareBtnMobile.style.display = 'none';
    }};

const resultsWrapper = document.getElementById('resultsWrapper');
    const compareVersionSelect = document.getElementById('compareVersionSelect');
    const emptyState = document.getElementById('emptyState');
    const emptyStateHtml = emptyState.outerHTML;
    const toast = document.getElementById('toast');
    const bookSelect = document.getElementById('bookSelect');
    const chapterSelect = document.getElementById('chapterSelect');

    // ── Version display names (folder name → display name) ──
    const VERSION_DISPLAY = {
        'NB88': 'NB88/07',
    };
    function versionLabel(v) { return VERSION_DISPLAY[v] || v; }

    // ── Sort/browse toggle (kun desktop — på mobil vises browser-bar alltid) ──
    const sortToggleBtn = document.getElementById('sortToggleBtn');
    if (sortToggleBtn) {
        sortToggleBtn.addEventListener('click', () => {
            const bar = document.getElementById('browserBar');
            const visible = bar.style.display !== 'none';
            bar.style.display = visible ? 'none' : '';
            sortToggleBtn.classList.toggle('active', !visible);
        });
    }

    // ── Compare button wiring ──
    async function onCompareBtnClick() {
        if (currentView !== 'normal' || !mainData) {
            showToast('Sammenlign fungerer kun på vers-referanser');
            return;
        }
        compareMode = !compareMode;
        aiDiffState = null;
        compareBtn.classList.toggle('active', compareMode);
        if (compareMode && lastQuery) {
            await fetchCompareData(lastQuery);
        } else {
            compareData = null;
        }
        renderAll();
    }
    compareBtnDesktop.addEventListener('click', onCompareBtnClick);
    compareBtnMobile.addEventListener('click', onCompareBtnClick);

    // ── Init ──
    async function init() {
        const resp = await fetch('/api/versions');
        const data = await resp.json();
        data.versions.forEach(v => {
            versionSelect.add(new Option(versionLabel(v), v));
            compareVersionSelect.add(new Option(versionLabel(v), v));
        });
        // Default to NB88 if available
        if (data.versions.includes('NB88')) {
            versionSelect.value = 'NB88';
        }
        if (data.versions.length > 1) {
            compareVersionSelect.value = data.versions.find(v => v !== versionSelect.value) || data.versions[1];
        }
        loadBooks();
    }
    init();

    async function loadBooks() {
        const version = versionSelect.value || '';
        const resp = await fetch(`/api/books?version=${encodeURIComponent(version)}`);
        const data = await resp.json();
        booksData = data.books;
        refreshBookDropdown();
    }

    function refreshBookDropdown() {
        const prev = bookSelect.value;
        bookSelect.innerHTML = '<option value="">-- Bok --</option>';
        booksData.forEach(b => {
            const name = bookLang === 'en' ? b.name_en : b.name;
            bookSelect.add(new Option(name, b.code));
        });
        bookSelect.value = prev;
        chapterSelect.innerHTML = '<option value="">-- Kap --</option>';
        chapterSelect.disabled = true;
    }

    versionSelectDesktop.addEventListener('change', () => {
        versionSelectMobile.value = versionSelectDesktop.value;
        loadBooks();
        if (lastQuery) doSearch();
    });
    versionSelectMobile.addEventListener('change', () => {
        versionSelectDesktop.value = versionSelectMobile.value;
        loadBooks();
        if (lastQuery) doSearch();
    });

    bookSelect.addEventListener('change', () => {
        const code = bookSelect.value;
        chapterSelect.innerHTML = '<option value="">-- Kap --</option>';
        if (!code) { chapterSelect.disabled = true; return; }
        const book = booksData.find(b => b.code === code);
        if (!book) return;
        for (let i = 1; i <= book.chapters; i++) {
            chapterSelect.add(new Option(i, i));
        }
        chapterSelect.disabled = false;
    });

    chapterSelect.addEventListener('change', () => {
        const code = bookSelect.value;
        const ch = chapterSelect.value;
        if (!code || !ch) return;
        const book = booksData.find(b => b.code === code);
        if (!book) return;
        searchInput.value = `${book.name} ${ch}`;
        doSearch();
    });

    // ── Heartbeat ──
    setInterval(() => fetch('/api/heartbeat').catch(() => {}), 3000);

    // ── Fetch with retry for transient network errors ──
    async function fetchWithRetry(url, options = {}, retries = 2) {
        let lastErr;
        for (let attempt = 0; attempt <= retries; attempt++) {
            try {
                const resp = await fetch(url, options);
                return resp;
            } catch (err) {
                lastErr = err;
                console.warn(`[fetch retry ${attempt + 1}/${retries + 1}] ${url}:`, err.message || err);
                if (attempt < retries) {
                    await new Promise(r => setTimeout(r, 300 * (attempt + 1)));
                }
            }
        }
        throw lastErr;
    }

    // ── Search in-flight tracking to prevent overlapping requests ──
    let searchInFlight = false;
    function setSearchLoading(loading) {
        searchInFlight = loading;
        [searchBtnDesktop, searchBtnMobile].forEach(b => {
            b.disabled = loading;
            b.style.opacity = loading ? '0.6' : '';
        });
    }

    // ── Search ──
    searchBtnDesktop.addEventListener('click', () => doSearch());
    searchBtnMobile.addEventListener('click', () => doSearch());
    searchInputDesktop.addEventListener('keydown', e => { if (e.key === 'Enter') doSearch(); });
    searchInputMobile.addEventListener('keydown', e => { if (e.key === 'Enter') doSearch(); });

    async function doSearch(isAiRetry = false) {
        const query = searchInput.value.trim();
        if (!query) return;
        if (searchInFlight && !isAiRetry) return;  // Prevent overlapping searches
        if (!isAiRetry) {
            lastQuery = query;
            previousState = null;
            highlightVerse = null;
            setSearchLoading(true);
        }
        currentView = 'normal';
        aiDiffState = null;

        const version = versionSelect.value;
        try {
            const resp = await fetchWithRetry(`/api/search?q=${encodeURIComponent(query)}&version=${encodeURIComponent(version)}`);
            const data = await resp.json();
            if (data.error) {
                resultsWrapper.innerHTML = errorCardHtml('Feil', data.error);
                return;
            }

            if (data.type === 'text_search') {
                if (data.results.length === 0 && !isAiRetry) {
                    // Auto AI fallback: try to reformulate query
                    await tryAiFallback(query);
                    return;
                }
                currentView = 'text_search';
                renderTextSearch(data.results, data.query);
                compareBtn.hide();  // Sammenlign gir ikke mening for tekstsøk
                return;
            }

            mainData = data.results;
            // Check if reference search returned empty blocks
            const hasContent = mainData.some(b => b.verses && b.verses.length > 0);
            if (!hasContent && !isAiRetry) {
                await tryAiFallback(query);
                return;
            }

            if (compareMode) {
                await fetchCompareData(query);
            } else {
                compareData = null;
            }
            renderAll();
            compareBtn.show();
        } catch (err) {
            console.error('[doSearch] feil:', err);
            resultsWrapper.innerHTML = errorCardHtml('Feil', 'Kunne ikke koble til serveren: ' + (err.message || err));
        } finally {
            if (!isAiRetry) setSearchLoading(false);
        }
    }

    async function tryAiFallback(originalQuery) {
        resultsWrapper.innerHTML = `<div class="empty-state"><p><span class="ai-searching">✨ Prøver å reformulere med KI…</span></p></div>`;
        try {
            const aiResp = await fetch(`/api/ai_parse?q=${encodeURIComponent(originalQuery)}`);
            const aiData = await aiResp.json();
            if (aiData.result && aiData.result.trim() !== originalQuery.trim()) {
                searchInput.value = aiData.result;
                lastQuery = aiData.result;
                await doSearch(true);
            } else {
                // Show empty results
                resultsWrapper.innerHTML = `<div class="empty-state"><h2>Ingen resultater</h2><p>Ingen vers funnet for «${escHtml(originalQuery)}».</p></div>`;
            }
        } catch {
            resultsWrapper.innerHTML = `<div class="empty-state"><h2>Ingen resultater</h2><p>Ingen vers funnet for «${escHtml(originalQuery)}».</p></div>`;
        }
    }

    async function fetchCompareData(query) {
        const version = compareVersionSelect.value;
        try {
            const resp = await fetch(`/api/search?q=${encodeURIComponent(query)}&version=${encodeURIComponent(version)}`);
            const data = await resp.json();
            if (data.type === 'reference' && !data.error) {
                compareData = data.results;
            } else {
                compareData = null;
            }
        } catch { compareData = null; }
    }

    // ── Compare toggle (handled via onCompareBtnClick above) ──

    compareVersionSelect.addEventListener('change', async () => {
        aiDiffState = null;
        if (compareMode && lastQuery && currentView === 'normal') {
            await fetchCompareData(lastQuery);
            renderAll();
        }
    });

    // ── AI: toggle diff ──
    window.toggleDiff = async function() {
        if (aiDiffState && aiDiffState.text) {
            aiDiffState = null;
            renderAll();
            return;
        }
        if (aiDiffState && aiDiffState.loading) return;

        const text1 = (mainData || []).flatMap(b => b.verses || []).map(v => v.text).join(' ');
        const text2 = (compareData || []).flatMap(b => b.verses || []).map(v => v.text).join(' ');
        if (!text1 || !text2) { showToast('Ingen tekst å sammenligne'); return; }

        aiDiffState = { loading: true };
        renderAll();

        try {
            const resp = await fetch('/api/ai_diff', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    text1, text2,
                    label: (mainData[0] && mainData[0].label) || lastQuery,
                    version1: versionLabel(versionSelect.value),
                    version2: versionLabel(compareVersionSelect.value),
                })
            });
            const data = await resp.json();
            aiDiffState = data.error ? { error: data.error } : { text: data.result };
        } catch {
            aiDiffState = { error: 'Kunne ikke koble til serveren.' };
        }
        renderAll();
    };

    // AI parse is now automatic (tryAiFallback) — no manual button needed

    // ── Re-render on toggle change ──

    // ── Render reference results ──
    function renderAll() {
        if (!mainData || mainData.length === 0) {
            resultsWrapper.innerHTML = emptyStateHtml;
            return;
        }

        const showCompare = compareMode && compareData;
        let html = '';

        updateNewlinesToggleVisibility();

        if (previousState) {
            html += '<div class="back-bar"><button class="back-btn" onclick="goBack()">&larr; Tilbake</button></div>';
        }

        if (showCompare) {
            html += `<div class="compare-columns-header">
                <div class="column-label">${escHtml(versionLabel(versionSelect.value))}</div>
                <div class="column-label"><select id="compareVersionInline"></select></div>
            </div>
            <div style="margin-bottom:12px;">
                <button class="btn-diff" onclick="toggleDiff()" ${aiDiffState && aiDiffState.loading ? 'disabled' : ''}>
                    ${aiDiffState && aiDiffState.text ? '✨ Skjul analyse' : aiDiffState && aiDiffState.loading ? 'Analyserer…' : '✨ Sammenlign oversettelser'}
                </button>
                ${aiDiffState && aiDiffState.text ? `<div class="diff-result-card">${escHtml(aiDiffState.text)}</div>` : ''}
                ${aiDiffState && aiDiffState.error ? `<div class="diff-result-card" style="color:var(--error);border-color:var(--error);background:var(--error-bg);">${escHtml(aiDiffState.error)}</div>` : ''}
            </div>`;
        }

        const count = Math.max(mainData.length, showCompare ? compareData.length : 0);

        for (let idx = 0; idx < count; idx++) {
            const mainBlock = idx < mainData.length ? mainData[idx] : null;
            const compBlock = showCompare && idx < compareData.length ? compareData[idx] : null;

            if (showCompare) {
                html += '<div class="verse-row">';
                html += buildCardHtml(mainBlock, idx, false);
                html += buildCardHtml(compBlock, idx, true);
                html += '</div>';
            } else {
                html += buildCardHtml(mainBlock, idx, false);
            }
        }

        resultsWrapper.innerHTML = html;

        // Wire up inline compare version dropdown
        if (showCompare) {
            const inline = document.getElementById('compareVersionInline');
            if (inline) {
                Array.from(compareVersionSelect.options).forEach(o => {
                    inline.add(new Option(o.text, o.value));
                });
                inline.value = compareVersionSelect.value;
                inline.addEventListener('change', () => {
                    compareVersionSelect.value = inline.value;
                    compareVersionSelect.dispatchEvent(new Event('change'));
                });
            }
        }
    }

    function buildCardHtml(block, idx, isCompare) {
        if (!block) return '<div class="verse-card" style="visibility:hidden;"></div>';
        if (block.error) {
            const lbl = block.book ? translateLabel(block.label || 'Error', block.book) : (block.label || 'Error');
            return `<div class="verse-card error-card">
                <div class="verse-card-header">
                    <span class="verse-card-label">${escHtml(lbl)}</span>
                </div>
                <div class="error-message">${escHtml(block.error)}</div>
            </div>`;
        }

        const displayLabel = translateLabel(block.label, block.book);
        const cardId = isCompare ? `compare-card-${idx}` : `card-${idx}`;
        let html = `<div class="verse-card" id="${cardId}">
            <div class="verse-card-header">
                <span class="verse-card-label">${escHtml(displayLabel)}</span>
                <button class="copy-btn" onclick="copyBlock(${idx}, ${isCompare})">Kopier</button>
            </div>
            <div class="verse-text">`;

        html += renderVerseTextHtml(block.verses, highlightVerse);
        html += '</div>';

        // Footer buttons
        if (!isCompare && block.book && block.verses.length > 0) {
            const ch = block.verses[0].chapter;
            const bName = bookName(block.book);
            const isSingleVerse = block.verses.length === 1;
            const ilUrl = interlinearUrl(block.book, ch, isSingleVerse ? block.verses[0].num : null);
            const verseNum = isSingleVerse ? block.verses[0].num : null;

            html += `<div class="verse-card-footer">
                <button class="card-action-btn" onclick="readChapter('${escAttr(block.book)}', ${ch}, '${escAttr(bName)}', ${verseNum || 'null'})">Les ${escHtml(bName)} ${ch}</button>
                <button class="card-action-btn" onclick="showAllVersions('${escAttr(block.label)}')">Alle versjoner</button>`;
            if (ilUrl) {
                html += `<a class="card-action-btn" href="${ilUrl}" target="_blank" rel="noopener" style="text-decoration:none;">Interlinear (biblehub.com)</a>`;
            }
            html += `</div>`;
        }

        html += '</div>';
        return html;
    }

    function renderVerseTextHtml(verses, hlVerse) {
        let html = '';
        let lastChapter = null;
        const isMultiChapter = verses.some(x => x.chapter !== verses[0]?.chapter);

        verses.forEach((v, vi) => {
            if (isMultiChapter && v.chapter !== lastChapter) {
                html += `<div class="chapter-heading">Kapittel ${v.chapter}</div>`;
                lastChapter = v.chapter;
            } else if (lastChapter === null) {
                lastChapter = v.chapter;
            }

            html += `<span class="verse-num">${v.num}</span>`;
            const txt = escHtml(v.text) + ' ';
            if (hlVerse != null && v.num === hlVerse) {
                html += `<mark class="highlighted-verse">${txt}</mark>`;
            } else {
                html += txt;
            }
            lastChapter = v.chapter;
        });
        return html;
    }

    // ── Text search results ──
    function renderTextSearch(results, query) {
        textSearchCache = { results, query };
        let html = '';
        if (results.length === 0) {
            html = `<div class="empty-state"><h2>Ingen resultater</h2><p>Ingen vers funnet for «${escHtml(query)}».</p></div>`;
            resultsWrapper.innerHTML = html;
            return;
        }

        const total = results.length >= 150 ? '150+' : results.length;
        html += `<div class="search-controls">
            <div class="search-result-count" style="margin:0">${total} resultat${results.length !== 1 ? 'er' : ''} for «${escHtml(query)}»</div>
            <button class="card-action-btn" onclick="toggleCollapse()">${collapsed ? 'Utvid alle' : 'Grupper etter bok'}</button>
        </div>`;

        if (collapsed) {
            const bookOrder = [];
            const groupMap = {};
            results.forEach(r => {
                if (!groupMap[r.book]) {
                    groupMap[r.book] = [];
                    bookOrder.push(r.book);
                }
                groupMap[r.book].push(r);
            });

            bookOrder.forEach(code => {
                const items = groupMap[code];
                const bName = bookName(code);
                html += `<div class="book-group">
                    <div class="book-group-header" onclick="this.classList.toggle('open');this.nextElementSibling.classList.toggle('open')">
                        <span>${escHtml(bName)}<span class="book-group-count">(${items.length})</span></span>
                        <span class="chevron">&#9654;</span>
                    </div>
                    <div class="book-group-items">`;
                items.forEach(r => {
                    const ref = translateLabel(r.ref, r.book);
                    html += `<div class="search-result-item" onclick="expandVerse(this, '${escAttr(r.ref)}', '${escAttr(r.book)}')">
                        <div class="search-result-ref">${escHtml(ref)}</div>
                        <div class="search-result-text">${highlightWords(escHtml(r.text), query)}</div>
                    </div>`;
                });
                html += '</div></div>';
            });
        } else {
            results.forEach(r => {
                const ref = translateLabel(r.ref, r.book);
                html += `<div class="search-result-item" onclick="expandVerse(this, '${escAttr(r.ref)}', '${escAttr(r.book)}')">
                    <div class="search-result-ref">${escHtml(ref)}</div>
                    <div class="search-result-text">${highlightWords(escHtml(r.text), query)}</div>
                </div>`;
            });
        }

        resultsWrapper.innerHTML = html;
        if (previousState) {
            // Add back button at top when drilling back from text search
            resultsWrapper.insertAdjacentHTML('afterbegin', '<div class="back-bar"><button class="back-btn" onclick="goBack()">&larr; Tilbake</button></div>');
        }
    }

    window.toggleCollapse = function() {
        collapsed = !collapsed;
        if (textSearchCache) renderTextSearch(textSearchCache.results, textSearchCache.query);
    };

    function highlightWords(htmlText, query) {
        const words = query.toLowerCase().split(/\s+/).filter(Boolean);
        words.forEach(w => {
            const regex = new RegExp(`(${w.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi');
            htmlText = htmlText.replace(regex, '<b style="color:var(--accent)">$1</b>');
        });
        return htmlText;
    }

    // Inline expansion in grouped/flat text search
    window.expandVerse = async function(el, ref, bookCode) {
        // If already expanded, toggle off
        const existing = el.querySelector('.inline-verse-expand');
        if (existing) {
            existing.remove();
            el.classList.remove('expanded');
            return;
        }
        // Collapse any other expanded items
        document.querySelectorAll('.search-result-item.expanded').forEach(item => {
            item.querySelector('.inline-verse-expand')?.remove();
            item.classList.remove('expanded');
        });

        el.classList.add('expanded');
        const version = versionSelect.value;
        try {
            const resp = await fetch(`/api/search?q=${encodeURIComponent(ref)}&version=${encodeURIComponent(version)}`);
            const data = await resp.json();
            if (data.type === 'reference' && data.results && data.results[0]) {
                const block = data.results[0];
                const verseNum = block.verses && block.verses.length === 1 ? block.verses[0].num : null;
                const ch = block.verses && block.verses[0] ? block.verses[0].chapter : null;
                const bName = bookName(bookCode);
                let actionsHtml = '';
                if (ch) {
                    actionsHtml = `<div class="inline-verse-expand-actions">
                        <button class="card-action-btn" onclick="goToVerseFromExpand('${escAttr(ref)}', '${escAttr(bookCode)}', ${ch}, '${escAttr(bName)}', ${verseNum || 'null'})">Les ${escHtml(bName)} ${ch}</button>
                    </div>`;
                }
                const verseHtml = renderVerseTextHtml(block.verses);
                const expand = document.createElement('div');
                expand.className = 'inline-verse-expand';
                expand.innerHTML = verseHtml + actionsHtml;
                el.appendChild(expand);
            }
        } catch {}
    };

    window.goToVerseFromExpand = function(ref, bookCode, chapter, bName, verseNum) {
        previousState = { query: lastQuery, mainData, compareData, view: currentView, textSearch: textSearchCache };
        searchInput.value = bName + ' ' + chapter;
        lastQuery = searchInput.value;
        highlightVerse = verseNum;
        currentView = 'normal';
        const version = versionSelect.value;
        fetch(`/api/search?q=${encodeURIComponent(lastQuery)}&version=${encodeURIComponent(version)}`)
            .then(r => r.json()).then(data => {
                if (data.type === 'reference' && !data.error) {
                    mainData = data.results;
                    compareData = null;
                    renderAll();
                    compareBtn.show();
                }
            }).catch(() => {});
    };

    window.goToVerse = function(ref) {
        previousState = { query: lastQuery, mainData, compareData, view: currentView, textSearch: textSearchCache };
        searchInput.value = ref;
        doSearch();
    };

    // ── Read chapter ──
    window.readChapter = async function(bookCode, chapter, bName, verseNum) {
        previousState = { query: lastQuery, mainData, compareData, view: currentView, textSearch: textSearchCache };
        const query = `${bName} ${chapter}`;
        searchInput.value = query;
        lastQuery = query;
        highlightVerse = verseNum != null ? verseNum : null;
        currentView = 'normal';

        const version = versionSelect.value;
        try {
            const resp = await fetch(`/api/search?q=${encodeURIComponent(query)}&version=${encodeURIComponent(version)}`);
            const data = await resp.json();
            if (data.type === 'reference' && !data.error) {
                mainData = data.results;
                compareData = null;
                if (compareMode) await fetchCompareData(query);
                renderAll();
                compareBtn.show();
            }
        } catch {}
    };

    // ── All versions ──
    window.showAllVersions = async function(label) {
        previousState = { query: lastQuery, mainData, compareData, view: currentView };
        currentView = 'all_versions';

        try {
            const resp = await fetch(`/api/all_versions?q=${encodeURIComponent(label)}`);
            const data = await resp.json();
            if (data.error) {
                resultsWrapper.innerHTML = errorCardHtml('Error', data.error);
                return;
            }
            renderAllVersions(data.results, label);
        } catch {
            resultsWrapper.innerHTML = errorCardHtml('Feil', 'Kunne ikke hente versjoner.');
        }
    };

    function renderAllVersions(allResults, label) {
        allVersionsCache = { results: allResults, label };
        // Get book code from first result to translate label
        const firstBlocks = Object.values(allResults)[0] || [];
        const bCode = firstBlocks[0]?.book;
        const displayLabel = bCode ? translateLabel(label, bCode) : label;

        let html = `<div class="back-bar"><button class="back-btn" onclick="goBack()">&larr; Tilbake</button></div>`;
        html += `<div class="all-versions-block">
            <div class="verse-card-header" style="border-bottom:none;padding-bottom:0;margin-bottom:4px;">
                <span class="verse-card-label" style="font-size:1.15rem;">${escHtml(displayLabel)}</span>
            </div>`;

        for (const [versionName, blocks] of Object.entries(allResults)) {
            const verses = blocks.flatMap(b => b.verses || []);
            if (verses.length === 0) continue;

            html += `<div style="margin-bottom:18px;">
                <div class="version-label">${escHtml(versionName)}</div>
                <div class="verse-text">${renderVerseTextHtml(verses)}</div>
            </div>`;
        }

        html += '</div>';
        resultsWrapper.innerHTML = html;
    }

    window.goHome = function() {
        lastQuery = '';
        mainData = null;
        compareData = null;
        previousState = null;
        currentView = 'normal';
        textSearchCache = null;
        allVersionsCache = null;
        highlightVerse = null;
        compareMode = false;
        compareBtn.classList.toggle('active', false);
        compareBtn.hide();
        searchInput.value = '';
        resultsWrapper.innerHTML = emptyStateHtml;
    };

    window.goBack = function() {
        if (!previousState) return;
        const ps = previousState;
        previousState = null;
        lastQuery = ps.query;
        mainData = ps.mainData;
        compareData = ps.compareData;
        currentView = ps.view || 'normal';
        searchInput.value = lastQuery;
        highlightVerse = null;
        if (currentView === 'text_search' && ps.textSearch) {
            textSearchCache = ps.textSearch;
            renderTextSearch(ps.textSearch.results, ps.textSearch.query);
        } else if (currentView === 'all_versions' && allVersionsCache) {
            renderAllVersions(allVersionsCache.results, allVersionsCache.label);
        } else {
            renderAll();
        }
    };

    // ── Copy ──
    window.copyBlock = function(blockIdx, isCompare) {
        const source = isCompare ? compareData : mainData;
        if (!source || !source[blockIdx]) return;
        const block = source[blockIdx];
        let text = '';
        let lastChapter = null;
        const isMultiChapter = block.verses.some(x => x.chapter !== block.verses[0]?.chapter);

        block.verses.forEach((v, vi) => {
            if (isMultiChapter && v.chapter !== lastChapter) {
                if (vi > 0) text += '\n';
                text += `Kapittel ${v.chapter}\n`;
                lastChapter = v.chapter;
            } else if (lastChapter === null) {
                lastChapter = v.chapter;
            }
            text += `${v.num} `;
            text += v.text + ' ';
            lastChapter = v.chapter;
        });

        navigator.clipboard.writeText(text.trim()).then(() => showToast('Kopiert!'));
    };

    function errorCardHtml(label, message) {
        return `<div class="verse-card error-card">
            <div class="verse-card-header"><span class="verse-card-label">${escHtml(label)}</span></div>
            <div class="error-message">${escHtml(message)}</div>
        </div>`;
    }

    // ── Toast ──
    function showToast(msg) {
        toast.textContent = msg;
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 2000);
    }

    // ── Language toggle ──
    const langToggle = document.getElementById('langToggle');
    function applyLang(lang) {
        bookLang = lang;
        langToggle.textContent = lang === 'en' ? 'EN' : 'NO';
        localStorage.setItem('bookLang', lang);
        refreshBookDropdown();
        // Re-render current view with new names
        if (currentView === 'normal' && mainData) renderAll();
        else if (currentView === 'text_search' && textSearchCache) renderTextSearch(textSearchCache.results, textSearchCache.query);
        else if (currentView === 'all_versions' && allVersionsCache) renderAllVersions(allVersionsCache.results, allVersionsCache.label);
    }
    langToggle.addEventListener('click', () => {
        applyLang(bookLang === 'en' ? 'no' : 'en');
    });
    langToggle.textContent = bookLang === 'en' ? 'EN' : 'NO';

    // ── Dark mode ──
    const darkToggle = document.getElementById('darkToggle');
    function applyTheme(dark) {
        document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light');
        darkToggle.innerHTML = dark ? '&#9788;' : '&#9790;';
        localStorage.setItem('theme', dark ? 'dark' : 'light');
    }
    darkToggle.addEventListener('click', () => {
        applyTheme(document.documentElement.getAttribute('data-theme') !== 'dark');
    });
    applyTheme(localStorage.getItem('theme') === 'dark');

    // ── Utils ──
    function escHtml(s) {
        const d = document.createElement('div');
        d.textContent = s;
        return d.innerHTML;
    }
    function escAttr(s) {
        return s.replace(/\\/g, '\\\\').replace(/'/g, "\\'");
    }
</script>

</body>
</html>
